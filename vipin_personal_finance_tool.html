<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personal Finance Made Simple — by Vipin Nair</title>
<meta name="description" content="A complete personal finance planner for Indian households — insurance, emergency fund, SIPs, gold, tax. Built by Vipin Nair." />

<!-- React + Babel via CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Chart.js for visuals -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
/* ==========================================================================
   DESIGN TOKENS — light mode, matches Vipin's PPT
   ========================================================================== */
:root {
  --ink:         #0F1B2D;
  --ink-soft:    #4A5568;
  --ink-muted:   #94A3B8;
  --bg:          #FFFFFF;
  --bg-alt:      #F8FAFC;
  --bg-card:     #FFFFFF;
  --rule:        #E5E9F0;
  --rule-strong: #CBD5E1;

  --brand:       #0B5394;
  --brand-dark:  #073763;
  --brand-lite:  #E7F0F9;
  --accent:      #D97706;
  --accent-lt:   #FEF3C7;
  --green:       #059669;
  --green-lt:    #D1FAE5;
  --red:         #DC2626;
  --red-lt:      #FEE2E2;
  --purple:      #7C3AED;
  --purple-lt:   #EDE9FE;

  --shadow-sm:   0 1px 2px 0 rgba(15, 27, 45, 0.04);
  --shadow:      0 4px 12px -2px rgba(15, 27, 45, 0.06), 0 2px 4px -1px rgba(15, 27, 45, 0.04);
  --shadow-lg:   0 14px 30px -8px rgba(15, 27, 45, 0.1), 0 6px 10px -4px rgba(15, 27, 45, 0.05);

  --radius-sm:   6px;
  --radius:      10px;
  --radius-lg:   14px;

  --font-head:   "Calibri", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-body:   "Calibri", "Segoe UI", "Helvetica Neue", Arial, sans-serif;

  --transition:  180ms cubic-bezier(0.4, 0, 0.2, 1);
}

/* ==========================================================================
   BASE
   ========================================================================== */
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--bg-alt);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4, h5 {
  font-family: var(--font-head);
  color: var(--ink);
  margin: 0 0 0.5rem 0;
  font-weight: 700;
  letter-spacing: -0.01em;
}
h1 { font-size: 1.6rem; }
h2 { font-size: 1.35rem; }
h3 { font-size: 1.1rem; }
h4 { font-size: 0.95rem; font-weight: 600; }
p  { margin: 0 0 0.75rem 0; color: var(--ink-soft); }
a  { color: var(--brand); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: 0.95rem; }

/* ==========================================================================
   TOP NAV
   ========================================================================== */
.app-nav {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
  backdrop-filter: saturate(180%) blur(8px);
  box-shadow: var(--shadow-sm);
}
.app-nav-inner {
  max-width: 1240px; margin: 0 auto;
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
}
.brand-mark {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 1.15rem;
  box-shadow: 0 4px 10px -2px rgba(11, 83, 148, 0.35);
}
.brand-text strong {
  display: block; font-size: 1.02rem; color: var(--ink); font-weight: 700;
  letter-spacing: -0.01em;
}
.brand-text span {
  display: block; font-size: 0.78rem; color: var(--ink-muted);
  letter-spacing: 0.5px; text-transform: uppercase;
}

.nav-actions { display: flex; align-items: center; gap: 10px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px;
  border-radius: 8px;
  font-size: 0.88rem; font-weight: 600;
  border: 1px solid transparent;
  transition: var(--transition);
  text-decoration: none;
  white-space: nowrap;
}
.btn-primary {
  background: var(--brand); color: white; border-color: var(--brand);
}
.btn-primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); text-decoration: none; }
.btn-accent {
  background: var(--accent); color: white; border-color: var(--accent);
}
.btn-accent:hover { background: #B45309; border-color: #B45309; text-decoration: none; }
.btn-ghost {
  background: transparent; color: var(--ink); border-color: var(--rule-strong);
}
.btn-ghost:hover { background: var(--bg-alt); }
.btn-sm { padding: 6px 12px; font-size: 0.82rem; }
.btn-lg { padding: 12px 22px; font-size: 0.95rem; }

/* ==========================================================================
   LAYOUT
   ========================================================================== */
.app-shell {
  max-width: 1240px; margin: 0 auto;
  padding: 28px 24px 80px;
}
.hero {
  background: linear-gradient(135deg, #FFFFFF 0%, var(--brand-lite) 100%);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 32px 36px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: ""; position: absolute; top: 0; left: 0; width: 5px; height: 100%;
  background: linear-gradient(180deg, var(--brand) 0%, var(--accent) 100%);
}
.hero-eyebrow {
  font-size: 0.72rem; font-weight: 700;
  color: var(--accent); letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 8px;
}
.hero h1 {
  font-size: 2rem; line-height: 1.15; margin-bottom: 8px;
  color: var(--ink);
}
.hero h1 .highlight { color: var(--brand); }
.hero p {
  font-size: 1.02rem; color: var(--ink-soft); max-width: 720px;
  margin: 0;
}
.hero-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px; margin-top: 24px;
}
.hero-stat {
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--rule); border-radius: var(--radius);
  padding: 14px 16px;
}
.hero-stat-value { font-size: 1.3rem; font-weight: 700; color: var(--brand); }
.hero-stat-label { font-size: 0.78rem; color: var(--ink-muted); margin-top: 2px; }

/* ==========================================================================
   DASHBOARD MODULE GRID
   ========================================================================== */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin: 28px 0 16px;
  gap: 12px;
}
.section-head h2 {
  font-size: 1.2rem; color: var(--ink); margin: 0;
}
.section-head p { color: var(--ink-muted); font-size: 0.85rem; margin: 0; }

.module-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.module-card {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: var(--shadow-sm);
}
.module-card:hover {
  border-color: var(--brand);
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}
.module-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent-color, var(--brand));
  border-radius: var(--radius) var(--radius) 0 0;
  opacity: 0; transition: var(--transition);
}
.module-card:hover::before { opacity: 1; }
.module-card-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--brand-lite);
  display: flex; align-items: center; justify-content: center;
  color: var(--brand); font-size: 1.4rem;
}
.module-card.is-red .module-card-icon { background: var(--red-lt); color: var(--red); --accent-color: var(--red); }
.module-card.is-brand .module-card-icon { background: var(--brand-lite); color: var(--brand); --accent-color: var(--brand); }
.module-card.is-green .module-card-icon { background: var(--green-lt); color: var(--green); --accent-color: var(--green); }
.module-card.is-accent .module-card-icon { background: var(--accent-lt); color: var(--accent); --accent-color: var(--accent); }
.module-card.is-purple .module-card-icon { background: var(--purple-lt); color: var(--purple); --accent-color: var(--purple); }
.module-card h3 {
  font-size: 1.02rem; margin: 0;
}
.module-card p {
  font-size: 0.86rem; color: var(--ink-soft); margin: 0;
  flex: 1;
}
.module-card-cta {
  font-size: 0.82rem; font-weight: 600;
  color: var(--accent-color, var(--brand));
  margin-top: 4px; display: flex; align-items: center; gap: 6px;
}

/* ==========================================================================
   MODULE VIEW (individual module)
   ========================================================================== */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow-sm);
}
.panel + .panel { margin-top: 20px; }
.panel-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.panel-head h2 { margin: 0 0 4px 0; }
.panel-head p { margin: 0; color: var(--ink-muted); font-size: 0.88rem; }
.eyebrow {
  font-size: 0.72rem; font-weight: 700;
  color: var(--accent); letter-spacing: 2.5px;
  text-transform: uppercase; margin-bottom: 6px;
}

.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--ink-soft); font-size: 0.88rem; font-weight: 600;
  margin-bottom: 20px; cursor: pointer;
  transition: var(--transition);
}
.back-link:hover { color: var(--brand); text-decoration: none; }

/* ==========================================================================
   FORM ELEMENTS
   ========================================================================== */
.form-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px; margin-bottom: 16px;
}
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label {
  font-size: 0.82rem; font-weight: 600; color: var(--ink);
}
.form-hint {
  font-size: 0.78rem; color: var(--ink-muted);
}
.form-input, .form-select {
  padding: 9px 12px;
  border: 1px solid var(--rule-strong);
  border-radius: 8px;
  background: var(--bg);
  color: var(--ink);
  transition: var(--transition);
  width: 100%;
}
.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(11, 83, 148, 0.12);
}
.input-with-prefix {
  position: relative;
}
.input-with-prefix .form-input {
  padding-left: 30px;
}
.input-prefix {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--ink-muted); font-weight: 600;
  pointer-events: none;
}
.slider-row {
  display: grid; grid-template-columns: 1fr auto;
  gap: 10px; align-items: center;
}
.slider-row input[type="range"] { width: 100%; accent-color: var(--brand); }
.slider-value {
  font-weight: 700; color: var(--brand);
  min-width: 60px; text-align: right;
}

/* ==========================================================================
   STAT / RESULT CARDS
   ========================================================================== */
.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-top: 16px;
}
.result-card {
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 16px 18px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.result-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--brand);
}
.result-card.is-green::before { background: var(--green); }
.result-card.is-accent::before { background: var(--accent); }
.result-card.is-red::before { background: var(--red); }
.result-card-label {
  font-size: 0.78rem; color: var(--ink-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  font-weight: 600;
}
.result-card-value {
  font-size: 1.4rem; font-weight: 700; color: var(--ink);
  margin-top: 4px;
  font-family: var(--font-head);
}
.result-card-value.is-brand { color: var(--brand); }
.result-card-value.is-green { color: var(--green); }
.result-card-value.is-accent { color: var(--accent); }
.result-card-value.is-red { color: var(--red); }
.result-card-sub {
  font-size: 0.78rem; color: var(--ink-muted);
  margin-top: 4px;
}

/* ==========================================================================
   TABLES
   ========================================================================== */
.tbl-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--rule); }
.tbl {
  width: 100%; border-collapse: collapse; background: var(--bg);
  font-size: 0.88rem;
}
.tbl thead th {
  background: var(--brand);
  color: white;
  font-weight: 600;
  text-align: left;
  padding: 10px 14px;
  font-size: 0.82rem;
  letter-spacing: 0.3px;
}
.tbl tbody td {
  padding: 10px 14px;
  border-top: 1px solid var(--rule);
  color: var(--ink);
}
.tbl tbody tr:nth-child(even) td { background: var(--bg-alt); }
.tbl tbody tr:hover td { background: var(--brand-lite); }
.tbl .num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl .highlight { background: var(--accent-lt) !important; }

/* ==========================================================================
   CALLOUTS
   ========================================================================== */
.callout {
  border-left: 4px solid var(--brand);
  background: var(--brand-lite);
  padding: 14px 18px;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin: 16px 0;
  font-size: 0.92rem;
}
.callout.is-accent { border-color: var(--accent); background: var(--accent-lt); }
.callout.is-green { border-color: var(--green); background: var(--green-lt); }
.callout.is-red { border-color: var(--red); background: var(--red-lt); }
.callout strong { color: var(--ink); }
.callout-title {
  font-weight: 700; color: var(--brand); margin-bottom: 4px;
  font-family: var(--font-head);
}
.callout.is-accent .callout-title { color: var(--accent); }
.callout.is-green .callout-title { color: var(--green); }
.callout.is-red .callout-title { color: var(--red); }

/* ==========================================================================
   PILLS / TAGS
   ========================================================================== */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; font-size: 0.72rem; font-weight: 600;
  border-radius: 999px; letter-spacing: 0.3px;
}
.pill-brand { background: var(--brand-lite); color: var(--brand); }
.pill-green { background: var(--green-lt); color: var(--green); }
.pill-red   { background: var(--red-lt); color: var(--red); }
.pill-accent{ background: var(--accent-lt); color: var(--accent); }

/* ==========================================================================
   TABS
   ========================================================================== */
.tabs {
  display: flex; gap: 4px; border-bottom: 1px solid var(--rule);
  margin-bottom: 20px; overflow-x: auto;
}
.tab {
  padding: 10px 16px;
  border: none; background: transparent;
  color: var(--ink-muted); font-weight: 600; font-size: 0.88rem;
  border-bottom: 2px solid transparent;
  transition: var(--transition);
  white-space: nowrap;
}
.tab:hover { color: var(--ink); }
.tab.is-active {
  color: var(--brand); border-bottom-color: var(--brand);
}

/* ==========================================================================
   CHART CONTAINERS
   ========================================================================== */
.chart-wrap {
  position: relative;
  height: 320px;
  margin: 12px 0;
}
.chart-wrap-sm { height: 220px; }

/* ==========================================================================
   MODAL
   ========================================================================== */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(15, 27, 45, 0.5);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--bg);
  border-radius: var(--radius-lg);
  max-width: 520px; width: 100%;
  padding: 28px;
  box-shadow: var(--shadow-lg);
  max-height: 85vh; overflow-y: auto;
}
.modal h2 { margin-bottom: 8px; }
.modal .actions {
  display: flex; gap: 10px; justify-content: flex-end;
  margin-top: 20px;
}
.contact-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--bg-alt); border-radius: 8px;
  margin-bottom: 8px;
  border: 1px solid var(--rule);
}
.contact-item-label { font-size: 0.78rem; color: var(--ink-muted); }
.contact-item-value { font-weight: 600; color: var(--ink); font-size: 0.95rem; }

/* ==========================================================================
   FOOTER
   ========================================================================== */
.app-footer {
  max-width: 1240px; margin: 20px auto 0;
  padding: 24px 24px 40px;
  border-top: 1px solid var(--rule);
  display: grid; grid-template-columns: 1fr auto; gap: 16px;
  align-items: center;
  color: var(--ink-muted); font-size: 0.82rem;
}
.app-footer a { color: var(--brand); font-weight: 600; }
.credit { display: flex; align-items: center; gap: 10px; }

/* ==========================================================================
   RESPONSIVE
   ========================================================================== */
@media (max-width: 720px) {
  .hero { padding: 24px 20px; }
  .hero h1 { font-size: 1.5rem; }
  .panel { padding: 20px; }
  .brand-text span { display: none; }
  .nav-actions .btn-lg-hide { display: none; }
  .app-footer { grid-template-columns: 1fr; text-align: center; }
}

/* ==========================================================================
   UTILS
   ========================================================================== */
.muted { color: var(--ink-muted); }
.text-right { text-align: right; }
.mt-2 { margin-top: 16px; } .mt-3 { margin-top: 24px; }
.mb-2 { margin-bottom: 16px; } .mb-3 { margin-bottom: 24px; }
.flex { display: flex; gap: 10px; } .flex-1 { flex: 1; }
.flex-wrap { flex-wrap: wrap; }
.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

.print-only { display: none; }
@media print {
  .app-nav, .app-footer, .no-print, .btn { display: none !important; }
  .panel { border: none; box-shadow: none; }
  body { background: white; }
}

/* ==========================================================================
   GOALS MODULE (multi-goal tracker, Multipl-style)
   ========================================================================== */
.goals-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.goals-summary {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px; margin-bottom: 20px;
}
.goals-summary .result-card { padding: 14px 16px; }
.goal-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
}
.goal-card {
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  display: flex; flex-direction: column; gap: 12px;
  position: relative; overflow: hidden;
}
.goal-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--goal-color, var(--brand));
}
.goal-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.goal-card-head { display: flex; align-items: flex-start; gap: 12px; }
.goal-card-icon {
  width: 48px; height: 48px; border-radius: 12px;
  background: var(--goal-tint, var(--brand-lite));
  color: var(--goal-color, var(--brand));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; flex-shrink: 0;
}
.goal-card-title { flex: 1; min-width: 0; }
.goal-card-title h4 { font-size: 1.02rem; margin: 0 0 2px 0; color: var(--ink); }
.goal-card-title .meta { font-size: 0.78rem; color: var(--ink-muted); }
.goal-progress {
  height: 10px; background: var(--bg-alt);
  border-radius: 999px; overflow: hidden; position: relative;
  border: 1px solid var(--rule);
}
.goal-progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--goal-color, var(--brand)) 0%, var(--goal-color-dark, var(--brand-dark)) 100%);
  border-radius: 999px;
  transition: width 400ms cubic-bezier(0.4, 0, 0.2, 1);
}
.goal-progress-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.82rem; color: var(--ink-soft);
}
.goal-progress-row strong { color: var(--ink); font-variant-numeric: tabular-nums; }
.goal-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px;
  font-size: 0.82rem;
  padding: 10px 0; border-top: 1px dashed var(--rule); border-bottom: 1px dashed var(--rule);
}
.goal-stat-label { color: var(--ink-muted); }
.goal-stat-value { color: var(--ink); font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
.goal-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.goal-actions .btn { padding: 6px 10px; font-size: 0.78rem; }

.goal-empty {
  border: 2px dashed var(--rule-strong);
  border-radius: var(--radius-lg);
  padding: 40px 24px;
  text-align: center;
  background: var(--bg-alt);
}
.goal-empty h3 { color: var(--ink); margin-bottom: 8px; }
.goal-empty p { color: var(--ink-muted); margin-bottom: 16px; }

.template-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
  gap: 8px; margin-bottom: 16px;
}

const STORAGE_KEY = "vipinPFM_v1";
const FM_KEY = "ff_v5"; // FinSaveManager's localStorage key — shared sync bridge

function loadState() {
  try {
    const own = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}") || {};
    // Fallback: if FinManager has restored from Drive on a new device and PFM key is empty, rehydrate from ff_v5.pfmModule
    if (Object.keys(own).length === 0) {
      const fm = JSON.parse(localStorage.getItem(FM_KEY) || "{}");
      if (fm && fm.pfmModule) return fm.pfmModule;
    }
    return own;
  }
  catch { return {}; }
}
function saveState(partial) {
  try {
    const existing = loadState();
    const merged = { ...existing, ...partial };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
    // Mirror into FinManager's data blob so its Google Drive sync carries PFM state too
    const fmRaw = localStorage.getItem(FM_KEY);
    if (fmRaw) {
      try {
        const fm = JSON.parse(fmRaw);
        fm.pfmModule = merged;
        fm.pfmUpdatedAt = new Date().toISOString();
        localStorage.setItem(FM_KEY, JSON.stringify(fm));
      } catch {}
    }
  } catch {}
}

// Read derived financial profile from FinManager if present
function readFinManagerProfile() {
  try {
    const fm = JSON.parse(localStorage.getItem(FM_KEY) || "null");
    if (!fm || !fm.accounts) return null;
    const accounts = fm.accounts || [];
    const txns = fm.transactions || [];
    const liquidNetWorth = accounts
      .filter(a => ["bank","cash","wallet","fd"].includes(a.type))
      .reduce((s, a) => s + (Number(a.balance) || 0), 0);
    // Average monthly expense over last 3 months of data
    const months = [...new Set(txns.map(t => t.month))].sort().slice(-3);
    const expByMonth = months.map(m => txns.filter(t => t.month === m && t.type === "expense").reduce((s,t) => s + (Number(t.amount)||0), 0));
    const avgMonthlyExpense = expByMonth.length ? expByMonth.reduce((a,b)=>a+b,0) / expByMonth.length : 0;
    const budgetMonthly = fm.budgetLimits ? Object.values(fm.budgetLimits).reduce((s,v)=>s+(Number(v)||0),0) : 0;
    const name = (fm.profile && fm.profile.name) || null;
    return { liquidNetWorth, avgMonthlyExpense, budgetMonthly, name, monthsAvailable: months.length };
  } catch { return null; }
}

function fmtINR(n, opts = {}) {
  if (n === null || n === undefined || isNaN(n)) return "₹0";
  const num = Math.round(n);
  if (opts.compact) {
    if (num >= 10000000) return "₹" + (num / 10000000).toFixed(2) + " Cr";
    if (num >= 100000)   return "₹" + (num / 100000).toFixed(2) + " L";
    if (num >= 1000)     return "₹" + (num / 1000).toFixed(1) + "k";
    return "₹" + num;
  }
  return "₹" + num.toLocaleString("en-IN");
}

function fmtPct(n, digits = 1) {
  return (n ?? 0).toFixed(digits) + "%";
}

// SIP future value — monthly compounding
function sipFV(monthly, annualRatePct, years) {
  const r = (annualRatePct / 100) / 12;
  const n = years * 12;
  if (r === 0) return monthly * n;
  return monthly * (((Math.pow(1 + r, n) - 1) / r) * (1 + r));
}

// Lumpsum future value
function lumpsumFV(amount, annualRatePct, years) {
  return amount * Math.pow(1 + annualRatePct / 100, years);
}

  }, deps);
  return (

function EmergencyFundModule({ onBack }) {
  const [monthlyExpense, setMonthlyExpense] = useState(60000);

  const [currentSaved, setCurrentSaved] = useState(0);
  const [buildMonths, setBuildMonths] = useState(12);

  useEffect(() => { saveState({ emergency: { monthlyExpense, months, currentSaved, buildMonths } }); },
    [monthlyExpense, months, currentSaved, buildMonths]);
  useEffect(() => {
    const s = loadState().emergency;
    if (s) { setMonthlyExpense(s.monthlyExpense ?? 60000); setMonths(s.months ?? 6); setCurrentSaved(s.currentSaved ?? 0); setBuildMonths(s.buildMonths ?? 12); }
  }, []);

  const calc = useMemo(() => {
    const target = monthlyExpense * months;
    const needed = Math.max(0, target - currentSaved);
    const monthlyContribution = needed / buildMonths;

    return { target, needed, monthlyContribution, tier1, tier2, tier3, progress };

function SIPModule({ onBack }) {
  const [monthly, setMonthly] = useState(25000);
  const [years, setYears] = useState(15);
  const [expectedReturn, setExpectedReturn] = useState(13);
  const [stepUp, setStepUp] = useState(10);

  useEffect(() => { saveState({ sip: { monthly, years, expectedReturn, stepUp } }); },
    [monthly, years, expectedReturn, stepUp]);
  useEffect(() => {
    const s = loadState().sip;
    if (s) { setMonthly(s.monthly ?? 25000); setYears(s.years ?? 15); setExpectedReturn(s.expectedReturn ?? 13); setStepUp(s.stepUp ?? 10); }
  }, []);

  const { fvPlain, fvStepUp, invested, investedStepUp, yearly } = useMemo(() => {
    // Plain SIP
    const fvPlain = sipFV(monthly, expectedReturn, years);
    const invested = monthly * 12 * years;

    // Step-up SIP (annual)
    let investedStepUp = 0;
    let fvStepUp = 0;
    const r = expectedReturn / 100 / 12;
    let currentMonthly = monthly;
    for (let y = 0; y < years; y++) {
      // FV at end of year: compound previous balance + SIP for 12 months
      const yearInvested = currentMonthly * 12;
      investedStepUp += yearInvested;
      // grow existing FV to end-of-year
      fvStepUp = fvStepUp * Math.pow(1 + r, 12);
      // add SIP contributions for this year (ordinary annuity, month-end)
      fvStepUp += currentMonthly * (((Math.pow(1 + r, 12) - 1) / r));
      currentMonthly *= (1 + stepUp / 100);
    }

    // Yearly progression for chart
    const yearly = [];
    let curMonthly = monthly;
    let fv = 0, inv = 0;
    for (let y = 1; y <= years; y++) {
      inv += curMonthly * 12;
      fv = fv * Math.pow(1 + r, 12) + curMonthly * (((Math.pow(1 + r, 12) - 1) / r));
      yearly.push({ year: y, invested: inv, fv });
      curMonthly *= (1 + stepUp / 100);
    }

    return { fvPlain, fvStepUp, invested, investedStepUp, yearly };
  }, [monthly, years, expectedReturn, stepUp]);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Part 5 · SIP Calculator</Eyebrow>
        <h2>See your money grow — with step-up SIPs</h2>

        <div className="form-row">
          <NumberInput label="Monthly SIP Amount" value={monthly} onChange={setMonthly} placeholder="25000" />
          <Slider label={`Investment Period (${years} years)`} value={years} onChange={setYears} min={1} max={30} step={1} suffix=" yrs" />
          <Slider label={`Expected Annual Return (${expectedReturn}%)`} value={expectedReturn} onChange={setExpectedReturn} min={6} max={20} step={0.5} suffix="%" />
          <Slider label={`Annual Step-Up (${stepUp}%)`} value={stepUp} onChange={setStepUp} min={0} max={20} step={1} suffix="%" />
        </div>

        <div className="result-grid">
          <StatCard label="Total Invested (Plain SIP)" value={fmtINR(invested, { compact: true })} variant="brand" />
          <StatCard label="Future Value (Plain SIP)" value={fmtINR(fvPlain, { compact: true })} variant="green" />
          <StatCard label="Total Invested (Step-Up SIP)" value={fmtINR(investedStepUp, { compact: true })} variant="brand" />
          <StatCard label="Future Value (Step-Up SIP)" value={fmtINR(fvStepUp, { compact: true })}
            sub={fmtINR(fvStepUp - fvPlain, { compact: true }) + " extra vs plain"} variant="accent" />
        </div>

        <ChartWrap
          deps={[yearly]}
          renderChart={(canvas) => new Chart(canvas, {
            type: "line",
            data: {
              labels: yearly.map(p => `Y${p.year}`),

                {

                  borderColor: "#6B7280", backgroundColor: "rgba(107,114,128,0.08)",

                },
                {

  { key: "baby",       icon: "👶", name: "New Baby",           years: 2, inflation: 7, ret: 8,  color: "#EC4899", tint: "#FCE7F3" },
  { key: "custom",     icon: "🎯", name: "Custom Goal",        years: 5, inflation: 6, ret: 11, color: "#0B5394", tint: "#E7F0F9" },
];

function getTemplate(key) {
  return GOAL_TEMPLATES.find(t => t.key === key) || GOAL_TEMPLATES[GOAL_TEMPLATES.length - 1];
}

function computeGoal(g) {
  const now = new Date();
  const tgt = new Date(g.targetDate);
  const monthsLeft = Math.max(1, (tgt.getFullYear() - now.getFullYear()) * 12 + (tgt.getMonth() - now.getMonth()));
  const yearsLeft = monthsLeft / 12;
  const futureTarget = g.target * Math.pow(1 + (g.inflation || 0) / 100, yearsLeft);
  const savedFV = lumpsumFV(g.saved || 0, g.ret, yearsLeft);
  const contribFV = sipFV(g.monthly || 0, g.ret, yearsLeft);
  const projected = savedFV + contribFV;
  const progressPct = Math.min(100, ((g.saved || 0) / futureTarget) * 100);
  const onTrackPct = Math.min(999, (projected / futureTarget) * 100);
  // Required monthly SIP to close the gap on top of current savings
  const shortfall = Math.max(0, futureTarget - savedFV);
  const r = g.ret / 100 / 12;
  const n = monthsLeft;
  const requiredMonthly = shortfall > 0 ? shortfall / (((Math.pow(1 + r, n) - 1) / r) * (1 + r)) : 0;
  let status = "behind";
  if (onTrackPct >= 100) status = "ahead";
  else if (onTrackPct >= 95) status = "on-track";
  return { yearsLeft, monthsLeft, futureTarget, projected, progressPct, onTrackPct, requiredMonthly, status };
}

function uid() { return "g_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7); }

function defaultTargetDate(years) {
  const d = new Date();
  d.setFullYear(d.getFullYear() + (years || 5));
  return d.toISOString().slice(0, 7); // YYYY-MM
}

function fmtTargetDate(ym) {
  if (!ym) return "—";
  const [y, m] = ym.split("-").map(Number);
  return new Date(y, (m || 1) - 1, 1).toLocaleDateString("en-IN", { month: "short", year: "numeric" });
}

    targetDate: defaultTargetDate(5),

    update({
      template: key,

      name: form.name && !isNew ? form.name : t.name,
      targetDate: defaultTargetDate(t.years),

      inflation: t.inflation,

function GoalPlannerModule({ onBack }) {
  const [goalAmount, setGoalAmount] = useState(5000000);
  const [years, setYears] = useState(10);
  const [currentSavings, setCurrentSavings] = useState(0);
  const [inflation, setInflation] = useState(6);
  const [returnRate, setReturnRate] = useState(12);

  useEffect(() => { saveState({ goal: { goalAmount, years, currentSavings, inflation, returnRate } }); },
    [goalAmount, years, currentSavings, inflation, returnRate]);
  useEffect(() => {
    const s = loadState().goal;
    if (s) { setGoalAmount(s.goalAmount ?? 5000000); setYears(s.years ?? 10); setCurrentSavings(s.currentSavings ?? 0); setInflation(s.inflation ?? 6); setReturnRate(s.returnRate ?? 12); }
  }, []);

  const calc = useMemo(() => {
    // Inflate target to future value
    const futureGoal = goalAmount * Math.pow(1 + inflation / 100, years);
    // Grow current savings
    const savingsFV = lumpsumFV(currentSavings, returnRate, years);
    // Shortfall to SIP
    const shortfall = Math.max(0, futureGoal - savingsFV);
    // Required monthly SIP to bridge shortfall
    const r = returnRate / 100 / 12;
    const n = years * 12;
    const monthlySIP = shortfall > 0 ? shortfall / (((Math.pow(1 + r, n) - 1) / r) * (1 + r)) : 0;
    // Recommended horizon-based allocation
    let recommendedAllocation = "";
    if (years <= 3)      recommendedAllocation = "Liquid Funds, Arbitrage Funds, FDs — no equity";
    else if (years <= 7) recommendedAllocation = "Balanced Advantage / Aggressive Hybrid Funds, Corporate bonds (30-50% equity)";
    else                 recommendedAllocation = "Equity Mutual Funds, Index Funds, some small-cap exposure, Gold";

    return { futureGoal, savingsFV, shortfall, monthlySIP, recommendedAllocation };
  }, [goalAmount, years, currentSavings, inflation, returnRate]);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Goal Planner</Eyebrow>
        <h2>Plan for anything — retirement, home, education</h2>
        <p>Use the SMART method: Specific, Measurable, Achievable, Relevant, Time-bound. Not "save for retirement" — instead "accumulate ₹5 Cr by age 60." The clearer the goal, the easier the plan.</p>

        <div className="form-row">
          <NumberInput label="Goal Amount (in today's value)" value={goalAmount} onChange={setGoalAmount} placeholder="5000000" hint="What it costs today" />
          <Slider label={`Years to Goal (${years})`} value={years} onChange={setYears} min={1} max={35} step={1} suffix=" yrs" />
          <NumberInput label="Already Saved for This Goal" value={currentSavings} onChange={setCurrentSavings} placeholder="0" />
          <Slider label={`Inflation Rate (${inflation}%)`} value={inflation} onChange={setInflation} min={3} max={10} step={0.5} suffix="%" />
          <Slider label={`Expected Return (${returnRate}%)`} value={returnRate} onChange={setReturnRate} min={6} max={18} step={0.5} suffix="%" />
        </div>

        <div className="result-grid">
          <StatCard label="Future Goal Cost" value={fmtINR(calc.futureGoal, { compact: true })} sub={`After ${inflation}% inflation`} variant="red" />
          <StatCard label="Current Savings Will Grow To" value={fmtINR(calc.savingsFV, { compact: true })} variant="green" />
          <StatCard label="Shortfall to Bridge" value={fmtINR(calc.shortfall, { compact: true })} variant="accent" />
          <StatCard label="Required Monthly SIP" value={fmtINR(calc.monthlySIP, { compact: true })} variant="brand" />
        </div>

        <Callout title="Right investment for your horizon" variant="brand">
          For a {years}-year goal: <strong>{calc.recommendedAllocation}</strong>
        </Callout>
      </div>
    </>
  );
}

   ============================================================================= */

function GoldModule({ onBack }) {
  const [amount, setAmount] = useState(500000);
  const [years, setYears] = useState(8);
  const [goldReturn, setGoldReturn] = useState(9);

  useEffect(() => { saveState({ gold: { amount, years, goldReturn } }); }, [amount, years, goldReturn]);
  useEffect(() => {
    const s = loadState().gold;
    if (s) { setAmount(s.amount ?? 500000); setYears(s.years ?? 8); setGoldReturn(s.goldReturn ?? 9); }
  }, []);

  const calc = useMemo(() => {
    const sgbMain = lumpsumFV(amount, goldReturn, years);
    const sgbInterest = amount * 0.025 * years; // 2.5% simple interest on issue price
    const sgbTotal = sgbMain + sgbInterest;
    // ETF erosion by expense ratio ~0.35%
    const etfReturn = goldReturn - 0.35;
    const etfValue = lumpsumFV(amount, etfReturn, years);
    const etfTax = (etfValue - amount) * 0.125;
    const etfNet = etfValue - etfTax;
    // Digital gold: 3% GST loss upfront
    const digitalInitial = amount * 0.97;
    const digitalValue = lumpsumFV(digitalInitial, goldReturn, years);
    const digitalTax = (digitalValue - digitalInitial) * 0.125;
    const digitalNet = digitalValue - digitalTax;
    return { sgbTotal, sgbInterest, etfValue, etfNet, digitalNet };
  }, [amount, years, goldReturn]);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Part 5 · Gold</Eyebrow>
        <h2>SGB vs Gold ETF vs Digital Gold</h2>
        <p>Gold belongs in 5–15% of your portfolio. But how you hold it matters a lot.</p>

        <div className="form-row">
          <NumberInput label="Investment Amount" value={amount} onChange={setAmount} placeholder="500000" />
          <Slider label={`Investment Period (${years} years)`} value={years} onChange={setYears} min={1} max={20} step={1} suffix=" yrs" />
          <Slider label={`Expected Gold Return (${goldReturn}%)`} value={goldReturn} onChange={setGoldReturn} min={5} max={15} step={0.5} suffix="%" />
        </div>

        <div className="result-grid">
          <StatCard label="SGB — Total Value"
            value={fmtINR(calc.sgbTotal, { compact: true })}
            sub={`Incl. ₹${fmtINR(calc.sgbInterest, {compact:true}).replace("₹","")} interest; tax-free at maturity`}
            variant="green" />
          <StatCard label="Gold ETF — Net Value"
            value={fmtINR(calc.etfNet, { compact: true })}
            sub="After 0.35% expense + 12.5% LTCG"
            variant="brand" />
          <StatCard label="Digital Gold — Net Value"
            value={fmtINR(calc.digitalNet, { compact: true })}
            sub="After 3% GST entry + 12.5% LTCG"
            variant="accent" />
          <StatCard label="SGB vs ETF Advantage"
            value={fmtINR(calc.sgbTotal - calc.etfNet, { compact: true })}
            sub="Extra over ETF in same period"
            variant="green" />
        </div>

        <div className="tbl-wrap mt-2">
          <table className="tbl">
            <thead>
              <tr><th></th><th>Sovereign Gold Bonds</th><th>Gold ETFs</th><th>Digital Gold (apps)</th></tr>
            </thead>
            <tbody>
              <tr><td><strong>Extra Interest</strong></td><td className="highlight">2.5% per year ✓</td><td>None</td><td>None</td></tr>
              <tr><td><strong>Tax on Gains</strong></td><td className="highlight">Zero at maturity (8 yrs)</td><td>12.5% LTCG after 1 yr</td><td>12.5% LTCG after 2 yrs</td></tr>
              <tr><td><strong>Expense Ratio</strong></td><td className="highlight">Zero</td><td>0.10–0.60%/yr</td><td>Hidden spreads + 3% GST</td></tr>
              <tr><td><strong>Liquidity</strong></td><td>Low (8-yr lock)</td><td className="highlight">High (trade instantly)</td><td>High (sell in-app)</td></tr>
              <tr><td><strong>Best Use</strong></td><td>Long-term (5+ yrs)</td><td>Monthly SIP</td><td>Small amounts only</td></tr>
            </tbody>
          </table>
        </div>

        <Callout title="Important (April 2026)" variant="accent">
          RBI has paused new SGB issues since 2024. You can still buy existing SGBs on NSE/BSE exchanges — but <strong>tax-free gains at maturity only apply to direct-from-RBI purchases</strong>. For fresh gold investments today, <strong>Gold ETFs are the most practical choice</strong>.
        </Callout>
      </div>
    </>
  );
}

function TaxModule({ onBack }) {
  const [equityST, setEquityST] = useState(0);
  const [equityLT, setEquityLT] = useState(200000);
  const [debt, setDebt] = useState(0);
  const [crypto, setCrypto] = useState(0);
  const [slab, setSlab] = useState(30);

  useEffect(() => { saveState({ tax: { equityST, equityLT, debt, crypto, slab } }); },
    [equityST, equityLT, debt, crypto, slab]);
  useEffect(() => {
    const s = loadState().tax;
    if (s) { setEquityST(s.equityST ?? 0); setEquityLT(s.equityLT ?? 200000); setDebt(s.debt ?? 0); setCrypto(s.crypto ?? 0); setSlab(s.slab ?? 30); }
  }, []);

  const taxes = useMemo(() => {
    const tEquityST = equityST * 0.20;
    const equityLTTaxable = Math.max(0, equityLT - 125000);
    const tEquityLT = equityLTTaxable * 0.125;
    const tDebt = debt * (slab / 100);
    const tCrypto = crypto * 0.30 + crypto * 0.30 * 0.04; // 30% + 4% cess
    const total = tEquityST + tEquityLT + tDebt + tCrypto;
    const totalGains = equityST + equityLT + debt + crypto;
    const effective = totalGains > 0 ? (total / totalGains) * 100 : 0;
    return { tEquityST, tEquityLT, tDebt, tCrypto, total, effective, equityLTTaxable };
  }, [equityST, equityLT, debt, crypto, slab]);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Part 6 · Tax Calculator</Eyebrow>
        <h2>After-tax returns are what matter</h2>
        <p>Rules effective FY 2026-27. Big change from July 2024: indexation benefit on debt funds is gone.</p>

        <div className="form-row">
          <NumberInput label="Equity Gains — Short-Term (< 12 months)" value={equityST} onChange={setEquityST} placeholder="0" />
          <NumberInput label="Equity Gains — Long-Term (≥ 12 months)" value={equityLT} onChange={setEquityLT} placeholder="200000" hint="First ₹1.25 L per year is tax-free" />
          <NumberInput label="Debt Fund Gains / FD Interest" value={debt} onChange={setDebt} placeholder="0" />
          <NumberInput label="Crypto Profits" value={crypto} onChange={setCrypto} placeholder="0" hint="30% flat regardless of holding period" />
          <div className="form-group">
            <label className="form-label">Your Income Tax Slab</label>
            <select className="form-select" value={slab} onChange={e => setSlab(Number(e.target.value))}>
              <option value={5}>5% slab</option>
              <option value={10}>10% slab</option>
              <option value={15}>15% slab</option>
              <option value={20}>20% slab</option>
              <option value={30}>30% slab</option>
            </select>
          </div>
        </div>

        <div className="result-grid">
          <StatCard label="Equity ST Tax (20%)" value={fmtINR(taxes.tEquityST, {compact: true})} variant="red" />
          <StatCard label="Equity LT Tax (12.5%)" value={fmtINR(taxes.tEquityLT, {compact: true})} sub={`On ${fmtINR(taxes.equityLTTaxable, {compact: true})} after ₹1.25L exemption`} variant="accent" />
          <StatCard label="Debt / FD Tax" value={fmtINR(taxes.tDebt, {compact: true})} sub={`${slab}% slab rate`} variant="red" />
          <StatCard label="Crypto Tax (30% + cess)" value={fmtINR(taxes.tCrypto, {compact: true})} variant="red" />
          <StatCard label="Total Tax Liability" value={fmtINR(taxes.total, {compact: true})} variant="red" />
          <StatCard label="Effective Tax Rate" value={fmtPct(taxes.effective)} variant="accent" />
        </div>
      </div>

      <div className="panel">
        <h2>Tax rates at a glance — FY 2026-27</h2>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead>
              <tr><th>Asset</th><th>Short-Term</th><th>Long-Term</th></tr>
            </thead>
            <tbody>
              {TAX_RATES.map((t, i) => (
                <tr key={i}>
                  <td><strong>{t.asset}</strong></td>
                  <td>{t.shortTerm}</td>
                  <td className={t.special ? "highlight" : ""}>
                    {t.bad ? <span className="pill pill-red">{t.longTerm}</span>
                     : t.good ? <span className="pill pill-green">{t.longTerm}</span>
                     : t.longTerm}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <Callout title="The Arbitrage Fund tax hack" variant="green">
          Arbitrage funds are SEBI-classified as equity, so gains get the 12.5% LTCG rate instead of your slab rate. If you're in the 30% tax bracket and parking cash 1+ years, arbitrage funds beat FDs post-tax at similar pre-tax yields.
        </Callout>

                labels: SAMPLE_PORTFOLIO.map(p => p.label),
                datasets: [{
                  data: SAMPLE_PORTFOLIO.map(p => p.pct),
                  backgroundColor: SAMPLE_PORTFOLIO.map(p => p.color),
                  borderWidth: 2, borderColor: "#FFFFFF"
                }]
              },
              options: {
                responsive: true, maintainAspectRatio: false,
                cutout: "55%",
                plugins: {
                  legend: { position: "bottom", labels: { font: { family: "Calibri", size: 10 }, color: "#0F1B2D", padding: 8, boxWidth: 14 } }
                }
              }
            })}
          />
          <div>
            <Callout title="Rebalance once a year" variant="brand">
              If gold has grown from 10% to 15% of your portfolio, sell the extra 5% and buy whatever is lagging (usually equity). This forces "sell high, buy low" automatically.
            </Callout>
            <Callout title="Increase SIPs 10% yearly" variant="green">
              Every salary hike: raise your SIP first, then lifestyle. Every bonus: split into three — emergency top-up, lump-sum investment, and a small indulgence.
            </Callout>
          </div>
        </div>
      </div>
    </>
  );
}

/* =============================================================================
   MODULE 10: 4-MONTH ACTION PLAN
   ============================================================================= */

function ActionPlanModule({ onBack }) {
  const [checks, setChecks] = useState(loadState().checks || {});
  const toggle = (k) => {
    const updated = { ...checks, [k]: !checks[k] };
    setChecks(updated);
    saveState({ checks: updated });
  };

  const sections = [
    {
      title: "Month 1 — Protection", variant: "red", items: [
        { k: "m1_1", t: "Buy family health cover: ₹10-30L base + ₹50L super top-up" },
        { k: "m1_2", t: "Buy term insurance: 15× annual income, till age 65 or 70" },
        { k: "m1_3", t: "Buy personal accident cover: 5× annual income" },
        { k: "m1_4", t: "Share all policy details in a single doc with spouse/family" },
      ]
    },
    {
      title: "Months 2–3 — Emergency Fund", variant: "accent", items: [
        { k: "m23_1", t: "Calculate your essential monthly expenses" },
        { k: "m23_2", t: "Keep 1 month of expenses in savings account" },
        { k: "m23_3", t: "Park 2 months in a Liquid Mutual Fund" },
        { k: "m23_4", t: "Target 3 more months in sweep-in FD / arbitrage fund" },
      ]
    },
    {
      title: "Month 4+ — Investing", variant: "green", items: [
        { k: "m4_1", t: "Open a direct MF account (Groww, Kuvera, or Zerodha Coin)" },
        { k: "m4_2", t: "Start monthly SIPs across 3–4 fund categories" },
        { k: "m4_3", t: "Set up annual SIP step-up (10% increase every year)" },
        { k: "m4_4", t: "Automate — investments come out on salary day, not as leftover" },
      ]
    },
    {
      title: "Every Year", variant: "brand", items: [
        { k: "y_1", t: "Review insurance — cover still adequate? Premiums paid?" },
        { k: "y_2", t: "Review portfolio allocation — rebalance if needed" },
        { k: "y_3", t: "Update nominees on all accounts" },
        { k: "y_4", t: "File ITR; track capital gains carefully" },
      ]
    },
  ];

  const totalItems = sections.reduce((a, s) => a + s.items.length, 0);
  const doneItems = sections.reduce((a, s) => a + s.items.filter(i => checks[i.k]).length, 0);
  const progress = Math.round((doneItems / totalItems) * 100);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Action Plan</Eyebrow>
        <h2>Your 4-month roadmap</h2>
        <p>Most people take 3–6 months to complete this. What matters is that you finish it. Check items off as you go — progress saves automatically.</p>

        <div style={{
          padding: "16px 20px", background: "var(--brand-lite)",
          borderRadius: "var(--radius)", marginTop: 12
        }}>
          <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8}}>
            <strong style={{color: "var(--brand)"}}>Overall Progress</strong>
            <strong style={{color: "var(--brand)"}}>{doneItems} / {totalItems} done ({progress}%)</strong>
          </div>
          <div style={{height: 8, borderRadius: 4, background: "rgba(11,83,148,0.12)", overflow: "hidden"}}>
            <div style={{
              height: "100%", width: `${progress}%`,
              background: "linear-gradient(90deg, var(--brand) 0%, var(--accent) 100%)",
              transition: "width 400ms ease"
            }}></div>
          </div>
        </div>
      </div>

      {sections.map((s, si) => (
        <div key={si} className="panel">
          <h3 style={{
            color: `var(--${s.variant})`,
            display: "flex", alignItems: "center", gap: 10
          }}>
            <span style={{
              display: "inline-block", width: 8, height: 24,
              background: `var(--${s.variant})`, borderRadius: 4
            }}></span>
            {s.title}
          </h3>
          <div style={{display: "grid", gap: 10, marginTop: 14}}>
            {s.items.map((it, i) => (
              <label key={i} style={{
                display: "flex", alignItems: "flex-start", gap: 12,
                padding: "12px 16px", border: "1px solid var(--rule)",
                borderRadius: 8, background: checks[it.k] ? "var(--green-lt)" : "var(--bg)",
                cursor: "pointer", transition: "all 180ms"
              }}>
                <input
                  type="checkbox"
                  checked={!!checks[it.k]}
                  onChange={() => toggle(it.k)}
                  style={{marginTop: 3, width: 18, height: 18, accentColor: "var(--green)"}}
                />
                <span style={{
                  fontSize: "0.92rem",
                  color: checks[it.k] ? "var(--green)" : "var(--ink)",
                  textDecoration: checks[it.k] ? "line-through" : "none"
                }}>{it.t}</span>
              </label>
            ))}
          </div>
        </div>
      ))}

      <Callout title="A final thought" variant="accent">
        Personal finance is 80% behaviour and 20% knowledge. What you do consistently over 20 years matters far more than picking the 'perfect' fund. <strong>Start imperfectly — start today.</strong>
      </Callout>
    </>
  );
}
