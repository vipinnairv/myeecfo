<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MyeeCFO – by Vipin Nair</title>
<meta name="description" content="Personal Fund & Budget Manager with Google Drive sync"/>
<!-- Google Identity Services (for OAuth2 login) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<!-- Google API client library (for Drive API calls) -->
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#00b386;--gd:#007a62;--gl:#e6f9f4;--gxl:#f0fdf9;
  --b:#2563eb;--bl:#eff6ff;--bd:#1e40af;
  --r:#dc2626;--rl:#fef2f2;
  --o:#d97706;--ol:#fffbeb;
  --p:#7c3aed;--pl:#f5f3ff;
  --t:#0d9488;--tl:#f0fdfa;
  --n50:#f8fafc;--n100:#f1f5f9;--n200:#e2e8f0;--n300:#cbd5e1;
  --n400:#94a3b8;--n500:#64748b;--n600:#475569;--n700:#334155;--n800:#1e293b;--n900:#0f172a;
  --W:#fff;
  --xs:0 1px 2px rgba(0,0,0,.04);
  --sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.04);
  --lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.04);
  --xl:0 20px 25px -5px rgba(0,0,0,.08),0 8px 10px -6px rgba(0,0,0,.04);
  --r4:4px;--r6:6px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;
  --f:'Plus Jakarta Sans',sans-serif;--m:'JetBrains Mono',monospace;
  --sb:238px;
}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--n50);color:var(--n900);line-height:1.5;-webkit-font-smoothing:antialiased}
#root{display:flex;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--n200);border-radius:99px}

/* ── SIDEBAR ─────────────────────────────────── */
.sb{width:var(--sb);background:var(--W);border-right:1px solid var(--n100);position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;z-index:200;overflow-y:auto}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid var(--n100);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--g),var(--gd));border-radius:10px;display:grid;place-items:center;flex-shrink:0;box-shadow:0 3px 8px rgba(0,179,134,.3)}
.sb-mark svg{width:18px;height:18px;fill:#fff}
.sb-app{font-weight:800;font-size:14px;color:var(--n900);letter-spacing:-.3px;line-height:1.2}
.sb-period{font-size:9.5px;color:var(--n400);font-weight:500}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-group{padding:10px 12px 3px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--n400)}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;margin:1px 5px;border-radius:var(--r6);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--n500);transition:all .13s;position:relative;user-select:none}
.sb-item:hover{background:var(--n50);color:var(--n800)}
.sb-item.on{background:var(--gl);color:var(--gd);font-weight:700}
.sb-item.on::before{content:'';position:absolute;left:-5px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--g);border-radius:0 3px 3px 0}
.sb-ic{width:15px;height:15px;flex-shrink:0;opacity:.65}
.sb-item.on .sb-ic{opacity:1}
.sb-badge{margin-left:auto;font-size:9px;font-weight:700;background:var(--r);color:#fff;padding:1px 5px;border-radius:99px;min-width:17px;text-align:center}
.sb-foot{padding:10px 8px;border-top:1px solid var(--n100);flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:9px;padding:7px;border-radius:var(--r8);cursor:pointer;transition:background .13s}
.sb-user:hover{background:var(--n50)}
.sb-av{width:30px;height:30px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:grid;place-items:center;font-size:11.5px;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{font-size:12px;font-weight:600;color:var(--n700)}
.sb-uemail{font-size:10px;color:var(--n400)}

/* ── MAIN ───────────────────────────────────── */
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--W);border-bottom:1px solid var(--n100);height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--xs)}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-title{font-size:14px;font-weight:700;color:var(--n900)}
.tb-right{display:flex;align-items:center;gap:7px}
.page{padding:18px 20px 100px;flex:1;max-width:1400px;width:100%}

/* ── CARD ───────────────────────────────────── */
.card{background:var(--W);border:1px solid var(--n100);border-radius:var(--r12);padding:16px 18px;box-shadow:var(--xs);transition:box-shadow .13s}
.card:hover{box-shadow:var(--sm)}
.card.flat{box-shadow:none}
.cl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--n400);margin-bottom:4px}
.cv{font-size:20px;font-weight:800;font-family:var(--m);color:var(--n900);line-height:1.15;letter-spacing:-.6px}
.cv.g{color:var(--gd)} .cv.r{color:var(--r)} .cv.o{color:var(--o)} .cv.b{color:var(--b)} .cv.p{color:var(--p)}
.cm{font-size:11px;color:var(--n400);margin-top:3px}
.ci{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;margin-bottom:10px}
.ci svg{width:18px;height:18px}

/* ── GRIDS ──────────────────────────────────── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row{display:flex;gap:12px}
.col{flex:1}
.mb1{margin-bottom:5px}.mb2{margin-bottom:10px}.mb3{margin-bottom:16px}.mb4{margin-bottom:22px}

/* ── TABLE ──────────────────────────────────── */
.tw{overflow-x:auto;border-radius:var(--r12);border:1px solid var(--n100);background:var(--W)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--n50);border-bottom:1px solid var(--n100)}
th{padding:9px 12px;text-align:left;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--n500);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--n50);color:var(--n700);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafbfc}
.num{font-family:var(--m);text-align:right;font-size:12px}
.pos{color:var(--gd);font-weight:600}.neg{color:var(--r);font-weight:600}
.tft td{background:var(--n50)!important;font-weight:700;border-top:2px solid var(--n200)}

/* ── PROGRESS ───────────────────────────────── */
.prog{height:5px;background:var(--n100);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width .5s ease}

/* ── TAGS ───────────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:10.5px;font-weight:600;white-space:nowrap}
.tg{background:var(--gl);color:var(--gd)}.tr{background:var(--rl);color:var(--r)}
.tb{background:var(--bl);color:var(--bd)}.to{background:var(--ol);color:var(--o)}
.tx{background:var(--n100);color:var(--n500)}.tp{background:var(--pl);color:var(--p)}

/* ── FORM ───────────────────────────────────── */
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--n500)}
.fg input,.fg select,.fg textarea{padding:8px 11px;border:1.5px solid var(--n200);border-radius:var(--r6);font-size:13px;font-family:var(--f);color:var(--n900);background:var(--W);outline:none;transition:border-color .13s,box-shadow .13s;width:100%}
.fg input:focus,.fg select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(0,179,134,.1)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.f3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.f4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}

/* ── BUTTONS ─────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r6);font-size:12.5px;font-weight:600;font-family:var(--f);cursor:pointer;border:none;transition:all .13s;white-space:nowrap;line-height:1}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-p{background:var(--g);color:#fff;box-shadow:0 1px 3px rgba(0,179,134,.25)}
.btn-p:hover{background:var(--gd)}
.btn-s{background:var(--W);color:var(--n700);border:1.5px solid var(--n200)}
.btn-s:hover{background:var(--n50);border-color:var(--n300)}
.btn-d{background:var(--rl);color:var(--r)}
.btn-d:hover{background:var(--r);color:#fff}
.btn-g{background:transparent;color:var(--n500);padding:5px 8px}
.btn-g:hover{background:var(--n100);color:var(--n700)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.bic{padding:6px;border-radius:var(--r6);background:var(--n50);border:1px solid var(--n200);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .13s;color:var(--n500)}
.bic:hover{background:var(--n100);color:var(--n700)}
.bic svg{width:12px;height:12px}
.bic.red{color:var(--r)}
.bic.red:hover{background:var(--r);color:#fff}

/* ── TOGGLE ─────────────────────────────────── */
.tgl{display:flex;background:var(--n100);border-radius:99px;padding:3px;gap:2px}
.tgo{padding:5px 12px;border-radius:99px;font-size:11.5px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--n500);transition:all .13s;font-family:var(--f)}
.tgo.on{background:var(--W);color:var(--gd);box-shadow:var(--xs)}

/* ── MODAL ──────────────────────────────────── */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--W);border-radius:var(--r16);box-shadow:var(--xl);width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.mh{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-size:15px;font-weight:700}
.mb{padding:14px 20px}
.mf{padding:0 20px 18px;display:flex;justify-content:flex-end;gap:8px}

/* ── SECTION HEADER ─────────────────────────── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sh-t{font-size:13px;font-weight:700;color:var(--n900);display:flex;align-items:center;gap:7px}

/* ── ALERTS ──────────────────────────────────── */
.alert{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-radius:var(--r8);font-size:12px;margin-bottom:12px}
.alert svg{width:14px;height:14px;flex-shrink:0;margin-top:1px}
.aw{background:var(--ol);color:#92400e;border-left:3px solid var(--o)}
.ai{background:var(--bl);color:var(--bd);border-left:3px solid var(--b)}
.as{background:var(--gl);color:var(--gd);border-left:3px solid var(--g)}
.ae{background:var(--rl);color:var(--r);border-left:3px solid var(--r)}

/* ── TOAST ──────────────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;z-index:2000;color:#fff;padding:10px 15px;border-radius:var(--r8);font-size:12.5px;font-weight:500;box-shadow:var(--xl);display:flex;align-items:center;gap:8px;animation:tin .22s ease}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.toast.g{background:var(--gd)}.toast.r{background:var(--r)}.toast.x{background:var(--n800)}

/* ── DONUT ──────────────────────────────────── */
.donut{position:relative;display:inline-flex;align-items:center;justify-content:center}
.donut-c{position:absolute;text-align:center;pointer-events:none}

/* ── STAT ROW ───────────────────────────────── */
.sr{display:flex;align-items:center;justify-content:space-between;padding:7.5px 0;border-bottom:1px solid var(--n50)}
.sr:last-child{border-bottom:none}
.sr-l{font-size:12.5px;color:var(--n600)}
.sr-v{font-family:var(--m);font-size:12.5px;font-weight:600}

/* ── CC DUE CARDS ─────────────────────────────── */
.due-card{border-radius:var(--r12);padding:14px 16px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:8px}
.due-card::before{content:'';position:absolute;right:-15px;top:-15px;width:80px;height:80px;background:rgba(255,255,255,.1);border-radius:50%}
.due-urgency{display:flex;align-items:center;justify-content:space-between}
.due-days-badge{padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;backdrop-filter:blur(4px)}
.due-bank{font-size:10px;font-weight:700;opacity:.7;letter-spacing:.5px;text-transform:uppercase}
.due-card-type{font-size:13px;font-weight:700;margin-top:1px}
.due-amount-row{display:flex;justify-content:space-between;align-items:flex-end}
.due-amount{font-family:var(--m);font-size:18px;font-weight:800}
.due-date-block{text-align:right}
.due-date-label{font-size:9px;opacity:.65;text-transform:uppercase;letter-spacing:.5px}
.due-date-val{font-size:12px;font-weight:700}

/* ── ACCOUNT ROW ───────────────────────────── */
.acc-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--n50)}
.acc-row:last-child{border-bottom:none}
.acc-ic{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;font-size:10px;font-weight:700}
.acc-name{font-size:12.5px;font-weight:600;color:var(--n800)}
.acc-no{font-size:10px;color:var(--n400);font-family:var(--m)}
.acc-bal{margin-left:auto;text-align:right}
.acc-num{font-family:var(--m);font-size:13px;font-weight:700}

/* ── MONTH CHIPS ────────────────────────────── */
.mbar{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.mbar::-webkit-scrollbar{display:none}
.mchip{padding:5px 11px;border-radius:99px;font-size:11.5px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid var(--n200);background:var(--W);color:var(--n500);transition:all .13s;flex-shrink:0}
.mchip.on{background:var(--g);color:#fff;border-color:var(--g);box-shadow:0 2px 6px rgba(0,179,134,.25)}
.mchip:hover:not(.on){border-color:var(--g);color:var(--gd)}

/* ── DASHBOARD SPECIAL ──────────────────────── */
.hero{background:linear-gradient(135deg,#0a2540 0%,#1a4a6e 45%,#0d6e5a 100%);border-radius:var(--r16);padding:22px 24px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:rgba(0,179,134,.12);border-radius:50%}
.hero::before{content:'';position:absolute;right:80px;bottom:-60px;width:160px;height:160px;background:rgba(255,255,255,.04);border-radius:50%}
.hero-label{font-size:11px;opacity:.65;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.hero-amount{font-family:var(--m);font-size:32px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.hero-sub{font-size:11.5px;opacity:.6;margin-top:5px}
.hero-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;position:relative;z-index:1}
.hero-pill{background:rgba(255,255,255,.12);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.15);border-radius:var(--r8);padding:8px 12px;min-width:100px}
.hero-pill-label{font-size:9px;opacity:.6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.hero-pill-val{font-family:var(--m);font-size:14px;font-weight:700}
.hero-pill-val.gr{color:#6ee7b7}
.hero-pill-val.rd{color:#fca5a5}
.hero-pill-val.yw{color:#fcd34d}

/* ── KPI CARD SPECIAL ───────────────────────── */
.kpi-card{background:var(--W);border:1px solid var(--n100);border-radius:var(--r12);padding:16px 18px;box-shadow:var(--xs);position:relative;overflow:hidden;transition:all .15s}
.kpi-card:hover{box-shadow:var(--md);transform:translateY(-1px)}
.kpi-card::after{content:'';position:absolute;right:-20px;top:-20px;width:70px;height:70px;border-radius:50%;opacity:.06}
.kpi-card.g::after{background:var(--g)}
.kpi-card.r::after{background:var(--r)}
.kpi-card.o::after{background:var(--o)}
.kpi-card.b::after{background:var(--b)}
.kpi-ic-wrap{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi-ic{width:36px;height:36px;border-radius:9px;display:grid;place-items:center}
.kpi-ic svg{width:17px;height:17px}
.kpi-trend{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px}

/* ── CHART BARS ─────────────────────────────── */
.barchart{display:flex;align-items:flex-end;gap:3px;padding-top:8px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center}
.barpair{display:flex;gap:1.5px;align-items:flex-end;width:100%}
.bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:height .4s ease;cursor:pointer}
.bar:hover{opacity:.8}
.bar-lbl{font-size:8.5px;color:var(--n400);margin-top:3px;white-space:nowrap}

/* ── DIVIDER ─────────────────────────────────── */
.div{height:1px;background:var(--n100);margin:14px 0}

/* ── PAGE HEADER ────────────────────────────── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.ptitle{font-size:19px;font-weight:800;color:var(--n900);letter-spacing:-.4px}
.psub{font-size:12px;color:var(--n400);margin-top:2px}

/* ── UTILITY ────────────────────────────────── */
.flex{display:flex}.ic{align-items:center}.jb{justify-content:space-between}.g1{gap:5px}.g2i{gap:9px}.g3i{gap:13px}
.xs{font-size:10.5px}.sm{font-size:12px}
.muted{color:var(--n400)}.bold{font-weight:700}.mono{font-family:var(--m)}
.tr{text-align:right}.w100{width:100%}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:13px}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.page>*{animation:fadein .2s ease both}
@media(max-width:1280px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:960px){.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
/* ── MOBILE BOTTOM NAV ──────────────────────────────────────── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;background:var(--W);border-top:1.5px solid var(--n200);z-index:300;align-items:stretch;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.mob-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:700;color:var(--n400);cursor:pointer;border:none;background:none;padding:4px 0;letter-spacing:.2px;transition:color .15s}
.mob-nav-item.on{color:var(--g)}
.mob-drawer{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.45)}
.mob-drawer-panel{position:absolute;bottom:0;left:0;right:0;background:var(--W);border-radius:var(--r16) var(--r16) 0 0;padding:16px 0 80px;max-height:82vh;overflow-y:auto}
.mob-drawer-item{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:13px;font-weight:600;color:var(--n700);cursor:pointer;border:none;background:none;width:100%;text-align:left}
.mob-drawer-item.on{color:var(--g);background:var(--gl)}
.mob-drawer-group{font-size:9.5px;font-weight:800;color:var(--n400);text-transform:uppercase;letter-spacing:.6px;padding:10px 20px 4px}
/* ── RESPONSIVE BREAKPOINTS ─────────────────────────────────── */
@media(max-width:768px){
  :root{--sb:0px}
  .sb{display:none}
  .mob-nav{display:flex}
  .mob-drawer{display:block}
  .page{padding:12px 12px 80px}
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .f3,.f4{grid-template-columns:1fr 1fr}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .ph{flex-wrap:wrap;gap:8px}
  .topbar{padding:8px 12px}
  .main{padding-bottom:0}
}
@media(max-width:480px){
  .g4,.g3{grid-template-columns:1fr}
  .f2,.f3,.f4{grid-template-columns:1fr}
  .ph .btn{font-size:11px;padding:6px 10px}
}

/* ── CHECKBOX ─────────────────────────── */
.cb-row td{transition:background .1s}
.cb-row.sel td{background:rgba(0,179,134,.06)!important}
input[type=checkbox]{width:14px;height:14px;accent-color:var(--g);cursor:pointer}
.bulk-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--gl);border-radius:var(--r8);margin-bottom:10px;font-size:12.5px;font-weight:600;color:var(--gd);border:1px solid rgba(0,179,134,.2)}
/* ── EMERGENCY FUND ───────────────────── */
.ef-card{background:linear-gradient(135deg,#0a2540,#1a4a6e);border-radius:var(--r12);padding:16px 18px;color:#fff;position:relative;overflow:hidden}
.ef-card::after{content:'';position:absolute;right:-20px;top:-20px;width:90px;height:90px;background:rgba(255,255,255,.05);border-radius:50%}
/* ── PAYMENT MODE BADGE ──────────────── */
.pm-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.pm-cc{background:#fef3c7;color:#92400e}
.pm-upi{background:#d1fae5;color:#065f46}
.pm-neft{background:#dbeafe;color:#1e40af}
.pm-cash{background:#f3f4f6;color:#374151}
.pm-dc{background:#ede9fe;color:#5b21b6}
.pm-wallet{background:#fce7f3;color:#9d174d}
/* ── CFO DASHBOARD ──────────────────── */
.cfo-score{width:80px;height:80px;position:relative;display:inline-flex;align-items:center;justify-content:center}
/* ── DEBT OPTIMIZER ─────────────────── */
.debt-priority{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:800;flex-shrink:0}
/* ── MAJOR CAT FLAG ─────────────────── */
.major-flag{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:99px;font-size:9.5px;font-weight:700;background:#fef3c7;color:#92400e;border:1px solid #fcd34d}

/* ── AI INSIGHTS ─────────────────────── */
.ai-card{border-radius:var(--r12);position:relative;overflow:hidden}
.ai-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,58,237,.04),rgba(0,179,134,.04));pointer-events:none}
.ai-glow{animation:aiGlow 2.5s ease-in-out infinite alternate}
@keyframes aiGlow{from{box-shadow:0 0 12px rgba(124,58,237,.1),0 0 24px rgba(0,179,134,.05)}to{box-shadow:0 0 20px rgba(124,58,237,.18),0 0 40px rgba(0,179,134,.1)}}
.ai-typing{display:inline-flex;gap:4px;align-items:center;padding:8px 0}
.ai-typing span{width:6px;height:6px;border-radius:50%;background:var(--p);opacity:.4;animation:aiDot 1.4s ease-in-out infinite}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@keyframes aiDot{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}
.ai-prompt-btn{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:var(--r8);border:1.5px solid var(--n200);background:var(--W);cursor:pointer;font-family:var(--f);font-size:12.5px;font-weight:500;color:var(--n700);transition:all .15s;text-align:left;width:100%}
.ai-prompt-btn:hover{border-color:var(--p);background:var(--pl);color:var(--p);transform:translateY(-1px);box-shadow:var(--sm)}
.ai-prompt-btn.active{border-color:var(--p);background:var(--pl);color:var(--p)}
.ai-prompt-ic{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;flex-shrink:0;font-size:13px}
.ai-result{font-size:13px;line-height:1.7;color:var(--n700);white-space:pre-wrap}
.ai-result strong{color:var(--n900);font-weight:700}
.ai-section{margin-bottom:16px;padding:14px 16px;border-radius:var(--r8);border:1px solid var(--n100);background:var(--W)}
.ai-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--p);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ai-chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--n100);background:var(--n50);border-radius:0 0 var(--r12) var(--r12)}
.ai-chat-input input{flex:1;padding:9px 13px;border:1.5px solid var(--n200);border-radius:99px;font-size:13px;font-family:var(--f);outline:none;transition:border-color .15s}
.ai-chat-input input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.ai-msg{padding:10px 14px;border-radius:var(--r8);margin-bottom:8px;max-width:92%;animation:fadein .2s ease both}
.ai-msg.user{background:var(--gl);color:var(--gd);margin-left:auto;border-bottom-right-radius:4px}
.ai-msg.bot{background:var(--pl);color:var(--n800);margin-right:auto;border-bottom-left-radius:4px}



/* ===== PLANNER (PFM) CSS — scoped ===== */
.pfm-app {
  --ink:         #0F1B2D;
  --ink-soft:    #4A5568;
  --ink-muted:   #94A3B8;
  --bg:          #FFFFFF;
  --bg-alt:      #F8FAFC;
  --bg-card:     #FFFFFF;
  --rule:        #E5E9F0;
  --rule-strong: #CBD5E1;

  --brand:       #0B5394;
  --brand-dark:  #073763;
  --brand-lite:  #E7F0F9;
  --accent:      #D97706;
  --accent-lt:   #FEF3C7;
  --green:       #059669;
  --green-lt:    #D1FAE5;
  --red:         #DC2626;
  --red-lt:      #FEE2E2;
  --purple:      #7C3AED;
  --purple-lt:   #EDE9FE;

  --shadow-sm:   0 1px 2px 0 rgba(15, 27, 45, 0.04);
  --shadow:      0 4px 12px -2px rgba(15, 27, 45, 0.06), 0 2px 4px -1px rgba(15, 27, 45, 0.04);
  --shadow-lg:   0 14px 30px -8px rgba(15, 27, 45, 0.1), 0 6px 10px -4px rgba(15, 27, 45, 0.05);

  --radius-sm:   6px;
  --radius:      10px;
  --radius-lg:   14px;

  --font-head:   "Calibri", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --font-body:   "Calibri", "Segoe UI", "Helvetica Neue", Arial, sans-serif;

  --transition:  180ms cubic-bezier(0.4, 0, 0.2, 1);
}
.pfm-app { font-family: var(--font-body); color: var(--ink); background: var(--bg-alt); font-size: 15px; line-height: 1.55; }
.pfm-app h1,.pfm-app h2,.pfm-app h3,.pfm-app h4,.pfm-app h5 { font-family: var(--font-head); color: var(--ink); margin: 0 0 0.5rem 0; font-weight: 700; letter-spacing: -0.01em; }
.pfm-app h1 { font-size: 1.6rem; } .pfm-app h2 { font-size: 1.35rem; } .pfm-app h3 { font-size: 1.1rem; } .pfm-app h4 { font-size: 0.95rem; font-weight: 600; }
.pfm-app p { margin: 0 0 0.75rem 0; color: var(--ink-soft); }
.pfm-app a { color: var(--brand); text-decoration: none; cursor: pointer; }
.pfm-app a:hover { text-decoration: underline; }
.pfm-app button { font-family: inherit; cursor: pointer; }
.pfm-app input, .pfm-app select, .pfm-app textarea { font-family: inherit; font-size: 0.95rem; }

@scope (.pfm-app) {

/* ==========================================================================
   DESIGN TOKENS — light mode, matches Vipin's PPT
   ========================================================================== */


/* ==========================================================================
   BASE
   ========================================================================== */


h1, h2, h3, h4, h5 {
  font-family: var(--font-head);
  color: var(--ink);
  margin: 0 0 0.5rem 0;
  font-weight: 700;
  letter-spacing: -0.01em;
}
h1 { font-size: 1.6rem; }
h2 { font-size: 1.35rem; }
h3 { font-size: 1.1rem; }
h4 { font-size: 0.95rem; font-weight: 600; }
p  { margin: 0 0 0.75rem 0; color: var(--ink-soft); }
a  { color: var(--brand); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: 0.95rem; }

/* ==========================================================================
   TOP NAV
   ========================================================================== */
.app-nav {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
  backdrop-filter: saturate(180%) blur(8px);
  box-shadow: var(--shadow-sm);
}
.app-nav-inner {
  max-width: 1240px; margin: 0 auto;
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
}
.brand-mark {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 1.15rem;
  box-shadow: 0 4px 10px -2px rgba(11, 83, 148, 0.35);
}
.brand-text strong {
  display: block; font-size: 1.02rem; color: var(--ink); font-weight: 700;
  letter-spacing: -0.01em;
}
.brand-text span {
  display: block; font-size: 0.78rem; color: var(--ink-muted);
  letter-spacing: 0.5px; text-transform: uppercase;
}

.nav-actions { display: flex; align-items: center; gap: 10px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px;
  border-radius: 8px;
  font-size: 0.88rem; font-weight: 600;
  border: 1px solid transparent;
  transition: var(--transition);
  text-decoration: none;
  white-space: nowrap;
}
.btn-primary {
  background: var(--brand); color: white; border-color: var(--brand);
}
.btn-primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); text-decoration: none; }
.btn-accent {
  background: var(--accent); color: white; border-color: var(--accent);
}
.btn-accent:hover { background: #B45309; border-color: #B45309; text-decoration: none; }
.btn-ghost {
  background: transparent; color: var(--ink); border-color: var(--rule-strong);
}
.btn-ghost:hover { background: var(--bg-alt); }
.btn-sm { padding: 6px 12px; font-size: 0.82rem; }
.btn-lg { padding: 12px 22px; font-size: 0.95rem; }

/* ==========================================================================
   LAYOUT
   ========================================================================== */
.app-shell {
  max-width: 1240px; margin: 0 auto;
  padding: 28px 24px 80px;
}
.hero {
  background: linear-gradient(135deg, #FFFFFF 0%, var(--brand-lite) 100%);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 32px 36px;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: ""; position: absolute; top: 0; left: 0; width: 5px; height: 100%;
  background: linear-gradient(180deg, var(--brand) 0%, var(--accent) 100%);
}
.hero-eyebrow {
  font-size: 0.72rem; font-weight: 700;
  color: var(--accent); letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 8px;
}
.hero h1 {
  font-size: 2rem; line-height: 1.15; margin-bottom: 8px;
  color: var(--ink);
}
.hero h1 .highlight { color: var(--brand); }
.hero p {
  font-size: 1.02rem; color: var(--ink-soft); max-width: 720px;
  margin: 0;
}
.hero-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px; margin-top: 24px;
}
.hero-stat {
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--rule); border-radius: var(--radius);
  padding: 14px 16px;
}
.hero-stat-value { font-size: 1.3rem; font-weight: 700; color: var(--brand); }
.hero-stat-label { font-size: 0.78rem; color: var(--ink-muted); margin-top: 2px; }

/* ==========================================================================
   DASHBOARD MODULE GRID
   ========================================================================== */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin: 28px 0 16px;
  gap: 12px;
}
.section-head h2 {
  font-size: 1.2rem; color: var(--ink); margin: 0;
}
.section-head p { color: var(--ink-muted); font-size: 0.85rem; margin: 0; }

.module-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.module-card {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: var(--shadow-sm);
}
.module-card:hover {
  border-color: var(--brand);
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}
.module-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent-color, var(--brand));
  border-radius: var(--radius) var(--radius) 0 0;
  opacity: 0; transition: var(--transition);
}
.module-card:hover::before { opacity: 1; }
.module-card-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--brand-lite);
  display: flex; align-items: center; justify-content: center;
  color: var(--brand); font-size: 1.4rem;
}
.module-card.is-red .module-card-icon { background: var(--red-lt); color: var(--red); --accent-color: var(--red); }
.module-card.is-brand .module-card-icon { background: var(--brand-lite); color: var(--brand); --accent-color: var(--brand); }
.module-card.is-green .module-card-icon { background: var(--green-lt); color: var(--green); --accent-color: var(--green); }
.module-card.is-accent .module-card-icon { background: var(--accent-lt); color: var(--accent); --accent-color: var(--accent); }
.module-card.is-purple .module-card-icon { background: var(--purple-lt); color: var(--purple); --accent-color: var(--purple); }
.module-card h3 {
  font-size: 1.02rem; margin: 0;
}
.module-card p {
  font-size: 0.86rem; color: var(--ink-soft); margin: 0;
  flex: 1;
}
.module-card-cta {
  font-size: 0.82rem; font-weight: 600;
  color: var(--accent-color, var(--brand));
  margin-top: 4px; display: flex; align-items: center; gap: 6px;
}

/* ==========================================================================
   MODULE VIEW (individual module)
   ========================================================================== */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow-sm);
}
.panel + .panel { margin-top: 20px; }
.panel-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.panel-head h2 { margin: 0 0 4px 0; }
.panel-head p { margin: 0; color: var(--ink-muted); font-size: 0.88rem; }
.eyebrow {
  font-size: 0.72rem; font-weight: 700;
  color: var(--accent); letter-spacing: 2.5px;
  text-transform: uppercase; margin-bottom: 6px;
}

.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--ink-soft); font-size: 0.88rem; font-weight: 600;
  margin-bottom: 20px; cursor: pointer;
  transition: var(--transition);
}
.back-link:hover { color: var(--brand); text-decoration: none; }

/* ==========================================================================
   FORM ELEMENTS
   ========================================================================== */
.form-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px; margin-bottom: 16px;
}
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label {
  font-size: 0.82rem; font-weight: 600; color: var(--ink);
}
.form-hint {
  font-size: 0.78rem; color: var(--ink-muted);
}
.form-input, .form-select {
  padding: 9px 12px;
  border: 1px solid var(--rule-strong);
  border-radius: 8px;
  background: var(--bg);
  color: var(--ink);
  transition: var(--transition);
  width: 100%;
}
.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(11, 83, 148, 0.12);
}
.input-with-prefix {
  position: relative;
}
.input-with-prefix .form-input {
  padding-left: 30px;
}
.input-prefix {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--ink-muted); font-weight: 600;
  pointer-events: none;
}
.slider-row {
  display: grid; grid-template-columns: 1fr auto;
  gap: 10px; align-items: center;
}
.slider-row input[type="range"] { width: 100%; accent-color: var(--brand); }
.slider-value {
  font-weight: 700; color: var(--brand);
  min-width: 60px; text-align: right;
}

/* ==========================================================================
   STAT / RESULT CARDS
   ========================================================================== */
.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-top: 16px;
}
.result-card {
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 16px 18px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.result-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--brand);
}
.result-card.is-green::before { background: var(--green); }
.result-card.is-accent::before { background: var(--accent); }
.result-card.is-red::before { background: var(--red); }
.result-card-label {
  font-size: 0.78rem; color: var(--ink-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  font-weight: 600;
}
.result-card-value {
  font-size: 1.4rem; font-weight: 700; color: var(--ink);
  margin-top: 4px;
  font-family: var(--font-head);
}
.result-card-value.is-brand { color: var(--brand); }
.result-card-value.is-green { color: var(--green); }
.result-card-value.is-accent { color: var(--accent); }
.result-card-value.is-red { color: var(--red); }
.result-card-sub {
  font-size: 0.78rem; color: var(--ink-muted);
  margin-top: 4px;
}

/* ==========================================================================
   TABLES
   ========================================================================== */
.tbl-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--rule); }
.tbl {
  width: 100%; border-collapse: collapse; background: var(--bg);
  font-size: 0.88rem;
}
.tbl thead th {
  background: var(--brand);
  color: white;
  font-weight: 600;
  text-align: left;
  padding: 10px 14px;
  font-size: 0.82rem;
  letter-spacing: 0.3px;
}
.tbl tbody td {
  padding: 10px 14px;
  border-top: 1px solid var(--rule);
  color: var(--ink);
}
.tbl tbody tr:nth-child(even) td { background: var(--bg-alt); }
.tbl tbody tr:hover td { background: var(--brand-lite); }
.tbl .num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl .highlight { background: var(--accent-lt) !important; }

/* ==========================================================================
   CALLOUTS
   ========================================================================== */
.callout {
  border-left: 4px solid var(--brand);
  background: var(--brand-lite);
  padding: 14px 18px;
  border-radius: 0 var(--radius) var(--radius) 0;
  margin: 16px 0;
  font-size: 0.92rem;
}
.callout.is-accent { border-color: var(--accent); background: var(--accent-lt); }
.callout.is-green { border-color: var(--green); background: var(--green-lt); }
.callout.is-red { border-color: var(--red); background: var(--red-lt); }
.callout strong { color: var(--ink); }
.callout-title {
  font-weight: 700; color: var(--brand); margin-bottom: 4px;
  font-family: var(--font-head);
}
.callout.is-accent .callout-title { color: var(--accent); }
.callout.is-green .callout-title { color: var(--green); }
.callout.is-red .callout-title { color: var(--red); }

/* ==========================================================================
   PILLS / TAGS
   ========================================================================== */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; font-size: 0.72rem; font-weight: 600;
  border-radius: 999px; letter-spacing: 0.3px;
}
.pill-brand { background: var(--brand-lite); color: var(--brand); }
.pill-green { background: var(--green-lt); color: var(--green); }
.pill-red   { background: var(--red-lt); color: var(--red); }
.pill-accent{ background: var(--accent-lt); color: var(--accent); }

/* ==========================================================================
   TABS
   ========================================================================== */
.tabs {
  display: flex; gap: 4px; border-bottom: 1px solid var(--rule);
  margin-bottom: 20px; overflow-x: auto;
}
.tab {
  padding: 10px 16px;
  border: none; background: transparent;
  color: var(--ink-muted); font-weight: 600; font-size: 0.88rem;
  border-bottom: 2px solid transparent;
  transition: var(--transition);
  white-space: nowrap;
}
.tab:hover { color: var(--ink); }
.tab.is-active {
  color: var(--brand); border-bottom-color: var(--brand);
}

/* ==========================================================================
   CHART CONTAINERS
   ========================================================================== */
.chart-wrap {
  position: relative;
  height: 320px;
  margin: 12px 0;
}
.chart-wrap-sm { height: 220px; }

/* ==========================================================================
   MODAL
   ========================================================================== */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(15, 27, 45, 0.5);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--bg);
  border-radius: var(--radius-lg);
  max-width: 520px; width: 100%;
  padding: 28px;
  box-shadow: var(--shadow-lg);
  max-height: 85vh; overflow-y: auto;
}
.modal h2 { margin-bottom: 8px; }
.modal .actions {
  display: flex; gap: 10px; justify-content: flex-end;
  margin-top: 20px;
}
.contact-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--bg-alt); border-radius: 8px;
  margin-bottom: 8px;
  border: 1px solid var(--rule);
}
.contact-item-label { font-size: 0.78rem; color: var(--ink-muted); }
.contact-item-value { font-weight: 600; color: var(--ink); font-size: 0.95rem; }

/* ==========================================================================
   FOOTER
   ========================================================================== */
.app-footer {
  max-width: 1240px; margin: 20px auto 0;
  padding: 24px 24px 40px;
  border-top: 1px solid var(--rule);
  display: grid; grid-template-columns: 1fr auto; gap: 16px;
  align-items: center;
  color: var(--ink-muted); font-size: 0.82rem;
}
.app-footer a { color: var(--brand); font-weight: 600; }
.credit { display: flex; align-items: center; gap: 10px; }

/* ==========================================================================
   RESPONSIVE
   ========================================================================== */
@media (max-width: 720px) {
  .hero { padding: 24px 20px; }
  .hero h1 { font-size: 1.5rem; }
  .panel { padding: 20px; }
  .brand-text span { display: none; }
  .nav-actions .btn-lg-hide { display: none; }
  .app-footer { grid-template-columns: 1fr; text-align: center; }
}

/* ==========================================================================
   UTILS
   ========================================================================== */
.muted { color: var(--ink-muted); }
.text-right { text-align: right; }
.mt-2 { margin-top: 16px; } .mt-3 { margin-top: 24px; }
.mb-2 { margin-bottom: 16px; } .mb-3 { margin-bottom: 24px; }
.flex { display: flex; gap: 10px; } .flex-1 { flex: 1; }
.flex-wrap { flex-wrap: wrap; }
.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

.print-only { display: none; }
@media print {
  .app-nav, .app-footer, .no-print, .btn { display: none !important; }
  .panel { border: none; box-shadow: none; }
  body { background: white; }
}

/* ==========================================================================
   GOALS MODULE (multi-goal tracker, Multipl-style)
   ========================================================================== */
.goals-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.goals-summary {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px; margin-bottom: 20px;
}
.goals-summary .result-card { padding: 14px 16px; }
.goal-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
}
.goal-card {
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  display: flex; flex-direction: column; gap: 12px;
  position: relative; overflow: hidden;
}
.goal-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--goal-color, var(--brand));
}
.goal-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.goal-card-head { display: flex; align-items: flex-start; gap: 12px; }
.goal-card-icon {
  width: 48px; height: 48px; border-radius: 12px;
  background: var(--goal-tint, var(--brand-lite));
  color: var(--goal-color, var(--brand));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; flex-shrink: 0;
}
.goal-card-title { flex: 1; min-width: 0; }
.goal-card-title h4 { font-size: 1.02rem; margin: 0 0 2px 0; color: var(--ink); }
.goal-card-title .meta { font-size: 0.78rem; color: var(--ink-muted); }
.goal-progress {
  height: 10px; background: var(--bg-alt);
  border-radius: 999px; overflow: hidden; position: relative;
  border: 1px solid var(--rule);
}
.goal-progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--goal-color, var(--brand)) 0%, var(--goal-color-dark, var(--brand-dark)) 100%);
  border-radius: 999px;
  transition: width 400ms cubic-bezier(0.4, 0, 0.2, 1);
}
.goal-progress-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.82rem; color: var(--ink-soft);
}
.goal-progress-row strong { color: var(--ink); font-variant-numeric: tabular-nums; }
.goal-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px;
  font-size: 0.82rem;
  padding: 10px 0; border-top: 1px dashed var(--rule); border-bottom: 1px dashed var(--rule);
}
.goal-stat-label { color: var(--ink-muted); }
.goal-stat-value { color: var(--ink); font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
.goal-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.goal-actions .btn { padding: 6px 10px; font-size: 0.78rem; }

.goal-empty {
  border: 2px dashed var(--rule-strong);
  border-radius: var(--radius-lg);
  padding: 40px 24px;
  text-align: center;
  background: var(--bg-alt);
}
.goal-empty h3 { color: var(--ink); margin-bottom: 8px; }
.goal-empty p { color: var(--ink-muted); margin-bottom: 16px; }

.template-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.template-btn {
  padding: 12px 6px; border: 1px solid var(--rule-strong);
  border-radius: var(--radius); background: var(--bg);
  cursor: pointer; transition: var(--transition);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-size: 0.76rem; color: var(--ink-soft); font-weight: 600;
}
.template-btn:hover { border-color: var(--brand); color: var(--brand); }
.template-btn.is-active { border-color: var(--brand); background: var(--brand-lite); color: var(--brand); }
.template-btn .emoji { font-size: 1.6rem; line-height: 1; }

.modal-lg { max-width: 640px; }

/* ==========================================================================
   ICON HELPERS (for emoji-style SVG fallbacks)
   ========================================================================== */
.icon-emoji {
  font-size: 1.3rem;
  line-height: 1;
  display: inline-block;
}

}
/* ===== end planner CSS ===== */
</style>

const uid=()=>Math.random().toString(36).slice(2,9);

// Generate period months dynamically from profile
function getPeriodMonths(start,end){
  const months=[];
  let [sy,sm]=start.split('-').map(Number);
  const [ey,em]=end.split('-').map(Number);
  while(sy<ey||(sy===ey&&sm<=em)){
    const key=`${sy}-${String(sm).padStart(2,'0')}`;
    const d=new Date(sy,sm-1);
    const label=d.toLocaleString('en-IN',{month:'short',year:'2-digit'}).replace(' ','-');
    months.push({key,label});
    sm++;if(sm>12){sm=1;sy++;}
  }
  return months;
}

const fmtINR=(n,short=false)=>{
  if(n===undefined||n===null)return'–';
  const abs=Math.abs(n);let s;
  if(short){
    if(abs>=10000000)s=`₹${(abs/10000000).toFixed(2)}Cr`;
    else if(abs>=100000)s=`₹${(abs/100000).toFixed(2)}L`;
    else if(abs>=1000)s=`₹${(abs/1000).toFixed(1)}K`;
    else s=`₹${abs.toLocaleString('en-IN')}`;
  }else s=`₹${abs.toLocaleString('en-IN')}`;
  return n<0?`-${s}`:s;
};

// DD-MMM-YYYY format
const fmtDate=d=>{
  if(!d)return'–';
  const dt=new Date(d);
  return`${String(dt.getDate()).padStart(2,'0')}-${dt.toLocaleString('en-IN',{month:'short'})}-${dt.getFullYear()}`;
};
const fmtMonth=m=>{if(!m)return'–';const[y,mo]=m.split('-');return new Date(y,+mo-1).toLocaleString('en-IN',{month:'short',year:'2-digit'}).replace(' ','-');};
const daysDiff=d=>{if(!d)return null;return Math.round((new Date(d)-new Date())/86400000);};
const periodLabel=(s,e)=>{
  const ds=new Date(s+'-01'),de=new Date(e+'-01');
  const fmt=x=>x.toLocaleString('en-IN',{month:'short',year:'numeric'});
  return`${fmt(ds)} – ${fmt(de)}`;
};
