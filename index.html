<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Personal FinManager – by Vipin Nair</title>
<meta name="description" content="Personal Fund & Budget Manager with Google Drive sync"/>
<!-- Google Identity Services (for OAuth2 login) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- Google API client library (for Drive API calls) -->
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#00b386;--gd:#007a62;--gl:#e6f9f4;--gxl:#f0fdf9;
  --b:#2563eb;--bl:#eff6ff;--bd:#1e40af;
  --r:#dc2626;--rl:#fef2f2;
  --o:#d97706;--ol:#fffbeb;
  --p:#7c3aed;--pl:#f5f3ff;
  --t:#0d9488;--tl:#f0fdfa;
  --n50:#f8fafc;--n100:#f1f5f9;--n200:#e2e8f0;--n300:#cbd5e1;
  --n400:#94a3b8;--n500:#64748b;--n600:#475569;--n700:#334155;--n800:#1e293b;--n900:#0f172a;
  --W:#fff;
  --xs:0 1px 2px rgba(0,0,0,.04);
  --sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.04);
  --lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.04);
  --xl:0 20px 25px -5px rgba(0,0,0,.08),0 8px 10px -6px rgba(0,0,0,.04);
  --r4:4px;--r6:6px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;
  --f:'Plus Jakarta Sans',sans-serif;--m:'JetBrains Mono',monospace;
  --sb:238px;
}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--n50);color:var(--n900);line-height:1.5;-webkit-font-smoothing:antialiased}
#root{display:flex;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--n200);border-radius:99px}

/* ── SIDEBAR ─────────────────────────────────── */
.sb{width:var(--sb);background:var(--W);border-right:1px solid var(--n100);position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;z-index:200;overflow-y:auto}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid var(--n100);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--g),var(--gd));border-radius:10px;display:grid;place-items:center;flex-shrink:0;box-shadow:0 3px 8px rgba(0,179,134,.3)}
.sb-mark svg{width:18px;height:18px;fill:#fff}
.sb-app{font-weight:800;font-size:14px;color:var(--n900);letter-spacing:-.3px;line-height:1.2}
.sb-period{font-size:9.5px;color:var(--n400);font-weight:500}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-group{padding:10px 12px 3px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--n400)}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;margin:1px 5px;border-radius:var(--r6);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--n500);transition:all .13s;position:relative;user-select:none}
.sb-item:hover{background:var(--n50);color:var(--n800)}
.sb-item.on{background:var(--gl);color:var(--gd);font-weight:700}
.sb-item.on::before{content:'';position:absolute;left:-5px;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--g);border-radius:0 3px 3px 0}
.sb-ic{width:15px;height:15px;flex-shrink:0;opacity:.65}
.sb-item.on .sb-ic{opacity:1}
.sb-badge{margin-left:auto;font-size:9px;font-weight:700;background:var(--r);color:#fff;padding:1px 5px;border-radius:99px;min-width:17px;text-align:center}
.sb-foot{padding:10px 8px;border-top:1px solid var(--n100);flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:9px;padding:7px;border-radius:var(--r8);cursor:pointer;transition:background .13s}
.sb-user:hover{background:var(--n50)}
.sb-av{width:30px;height:30px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:grid;place-items:center;font-size:11.5px;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{font-size:12px;font-weight:600;color:var(--n700)}
.sb-uemail{font-size:10px;color:var(--n400)}

/* ── MAIN ───────────────────────────────────── */
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--W);border-bottom:1px solid var(--n100);height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--xs)}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-title{font-size:14px;font-weight:700;color:var(--n900)}
.tb-right{display:flex;align-items:center;gap:7px}
.page{padding:18px 20px 52px;flex:1;max-width:1400px;width:100%}

/* ── CARD ───────────────────────────────────── */
.card{background:var(--W);border:1px solid var(--n100);border-radius:var(--r12);padding:16px 18px;box-shadow:var(--xs);transition:box-shadow .13s}
.card:hover{box-shadow:var(--sm)}
.card.flat{box-shadow:none}
.cl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--n400);margin-bottom:4px}
.cv{font-size:20px;font-weight:800;font-family:var(--m);color:var(--n900);line-height:1.15;letter-spacing:-.6px}
.cv.g{color:var(--gd)} .cv.r{color:var(--r)} .cv.o{color:var(--o)} .cv.b{color:var(--b)} .cv.p{color:var(--p)}
.cm{font-size:11px;color:var(--n400);margin-top:3px}
.ci{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;margin-bottom:10px}
.ci svg{width:18px;height:18px}

/* ── GRIDS ──────────────────────────────────── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row{display:flex;gap:12px}
.col{flex:1}
.mb1{margin-bottom:5px}.mb2{margin-bottom:10px}.mb3{margin-bottom:16px}.mb4{margin-bottom:22px}

/* ── TABLE ──────────────────────────────────── */
.tw{overflow-x:auto;border-radius:var(--r12);border:1px solid var(--n100);background:var(--W)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--n50);border-bottom:1px solid var(--n100)}
th{padding:9px 12px;text-align:left;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--n500);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--n50);color:var(--n700);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafbfc}
.num{font-family:var(--m);text-align:right;font-size:12px}
.pos{color:var(--gd);font-weight:600}.neg{color:var(--r);font-weight:600}
.tft td{background:var(--n50)!important;font-weight:700;border-top:2px solid var(--n200)}

/* ── PROGRESS ───────────────────────────────── */
.prog{height:5px;background:var(--n100);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width .5s ease}

/* ── TAGS ───────────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:10.5px;font-weight:600;white-space:nowrap}
.tg{background:var(--gl);color:var(--gd)}.tr{background:var(--rl);color:var(--r)}
.tb{background:var(--bl);color:var(--bd)}.to{background:var(--ol);color:var(--o)}
.tx{background:var(--n100);color:var(--n500)}.tp{background:var(--pl);color:var(--p)}

/* ── FORM ───────────────────────────────────── */
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--n500)}
.fg input,.fg select,.fg textarea{padding:8px 11px;border:1.5px solid var(--n200);border-radius:var(--r6);font-size:13px;font-family:var(--f);color:var(--n900);background:var(--W);outline:none;transition:border-color .13s,box-shadow .13s;width:100%}
.fg input:focus,.fg select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(0,179,134,.1)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.f3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.f4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}

/* ── BUTTONS ─────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r6);font-size:12.5px;font-weight:600;font-family:var(--f);cursor:pointer;border:none;transition:all .13s;white-space:nowrap;line-height:1}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-p{background:var(--g);color:#fff;box-shadow:0 1px 3px rgba(0,179,134,.25)}
.btn-p:hover{background:var(--gd)}
.btn-s{background:var(--W);color:var(--n700);border:1.5px solid var(--n200)}
.btn-s:hover{background:var(--n50);border-color:var(--n300)}
.btn-d{background:var(--rl);color:var(--r)}
.btn-d:hover{background:var(--r);color:#fff}
.btn-g{background:transparent;color:var(--n500);padding:5px 8px}
.btn-g:hover{background:var(--n100);color:var(--n700)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.bic{padding:6px;border-radius:var(--r6);background:var(--n50);border:1px solid var(--n200);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .13s;color:var(--n500)}
.bic:hover{background:var(--n100);color:var(--n700)}
.bic svg{width:12px;height:12px}
.bic.red{color:var(--r)}
.bic.red:hover{background:var(--r);color:#fff}

/* ── TOGGLE ─────────────────────────────────── */
.tgl{display:flex;background:var(--n100);border-radius:99px;padding:3px;gap:2px}
.tgo{padding:5px 12px;border-radius:99px;font-size:11.5px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--n500);transition:all .13s;font-family:var(--f)}
.tgo.on{background:var(--W);color:var(--gd);box-shadow:var(--xs)}

/* ── MODAL ──────────────────────────────────── */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--W);border-radius:var(--r16);box-shadow:var(--xl);width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.mh{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-size:15px;font-weight:700}
.mb{padding:14px 20px}
.mf{padding:0 20px 18px;display:flex;justify-content:flex-end;gap:8px}

/* ── SECTION HEADER ─────────────────────────── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sh-t{font-size:13px;font-weight:700;color:var(--n900);display:flex;align-items:center;gap:7px}

/* ── ALERTS ──────────────────────────────────── */
.alert{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-radius:var(--r8);font-size:12px;margin-bottom:12px}
.alert svg{width:14px;height:14px;flex-shrink:0;margin-top:1px}
.aw{background:var(--ol);color:#92400e;border-left:3px solid var(--o)}
.ai{background:var(--bl);color:var(--bd);border-left:3px solid var(--b)}
.as{background:var(--gl);color:var(--gd);border-left:3px solid var(--g)}
.ae{background:var(--rl);color:var(--r);border-left:3px solid var(--r)}

/* ── TOAST ──────────────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;z-index:2000;color:#fff;padding:10px 15px;border-radius:var(--r8);font-size:12.5px;font-weight:500;box-shadow:var(--xl);display:flex;align-items:center;gap:8px;animation:tin .22s ease}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.toast.g{background:var(--gd)}.toast.r{background:var(--r)}.toast.x{background:var(--n800)}

/* ── DONUT ──────────────────────────────────── */
.donut{position:relative;display:inline-flex;align-items:center;justify-content:center}
.donut-c{position:absolute;text-align:center;pointer-events:none}

/* ── STAT ROW ───────────────────────────────── */
.sr{display:flex;align-items:center;justify-content:space-between;padding:7.5px 0;border-bottom:1px solid var(--n50)}
.sr:last-child{border-bottom:none}
.sr-l{font-size:12.5px;color:var(--n600)}
.sr-v{font-family:var(--m);font-size:12.5px;font-weight:600}

/* ── CC DUE CARDS ─────────────────────────────── */
.due-card{border-radius:var(--r12);padding:14px 16px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:8px}
.due-card::before{content:'';position:absolute;right:-15px;top:-15px;width:80px;height:80px;background:rgba(255,255,255,.1);border-radius:50%}
.due-urgency{display:flex;align-items:center;justify-content:space-between}
.due-days-badge{padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;backdrop-filter:blur(4px)}
.due-bank{font-size:10px;font-weight:700;opacity:.7;letter-spacing:.5px;text-transform:uppercase}
.due-card-type{font-size:13px;font-weight:700;margin-top:1px}
.due-amount-row{display:flex;justify-content:space-between;align-items:flex-end}
.due-amount{font-family:var(--m);font-size:18px;font-weight:800}
.due-date-block{text-align:right}
.due-date-label{font-size:9px;opacity:.65;text-transform:uppercase;letter-spacing:.5px}
.due-date-val{font-size:12px;font-weight:700}

/* ── ACCOUNT ROW ───────────────────────────── */
.acc-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--n50)}
.acc-row:last-child{border-bottom:none}
.acc-ic{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex-shrink:0;font-size:10px;font-weight:700}
.acc-name{font-size:12.5px;font-weight:600;color:var(--n800)}
.acc-no{font-size:10px;color:var(--n400);font-family:var(--m)}
.acc-bal{margin-left:auto;text-align:right}
.acc-num{font-family:var(--m);font-size:13px;font-weight:700}

/* ── MONTH CHIPS ────────────────────────────── */
.mbar{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.mbar::-webkit-scrollbar{display:none}
.mchip{padding:5px 11px;border-radius:99px;font-size:11.5px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid var(--n200);background:var(--W);color:var(--n500);transition:all .13s;flex-shrink:0}
.mchip.on{background:var(--g);color:#fff;border-color:var(--g);box-shadow:0 2px 6px rgba(0,179,134,.25)}
.mchip:hover:not(.on){border-color:var(--g);color:var(--gd)}

/* ── DASHBOARD SPECIAL ──────────────────────── */
.hero{background:linear-gradient(135deg,#0a2540 0%,#1a4a6e 45%,#0d6e5a 100%);border-radius:var(--r16);padding:22px 24px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:rgba(0,179,134,.12);border-radius:50%}
.hero::before{content:'';position:absolute;right:80px;bottom:-60px;width:160px;height:160px;background:rgba(255,255,255,.04);border-radius:50%}
.hero-label{font-size:11px;opacity:.65;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.hero-amount{font-family:var(--m);font-size:32px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.hero-sub{font-size:11.5px;opacity:.6;margin-top:5px}
.hero-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;position:relative;z-index:1}
.hero-pill{background:rgba(255,255,255,.12);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.15);border-radius:var(--r8);padding:8px 12px;min-width:100px}
.hero-pill-label{font-size:9px;opacity:.6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.hero-pill-val{font-family:var(--m);font-size:14px;font-weight:700}
.hero-pill-val.gr{color:#6ee7b7}
.hero-pill-val.rd{color:#fca5a5}
.hero-pill-val.yw{color:#fcd34d}

/* ── KPI CARD SPECIAL ───────────────────────── */
.kpi-card{background:var(--W);border:1px solid var(--n100);border-radius:var(--r12);padding:16px 18px;box-shadow:var(--xs);position:relative;overflow:hidden;transition:all .15s}
.kpi-card:hover{box-shadow:var(--md);transform:translateY(-1px)}
.kpi-card::after{content:'';position:absolute;right:-20px;top:-20px;width:70px;height:70px;border-radius:50%;opacity:.06}
.kpi-card.g::after{background:var(--g)}
.kpi-card.r::after{background:var(--r)}
.kpi-card.o::after{background:var(--o)}
.kpi-card.b::after{background:var(--b)}
.kpi-ic-wrap{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi-ic{width:36px;height:36px;border-radius:9px;display:grid;place-items:center}
.kpi-ic svg{width:17px;height:17px}
.kpi-trend{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px}

/* ── CHART BARS ─────────────────────────────── */
.barchart{display:flex;align-items:flex-end;gap:3px;padding-top:8px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center}
.barpair{display:flex;gap:1.5px;align-items:flex-end;width:100%}
.bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:height .4s ease;cursor:pointer}
.bar:hover{opacity:.8}
.bar-lbl{font-size:8.5px;color:var(--n400);margin-top:3px;white-space:nowrap}

/* ── DIVIDER ─────────────────────────────────── */
.div{height:1px;background:var(--n100);margin:14px 0}

/* ── PAGE HEADER ────────────────────────────── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.ptitle{font-size:19px;font-weight:800;color:var(--n900);letter-spacing:-.4px}
.psub{font-size:12px;color:var(--n400);margin-top:2px}

/* ── UTILITY ────────────────────────────────── */
.flex{display:flex}.ic{align-items:center}.jb{justify-content:space-between}.g1{gap:5px}.g2i{gap:9px}.g3i{gap:13px}
.xs{font-size:10.5px}.sm{font-size:12px}
.muted{color:var(--n400)}.bold{font-weight:700}.mono{font-family:var(--m)}
.tr{text-align:right}.w100{width:100%}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:13px}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.page>*{animation:fadein .2s ease both}
@media(max-width:1280px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:960px){.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}

/* ── CHECKBOX ─────────────────────────── */
.cb-row td{transition:background .1s}
.cb-row.sel td{background:rgba(0,179,134,.06)!important}
input[type=checkbox]{width:14px;height:14px;accent-color:var(--g);cursor:pointer}
.bulk-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--gl);border-radius:var(--r8);margin-bottom:10px;font-size:12.5px;font-weight:600;color:var(--gd);border:1px solid rgba(0,179,134,.2)}
/* ── EMERGENCY FUND ───────────────────── */
.ef-card{background:linear-gradient(135deg,#0a2540,#1a4a6e);border-radius:var(--r12);padding:16px 18px;color:#fff;position:relative;overflow:hidden}
.ef-card::after{content:'';position:absolute;right:-20px;top:-20px;width:90px;height:90px;background:rgba(255,255,255,.05);border-radius:50%}
/* ── PAYMENT MODE BADGE ──────────────── */
.pm-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.pm-cc{background:#fef3c7;color:#92400e}
.pm-upi{background:#d1fae5;color:#065f46}
.pm-neft{background:#dbeafe;color:#1e40af}
.pm-cash{background:#f3f4f6;color:#374151}
.pm-dc{background:#ede9fe;color:#5b21b6}
.pm-wallet{background:#fce7f3;color:#9d174d}
/* ── CFO DASHBOARD ──────────────────── */

// Generate period months dynamically from profile
function getPeriodMonths(start,end){
  const months=[];
  let [sy,sm]=start.split('-').map(Number);
  const [ey,em]=end.split('-').map(Number);
  while(sy<ey||(sy===ey&&sm<=em)){
    const key=`${sy}-${String(sm).padStart(2,'0')}`;
    const d=new Date(sy,sm-1);
    const label=d.toLocaleString('en-IN',{month:'short',year:'2-digit'}).replace(' ','-');
    months.push({key,label});
    sm++;if(sm>12){sm=1;sy++;}
  }
  return months;
}

const fmtINR=(n,short=false)=>{
  if(n===undefined||n===null)return'–';
  const abs=Math.abs(n);let s;
  if(short){
    if(abs>=10000000)s=`₹${(abs/10000000).toFixed(2)}Cr`;
    else if(abs>=100000)s=`₹${(abs/100000).toFixed(2)}L`;
    else if(abs>=1000)s=`₹${(abs/1000).toFixed(1)}K`;
    else s=`₹${abs.toLocaleString('en-IN')}`;
  }else s=`₹${abs.toLocaleString('en-IN')}`;
  return n<0?`-${s}`:s;
};

// DD-MMM-YYYY format
const fmtDate=d=>{
  if(!d)return'–';
  const dt=new Date(d);
  return`${String(dt.getDate()).padStart(2,'0')}-${dt.toLocaleString('en-IN',{month:'short'})}-${dt.getFullYear()}`;
};
const fmtMonth=m=>{if(!m)return'–';const[y,mo]=m.split('-');return new Date(y,+mo-1).toLocaleString('en-IN',{month:'short',year:'2-digit'}).replace(' ','-');};
const daysDiff=d=>{if(!d)return null;return Math.round((new Date(d)-new Date())/86400000);};
const periodLabel=(s,e)=>{
  const ds=new Date(s+'-01'),de=new Date(e+'-01');
  const fmt=x=>x.toLocaleString('en-IN',{month:'short',year:'numeric'});
  return`${fmt(ds)} – ${fmt(de)}`;
};

/* ══════════════════════════════════════
   DONUT RING
══════════════════════════════════════ */
function Donut({pct,color,size=86,stroke=9,label}){
  const p=Math.min(100,Math.max(0,pct||0));
  const r=(size-stroke*2)/2,c=2*Math.PI*r,off=c*(1-p/100);
  return(
    <div className="donut" style={{width:size,height:size}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--n100)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" style={{transition:'stroke-dashoffset .6s ease'}}/>
      </svg>
      <div className="donut-c">
        <div style={{fontFamily:'var(--m)',fontSize:13,fontWeight:800,color,lineHeight:1}}>{p.toFixed(1)}%</div>
        {label&&<div style={{fontSize:8,color:'var(--n400)',textTransform:'uppercase',letterSpacing:.5,marginTop:1}}>{label}</div>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   BAR CHART
══════════════════════════════════════ */
function BarChart({months,incomes,expenses,height=90}){
  const max=Math.max(...incomes,...expenses,1);
  const [hov,setHov]=useState(null);
  return(
    <div>
      {hov!==null&&<div style={{textAlign:'center',fontSize:11,color:'var(--n500)',marginBottom:4,height:16}}>
        <span style={{color:'var(--gd)',fontWeight:600}}>{fmtINR(incomes[hov],true)}</span>
        <span style={{color:'var(--n400)',margin:'0 6px'}}>vs</span>
        <span style={{color:'var(--r)',fontWeight:600}}>{fmtINR(expenses[hov],true)}</span>
        <span style={{color:'var(--n400)',marginLeft:6}}>{months[hov]?.label}</span>
      </div>}
      {hov===null&&<div style={{height:16}}/>}
      <div className="barchart" style={{height}}>
        {months.map((m,i)=>{
          const ip=(incomes[i]||0)/max*(height-22),ep=(expenses[i]||0)/max*(height-22);
          return(
            <div key={m.key} className="barcol" onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}>
              <div className="barpair" style={{height:height-22}}>
                <div className="bar" style={{height:Math.max(2,ip),background:hov===i?'var(--g)':'rgba(0,179,134,.55)',alignSelf:'flex-end'}}/>
                <div className="bar" style={{height:Math.max(2,ep),background:hov===i?'#ef4444':'rgba(239,68,68,.45)',alignSelf:'flex-end'}}/>
              </div>
              <div className="bar-lbl">{m.label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}


/* ══════════════════════════════════════
   EMERGENCY FUND CARD (Dashboard widget)
══════════════════════════════════════ */
function EfCard({data,accounts,totalExp,months}){
  const ef=data.emergencyFund||{accountIds:[],targetMonths:6};
  const efAccs=accounts.filter(a=>ef.accountIds.includes(a.id));
  const efBalance=efAccs.reduce((s,a)=>s+a.balance,0);
  // Emergency Fund target = Total monthly budget of ★ Major categories × target months
  const majorCats=data.majorExpenseCategories||[];
  const majorMonthlyBudget=majorCats.reduce((s,c)=>(data.budgetLimits[c]||0)+s,0);
  const avgMonthlyExp=majorMonthlyBudget>0?majorMonthlyBudget:(months.length>0?totalExp/months.length:0);
  const target=avgMonthlyExp*(ef.targetMonths||6);
  const efPct=target>0?Math.min(100,efBalance/target*100):0;
  const monthsCovered=avgMonthlyExp>0?efBalance/avgMonthlyExp:0;
  const efStatus=efPct>=100?'Fully Funded':efPct>=50?'Partially Funded':'Underfunded';
  const progressColor=efPct>=100?'#6ee7b7':efPct>=50?'#fcd34d':'#fca5a5';
  const statusBg=efPct>=100?'rgba(0,179,134,.3)':efPct>=50?'rgba(217,119,6,.3)':'rgba(220,38,38,.3)';
  return(
    <div className="ef-card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',position:'relative',zIndex:1}}>
        <div>
          <div style={{fontSize:10,opacity:.6,textTransform:'uppercase',letterSpacing:.7,marginBottom:3}}>Emergency Fund</div>
          <div style={{fontFamily:'var(--m)',fontSize:24,fontWeight:800}}>{fmtINR(efBalance)}</div>
          <div style={{fontSize:11,opacity:.6,marginTop:3,fontFamily:'var(--m)'}}>{fmtINR(efBalance,true)} · {monthsCovered.toFixed(1)} months covered</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:10,opacity:.6,textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Status</div>
          <span style={{background:statusBg,color:progressColor,padding:'4px 10px',borderRadius:'99px',fontSize:11,fontWeight:700}}>{efStatus}</span>
          <div style={{fontSize:10,opacity:.5,marginTop:4}}>Target: {ef.targetMonths||6} months</div>
        </div>
      </div>
      <div style={{marginTop:8,position:'relative',zIndex:1,fontSize:10,opacity:.6}}>
        {majorCats.length>0
          ?`Based on \u2605 Major categories budget: ${fmtINR(majorMonthlyBudget,true)}/mo (${majorCats.join(', ')})`
          :'No \u2605 Major categories set. Using avg monthly expense as fallback. Mark categories as Major in Master Settings.'}
      </div>
      <div style={{marginTop:8,position:'relative',zIndex:1}}>
        <div style={{height:6,background:'rgba(255,255,255,.15)',borderRadius:99,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${efPct}%`,background:progressColor,borderRadius:99,transition:'width .5s'}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
          <span style={{fontSize:10,opacity:.5}}>{efPct.toFixed(0)}% of target</span>
          <span style={{fontSize:10,opacity:.5}}>Target: {fmtINR(target,true)}</span>
        </div>
      </div>
      {efAccs.length===0&&<div style={{fontSize:11,opacity:.5,marginTop:8,position:'relative',zIndex:1}}>No accounts linked · Configure in Master Settings</div>}
    </div>
  );
}

/* ══════════════════════════════════════
   PAYMENT MODE CARD (Dashboard widget)
══════════════════════════════════════ */
function PmCard({periodTxs,totalExp}){
  const pmMap={};
  periodTxs.filter(t=>t.type==='expense').forEach(t=>{
    const pm=t.paymentMode||'Unknown';
    pmMap[pm]=(pmMap[pm]||0)+t.amount;
  });
  const pmList=Object.entries(pmMap).sort((a,b)=>b[1]-a[1]);
  return(
    <div className="card">
      <div className="sh mb3">
        <div className="sh-t"><Ic n="fund" s={14} c="var(--g)"/>Payment Mode Breakdown</div>
        <span className="tag tx" style={{fontSize:10}}>Period</span>
      </div>
      {pmList.length===0?(
        <div style={{textAlign:'center',padding:'16px',color:'var(--n400)',fontSize:12}}>No payment mode data yet. Add transactions with payment modes.</div>
      ):pmList.map(([pm,v])=>(
        <div key={pm} style={{marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span className={`pm-badge ${pmClass(pm)}`}>{pm}</span>
            <span style={{fontFamily:'var(--m)',fontSize:12,fontWeight:600}}>{fmtINR(v,true)}</span>
          </div>
          <div className="prog"><div className="pf" style={{width:`${totalExp>0?v/totalExp*100:0}%`,background:'var(--g)'}}/></div>
          <div style={{fontSize:10,color:'var(--n400)',marginTop:2}}>{totalExp>0?(v/totalExp*100).toFixed(1):0}% of expenses</div>
        </div>
      ))}
    </div>
  );
}

const PAYMENT_MODES=['Credit Card','UPI','NEFT/Bank Transfer','Cash','Debit Card','Wallet'];
const pmClass=m=>{if(!m)return'tx';const l=m.toLowerCase();if(l.includes('credit'))return'pm-cc';if(l.includes('upi'))return'pm-upi';if(l.includes('neft')||l.includes('bank'))return'pm-neft';if(l.includes('cash'))return'pm-cash';if(l.includes('debit'))return'pm-dc';if(l.includes('wallet'))return'pm-wallet';return'tx';};

/* ══════════════════════════════════════

function PageDashboard({data,setPage}){
  const {transactions,accounts,creditCards,loans,budgetLimits,expenseCategories,profile}=data;
  const months=useMemo(()=>getPeriodMonths(profile.periodStart,profile.periodEnd),[profile.periodStart,profile.periodEnd]);

  const bankBal=accounts.filter(a=>a.type==='bank').reduce((s,a)=>s+a.balance,0);
  const cashBal=accounts.filter(a=>a.type==='cash'||a.type==='wallet').reduce((s,a)=>s+a.balance,0);
  const fdBal=accounts.filter(a=>a.type==='fd').reduce((s,a)=>s+a.balance,0);
  const liquid=bankBal+cashBal;
  const ccPay=creditCards.reduce((s,c)=>s+c.payable,0);
  const ccProv=creditCards.reduce((s,c)=>s+c.provision,0);
  const loanOS=loans.reduce((s,l)=>s+l.outstanding,0);
  const totalLimit=creditCards.reduce((s,c)=>s+c.limit,0);
  const ccUtil=totalLimit>0?(ccPay+ccProv)/totalLimit*100:0;
  const provTotal=(data.provisions||[]).reduce((s,p)=>s+p.amount,0);
  const netWorth=liquid+fdBal-(ccPay+ccProv)-loanOS-provTotal;

  const periodTxs=transactions.filter(t=>months.some(m=>m.key===t.month));
  const totalInc=periodTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const totalExp=periodTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const surplus=totalInc-totalExp;

  const mInc=months.map(m=>transactions.filter(t=>t.month===m.key&&t.type==='income').reduce((s,t)=>s+t.amount,0));
  const mExp=months.map(m=>transactions.filter(t=>t.month===m.key&&t.type==='expense').reduce((s,t)=>s+t.amount,0));

  // CC dues
  const dues=creditCards.filter(c=>c.dueDate&&c.payable>0).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));

  // Top cats
  const catMap={};periodTxs.filter(t=>t.type==='expense').forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
  const topCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,4);

  const activeBudgetTotal=expenseCategories.reduce((s,c)=>(budgetLimits[c]||0)+s,0);
  const budgetTotal=activeBudgetTotal*months.length;
  const budgetUsed=totalExp;
  const budgetPct=budgetTotal>0?Math.min(100,budgetUsed/budgetTotal*100):0;

  return(
    <div className="page">
      {/* HERO */}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',position:'relative',zIndex:1}}>
          <div>
            <div className="hero-label">Fund Balance · Bank + FD</div>
            <div className="hero-amount">{fmtINR(bankBal+fdBal)}</div>
            <div style={{fontSize:11.5,opacity:.5,marginTop:2,fontFamily:'var(--m)'}}>{fmtINR(bankBal+fdBal,true)} total</div>
            <div className="hero-sub">Liquid: {fmtINR(liquid)} · FD: {fmtINR(fdBal,true)} · Period: {periodLabel(profile.periodStart,profile.periodEnd)}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:10,opacity:.6,textTransform:'uppercase',letterSpacing:.5,marginBottom:3}}>Net Worth</div>
            <div style={{fontFamily:'var(--m)',fontSize:22,fontWeight:800,color:'#6ee7b7'}}>{fmtINR(netWorth)}</div>
            <div style={{fontSize:10,opacity:.4,fontFamily:'var(--m)',marginTop:1}}>{fmtINR(netWorth,true)}</div>
            <div style={{fontSize:10,opacity:.5,marginTop:2}}>Assets − Liabilities − Provisions</div>
          </div>
        </div>
        <div className="hero-pills">
          {[
            {l:'Period Income',v:fmtINR(totalInc,true),c:'gr'},{l:'Period Expense',v:fmtINR(totalExp,true),c:'rd'},
            {l:'Surplus',v:fmtINR(surplus,true),c:surplus>=0?'gr':'rd'},{l:'FD Value',v:fmtINR(fdBal,true),c:'yw'},
            {l:'Loan O/S',v:fmtINR(loanOS,true),c:'rd'},{l:'CC Liability',v:fmtINR(ccPay+ccProv,true),c:'rd'},{l:'Provisions',v:fmtINR(provTotal,true),c:'rd'},
          ].map(p=>(
            <div key={p.l} className="hero-pill">
              <div className="hero-pill-label">{p.l}</div>
              <div className={`hero-pill-val ${p.c}`}>{p.v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ROW 1: KPIs */}
      <div className="g4 mb3">
        {[
          {l:'Period Income',v:totalInc,col:'g',icon:'inc',trend:`${totalInc>0?(surplus/totalInc*100).toFixed(1):0}% saved`,bg:'var(--gl)'},
          {l:'Period Expense',v:totalExp,col:'r',icon:'exp',trend:`Avg ${fmtINR(Math.round(totalExp/Math.max(1,months.length)),true)}/mo`,bg:'var(--rl)'},
          {l:'Net Surplus',v:surplus,col:surplus>=0?'g':'r',icon:'pnl',trend:`${totalInc>0?(surplus/totalInc*100).toFixed(1):0}% of income`,bg:surplus>=0?'var(--gl)':'var(--rl)'},
          {l:'Budget Utilization',v:budgetTotal,col:'b',icon:'budget',trend:`${budgetPct.toFixed(1)}% used`,bg:'var(--bl)'},
        ].map((k,i)=>(
          <div key={k.l} className={`kpi-card ${k.col}`} style={{animationDelay:`${i*0.05}s`}}>
            <div className="kpi-ic-wrap">
              <div className="kpi-ic" style={{background:k.bg}}><Ic n={k.icon} c={k.col==='g'?'var(--g)':k.col==='r'?'var(--r)':k.col==='b'?'var(--b)':'var(--o)'}/></div>
              <span style={{fontSize:9.5,fontWeight:600,color:'var(--n400)'}}>{k.trend}</span>
            </div>

        ))}

      {/* ROW 2: Chart + CC Overview */}
      <div className="row mb3">
        <div className="card col">
          <div className="sh">
            <div className="sh-t"><Ic n="pnl" s={14} c="var(--g)"/>Monthly P&amp;L</div>
            <div style={{display:'flex',gap:8,fontSize:10.5,color:'var(--n500)',alignItems:'center'}}>
              <span style={{width:10,height:10,borderRadius:2,background:'rgba(0,179,134,.55)',display:'inline-block'}}/>Income
              <span style={{width:10,height:10,borderRadius:2,background:'rgba(239,68,68,.45)',display:'inline-block'}}/>Expense
            </div>
          </div>
          <BarChart months={months} incomes={mInc} expenses={mExp}/>
        </div>

        <div style={{width:260,flexShrink:0,display:'flex',flexDirection:'column',gap:10}}>
          <div className="card" style={{flex:1}}>
            <div className="sh mb2"><div className="sh-t"><Ic n="cc" s={13} c="var(--g)"/>CC Utilization</div></div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <Donut pct={ccUtil} color={ccUtil>30?'var(--r)':ccUtil>15?'var(--o)':'var(--g)'} size={76} stroke={7} label="Used"/>
              <div style={{flex:1}}>
                <div className="sr"><span className="sr-l">Billed</span><span className="sr-v neg">{fmtINR(ccPay,true)}</span></div>
                <div className="sr"><span className="sr-l">Unbilled</span><span className="sr-v" style={{color:'var(--o)'}}>{fmtINR(ccProv,true)}</span></div>
                <div className="sr"><span className="sr-l">Limit</span><span className="sr-v">{fmtINR(totalLimit,true)}</span></div>
              </div>
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="sh mb2"><div className="sh-t"><Ic n="budget" s={13} c="var(--g)"/>Budget Status</div></div>
            <div style={{marginBottom:8}}>
              <div className="prog"><div className="pf" style={{width:`${budgetPct}%`,background:budgetPct>90?'var(--r)':budgetPct>75?'var(--o)':'var(--g)'}}/></div>
            </div>
            <div className="sr"><span className="sr-l">Spent</span><span className="sr-v neg">{fmtINR(budgetUsed,true)}</span></div>
            <div className="sr"><span className="sr-l">Budget</span><span className="sr-v">{fmtINR(budgetTotal,true)}</span></div>
            <div className="sr"><span className="sr-l">Unspent</span><span className={`sr-v ${budgetTotal-budgetUsed>=0?'pos':'neg'}`}>{fmtINR(Math.abs(budgetTotal-budgetUsed),true)}</span></div>
          </div>
        </div>
      </div>

      {/* ROW 3: CC Dues (beautiful cards) + Top Expenses */}
      <div className="g2 mb3">
        {/* CC Due Cards */}
        <div className="card">
          <div className="sh mb3">
            <div className="sh-t"><Ic n="cal" s={14} c="var(--g)"/>Upcoming Credit Card Dues</div>
            <button className="btn btn-s btn-sm" onClick={()=>setPage('cc')} style={{fontSize:11}}>View All</button>
          </div>
          {dues.length===0?<div style={{textAlign:'center',padding:'20px 0',color:'var(--n400)',fontSize:12.5}}>No upcoming dues. You're clear! ✓</div>:(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {dues.slice(0,4).map(cc=>{
                const d=daysDiff(cc.dueDate);
                const urgent=d!==null&&d<=3;
                const warn=d!==null&&d<=7;
                const bg=urgent?'linear-gradient(135deg,#7f1d1d,#dc2626)':warn?'linear-gradient(135deg,#78350f,#d97706)':'linear-gradient(135deg,#1e3a5f,#2563eb)';
                return(

      </div>

      {/* ROW 3b: Emergency Fund + Payment Mode Insights */}
      <div className="g2 mb3">
        <EfCard data={data} accounts={accounts} totalExp={totalExp} months={months}/>
        <PmCard periodTxs={periodTxs} totalExp={totalExp}/>
      </div>
      {/* ROW 4: Loan Snapshot */}
      <div className="card">
        <div className="sh mb2"><div className="sh-t"><Ic n="loan" s={14} c="var(--g)"/>Loan Snapshot</div><span className="tag tr">Total O/S: {fmtINR(loanOS,true)}</span></div>
        <div className="tw">
          <table>
            <thead><tr><th>Bank</th><th>Type</th><th className="num">Outstanding</th><th className="num">EMI/Month</th><th>ROI</th><th>End Date</th><th>Repaid</th></tr></thead>
            <tbody>
              {loans.map(l=>{
                const pct=l.original>0?(l.original-l.outstanding)/l.original*100:0;
                return(
                  <tr key={l.id}>
                    <td style={{fontWeight:700}}>{l.bank}</td>
                    <td><span className="tag tb">{l.type}</span></td>
                    <td className="num neg">{fmtINR(l.outstanding)}</td>
                    <td className="num">{fmtINR(l.emi)}</td>
                    <td><span className="tag to">{l.roi}%</span></td>
                    <td style={{fontSize:12}}>{fmtDate(l.endDate)}</td>
                    <td style={{width:130}}>
                      <div style={{display:'flex',alignItems:'center',gap:7}}>

                        <span style={{fontSize:10.5,color:'var(--n400)',width:35,textAlign:'right'}}>{pct.toFixed(0)}%</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function PageFund({data,setData,toast}){
  const {accounts,budgetLimits,transactions,profile}=data;
  const [modal,setModal]=useState(null);
  const ef={name:'',type:'bank',accNo:'XXXX-0000',balance:'',color:'#1a4a6e'};
  const [form,setForm]=useState(ef);
  const fundFileRef=useRef();
  const handleFundCSV=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      const hdr=lines[0].toLowerCase().split(',').map(h=>h.trim().replace(/"/g,''));
      const accs=lines.slice(1).map(line=>{
        const cols=line.split(',').map(c=>c.trim().replace(/"/g,''));
        const o={};hdr.forEach((h,i)=>o[h]=cols[i]||'');
        if(!o.name)return null;
        return{id:uid(),name:o.name,type:o.type||'bank',accNo:o.accno||o['acc no']||o['account number']||'XXXX-0000',balance:parseFloat(o.balance)||0,color:o.color||'#1a4a6e'};
      }).filter(Boolean);
      setData(d=>({...d,accounts:[...d.accounts,...accs]}));
      toast(`Imported ${accs.length} accounts`,'g');
    };
    r.readAsText(f);e.target.value='';
  };
  const downloadFundTemplate=()=>{
    const b=new Blob(['name,type,accNo,balance,color\nHDFC Bank Savings,bank,XXXX-1234,150000,#003366\nCash In Hand,cash,CASH-001,5000,#065f46\nPaytm Wallet,wallet,PAYTM-001,2500,#002970\nSBI FD,fd,FD-001,200000,#007A62\n'],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='finmanager-accounts-template.csv';a.click();
  };

  const banks=accounts.filter(a=>a.type==='bank');
  const cashes=accounts.filter(a=>a.type==='cash');
  const wallets=accounts.filter(a=>a.type==='wallet');
  const fds=accounts.filter(a=>a.type==='fd');
  const bT=banks.reduce((s,a)=>s+a.balance,0);
  const cT=cashes.reduce((s,a)=>s+a.balance,0);
  const wT=wallets.reduce((s,a)=>s+a.balance,0);
  const fT=fds.reduce((s,a)=>s+a.balance,0);
  const liq=bT+cT+wT;

  const monthlyBudget=Object.values(budgetLimits).reduce((s,v)=>s+v,0);
  const today=new Date();
  const dom=today.getDate(),dim=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const curMK=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const curExp=transactions.filter(t=>t.month===curMK&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const unspent=monthlyBudget-curExp;
  const dLeft=dim-dom+1;

  const openAdd=t=>{setForm({...ef,type:t});setModal('add');};
  const openEdit=a=>{setForm({name:a.name,type:a.type,accNo:a.accNo,balance:String(a.balance),color:a.color||'#1a4a6e'});setModal({eid:a.id});};
  const close=()=>{setModal(null);setForm(ef);};

  const save=()=>{
    if(!form.name)return;
    const entry={name:form.name,type:form.type,accNo:form.accNo,balance:parseFloat(form.balance)||0,color:form.color};
    if(modal==='add'){setData(d=>({...d,accounts:[...d.accounts,{id:uid(),...entry}]}));toast('Account added','g');}
    else{setData(d=>({...d,accounts:d.accounts.map(a=>a.id===modal.eid?{...a,...entry}:a)}));toast('Account updated','g');}
    close();
  };
  const del=id=>{if(!window.confirm('Remove this account?'))return;setData(d=>({...d,accounts:d.accounts.filter(a=>a.id!==id)}));toast('Removed','x');};

  const AccRow=({a})=>{
    const ini=a.name.split(/[\s–\-]/).filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase();
    return(
      <div className="acc-row">
        <div className="acc-ic" style={{background:(a.color||'#1a4a6e')+'22',color:a.color||'#1a4a6e'}}>{ini}</div>
        <div>
          <div className="acc-name">{a.name}</div>
          <div className="acc-no">{a.accNo}</div>
        </div>
        <div className="acc-bal">
          <div className={`acc-num ${a.balance<0?'neg':'pos'}`}>{fmtINR(a.balance)}</div>
        </div>
        <div style={{display:'flex',gap:4,marginLeft:10}}>
          <button className="bic" onClick={()=>openEdit(a)}><Ic n="edit" s={11}/></button>

        <div className="fg"><label>Type</label>

        <div className="fg"><label>Balance (₹) – negative for OD</label><input type="number" value={form.balance} onChange={e=>setForm(f=>({...f,balance:e.target.value}))} placeholder="0"/></div>
      </div>
      <div className="fg"><label>Brand Color (for icon)</label><input type="color" value={form.color} onChange={e=>setForm(f=>({...f,color:e.target.value}))} style={{height:36,padding:'3px 6px'}}/></div>
    </>
  );

  return(
    <div className="page">
      <div className="ph">
        <div><div className="ptitle">Fund Balance Sheet</div><div className="psub">All accounts · Daily unspent tracker · Fully editable</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-s btn-sm" onClick={downloadFundTemplate}><Ic n="dl" s={12}/>Template</button>
          <button className="btn btn-s btn-sm" onClick={()=>fundFileRef.current.click()}><Ic n="up" s={12}/>CSV Import</button>
        </div>

      <input type="file" ref={fundFileRef} accept=".csv" style={{display:'none'}} onChange={handleFundCSV}/>

        <div className="card"><div className="ci" style={{background:'var(--gl)'}}><Ic n="bank" c="var(--g)"/></div><div className="cl">Bank Total</div><div className={`cv ${bT<0?'r':'g'}`}>{fmtINR(bT)}</div><div className="cm">{banks.filter(a=>a.balance>0).length} active</div></div>
        <div className="card"><div className="ci" style={{background:'var(--bl)'}}><Ic n="wallet" c="var(--b)"/></div><div className="cl">Cash + Wallet</div><div className="cv b">{fmtINR(cT+wT)}</div><div className="cm">In-hand</div></div>
        <div className="card"><div className="ci" style={{background:'var(--pl)'}}><Ic n="shield" c="var(--p)"/></div><div className="cl">Fixed Deposits</div><div className="cv p">{fmtINR(fT,true)}</div><div className="cm">Locked savings</div></div>
        <div className="card"><div className="ci" style={{background:'var(--gl)'}}><Ic n="fund" c="var(--g)"/></div><div className="cl">Liquid Total</div><div className="cv g">{fmtINR(liq)}</div><div className="cm">Bank + Cash + Wallet</div></div>

      {/* Unspent Trackers */}

      <div className="g2">

        foot={<><button className="btn btn-s btn-sm" onClick={close}>Cancel</button><button className="btn btn-p btn-sm" onClick={save}><Ic n={modal==='add'?'plus':'ok'} s={12} c="#fff"/>{modal==='add'?'Add':'Save'}</button></>}>
        {AccForm}

    </div>
  );
}

/* ══════════════════════════════════════
   TRANSACTIONS
══════════════════════════════════════ */
function PageTx({data,setData,toast,type}){
  const {transactions,expenseCategories,incomeCategories,profile}=data;
  const cats=type==='expense'?expenseCategories:incomeCategories;
  const isInc=type==='income';
  const color=isInc?'var(--gd)':'var(--r)';
  const months=useMemo(()=>getPeriodMonths(profile.periodStart,profile.periodEnd),[profile.periodStart,profile.periodEnd]);
  const [selM,setSelM]=useState('all');
  const ef={date:new Date().toISOString().slice(0,10),category:'',desc:'',amount:'',paymentMode:''};
  const [form,setForm]=useState(ef);
  const [eid,setEid]=useState(null);
  const [sel,setSel]=useState(new Set());
  const fileRef=useRef();

  const filtered=useMemo(()=>[...transactions.filter(t=>t.type===type&&(selM==='all'||t.month===selM))].sort((a,b)=>new Date(b.date)-new Date(a.date)),[transactions,type,selM]);
  const total=filtered.reduce((s,t)=>s+t.amount,0);
  const allSel=filtered.length>0&&sel.size===filtered.length;

  const save=()=>{
    if(!form.date||!form.category||!form.amount||isNaN(+form.amount))return;
    const month=form.date.slice(0,7);
    if(eid){
      setData(d=>({...d,transactions:d.transactions.map(t=>t.id===eid?{...t,...form,amount:+form.amount,month}:t)}));
      toast('Updated','g');
    }else{
      setData(d=>({...d,transactions:[...d.transactions,{id:uid(),date:form.date,type,category:form.category,desc:form.desc,amount:+form.amount,month,paymentMode:form.paymentMode||''}]}));
      toast('Added','g');
    }
    setForm(ef);setEid(null);
  };
  const startEdit=t=>{setEid(t.id);setForm({date:t.date,category:t.category,desc:t.desc,amount:String(t.amount),paymentMode:t.paymentMode||''});};
  const cancel=()=>{setEid(null);setForm(ef);};
  const del=id=>{setData(d=>({...d,transactions:d.transactions.filter(t=>t.id!==id)}));toast('Deleted','x');};
  const bulkDel=()=>{if(!sel.size)return;if(!window.confirm(`Delete ${sel.size} selected transactions?`))return;setData(d=>({...d,transactions:d.transactions.filter(t=>!sel.has(t.id))}));setSel(new Set());toast(`Deleted ${sel.size} entries`,'x');};
  const toggleAll=()=>setSel(allSel?new Set():new Set(filtered.map(t=>t.id)));
  const toggleOne=id=>setSel(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});

  const exportCSV=()=>{
    const hdr='date,type,category,description,amount,paymentMode';
    const rows=filtered.map(t=>`${t.date},${t.type},${t.category},"${t.desc||''}",${t.amount},${t.paymentMode||''}`);
    const blob=new Blob([hdr+'\n'+rows.join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`finmanager-${type}-${selM}.csv`;a.click();
    toast('CSV exported','g');
  };
  const downloadTemplate=()=>{
    const blob=new Blob(['date,type,category,description,amount,paymentMode\n2026-04-01,expense,House Rent,April Rent,20500,NEFT/Bank Transfer\n2026-04-02,income,Consultancy Income (Salary),Salary,75000,NEFT/Bank Transfer'],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='finmanager-template.csv';a.click();
  };
  const handleCSV=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      const hdr=lines[0].toLowerCase().split(',').map(h=>h.trim().replace(/"/g,''));
      const txs=lines.slice(1).map(line=>{
        const cols=line.split(',').map(c=>c.trim().replace(/"/g,''));
        const o={};hdr.forEach((h,i)=>o[h]=cols[i]||'');
        if(!o.date||!o.amount||!o.type)return null;
        const amount=parseFloat(o.amount);if(isNaN(amount))return null;
        return{id:uid(),date:o.date,type:o.type.toLowerCase().trim(),category:o.category||'Other Expense',desc:o.description||o.desc||'',amount,month:o.date.slice(0,7),paymentMode:o.paymentmode||o['payment mode']||''};
      }).filter(Boolean);
      setData(d=>({...d,transactions:[...d.transactions,...txs]}));
      toast(`Imported ${txs.length} transactions`,'g');
    };
    r.readAsText(f);e.target.value='';
  };

  // Payment mode breakdown
  const pmMap={};filtered.forEach(t=>{const pm=t.paymentMode||'Unknown';pmMap[pm]=(pmMap[pm]||0)+t.amount;});
  const topPM=Object.entries(pmMap).sort((a,b)=>b[1]-a[1]).slice(0,3);

  return(
    <div className="page">
      <div className="ph">
        <div><div className="ptitle">{isInc?'Income Tracker':'Expense Tracker'}</div><div className="psub">Daily {isInc?'income':'expense'} log</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-s btn-sm" onClick={downloadTemplate}><Ic n="dl" s={12}/>Template</button>
          <button className="btn btn-s btn-sm" onClick={()=>fileRef.current.click()}><Ic n="up" s={12}/>CSV Import</button>
          <button className="btn btn-s btn-sm" onClick={exportCSV}><Ic n="dl" s={12}/>Export CSV</button>
        </div>
      </div>
      <input type="file" ref={fileRef} accept=".csv" style={{display:'none'}} onChange={handleCSV}/>
      <div className="g3 mb3">
        <div className="card"><div className="cl">Filtered Total</div><div className="cv" style={{color,fontSize:18}}>{fmtINR(total)}</div><div className="cm">{filtered.length} entries · {months.length} months</div></div>
        {topPM.map(([pm,v])=>(
          <div className="card" key={pm}><div className="cl">{pm||'Unknown'}</div><div className="cv" style={{color,fontSize:17}}>{fmtINR(v,true)}</div><div className="cm">{total>0?(v/total*100).toFixed(1):0}% by mode</div></div>
        ))}
        {topPM.length===0&&Object.entries(filtered.reduce((m,t)=>{m[t.category]=(m[t.category]||0)+t.amount;return m;},{})).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([c,v])=>(
          <div className="card" key={c}><div className="cl">{c}</div><div className="cv" style={{color,fontSize:17}}>{fmtINR(v,true)}</div><div className="cm">{total>0?(v/total*100).toFixed(1):0}% of total</div></div>
        ))}
      </div>
      {/* Form */}
      <div className="card mb3">
        <div className="sh mb2">
          <div className="sh-t"><Ic n={eid?'edit':'plus'} s={14} c="var(--g)"/>{eid?'Edit Entry':'Add New Entry'}</div>
          {eid&&<button className="btn btn-g btn-sm" onClick={cancel}>Cancel</button>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 2fr 1fr 1fr auto',gap:10,alignItems:'end'}}>
          <div className="fg"><label>Date</label><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
          <div className="fg"><label>Category</label>
            <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
              <option value="">– Select –</option>
              {cats.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="fg"><label>Description / Narration</label><input type="text" placeholder="Details…" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/></div>
          <div className="fg"><label>Payment Mode</label>
            <select value={form.paymentMode} onChange={e=>setForm(f=>({...f,paymentMode:e.target.value}))}>
              <option value="">– Mode –</option>
              {PAYMENT_MODES.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div className="fg"><label>Amount (₹)</label>
            <input type="number" placeholder="0.00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}/>
          </div>
          <button className="btn btn-p" onClick={save} style={{marginBottom:1}}><Ic n={eid?'ok':'plus'} s={13} c="#fff"/></button>
        </div>
      </div>
      {/* Bulk actions bar */}
      {sel.size>0&&(
        <div className="bulk-bar">
          <Ic n="del" s={13} c="var(--gd)"/>
          {sel.size} selected
          <button className="btn btn-d btn-sm" onClick={bulkDel}><Ic n="del" s={12}/>Delete Selected</button>
          <button className="btn btn-g btn-sm" onClick={()=>setSel(new Set())}>Clear</button>
        </div>
      )}
      {/* Month filter */}
      <div className="mbar">
        <div className={`mchip ${selM==='all'?'on':''}`} onClick={()=>setSelM('all')}>All</div>
        {months.map(m=><div key={m.key} className={`mchip ${selM===m.key?'on':''}`} onClick={()=>setSelM(m.key)}>{m.label}</div>)}
      </div>
      <div className="tw">
        <table>
          <thead><tr>
            <th style={{width:34}}><input type="checkbox" checked={allSel} onChange={toggleAll}/></th>
            <th>Date</th><th>Month</th><th>Category</th><th>Description</th><th>Mode</th><th className="num">Amount (₹)</th><th>Actions</th>
          </tr></thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={8}><div style={{textAlign:'center',padding:'28px',color:'var(--n400)',fontSize:12.5}}>No entries found.</div></td></tr>}
            {filtered.map(t=>(
              <tr key={t.id} className={`cb-row ${sel.has(t.id)?'sel':''}`} style={{background:eid===t.id?'var(--gl)':''}}>
                <td><input type="checkbox" checked={sel.has(t.id)} onChange={()=>toggleOne(t.id)}/></td>
                <td style={{fontFamily:'var(--m)',fontSize:12}}>{fmtDate(t.date)}</td>
                <td><span className="tag tx">{fmtMonth(t.month)}</span></td>
                <td style={{fontSize:12.5}}>{t.category}</td>
                <td style={{fontSize:12,color:'var(--n500)'}}>{t.desc}</td>
                <td>{t.paymentMode?<span className={`pm-badge ${pmClass(t.paymentMode)}`}>{t.paymentMode}</span>:'–'}</td>
                <td className={`num ${isInc?'pos':'neg'}`}>{fmtINR(t.amount)}</td>
                <td><div style={{display:'flex',gap:4}}><button className="bic" onClick={()=>startEdit(t)}><Ic n="edit" s={11}/></button><button className="bic red" onClick={()=>del(t.id)}><Ic n="del" s={11}/></button></div></td>
              </tr>
            ))}
          </tbody>
          {filtered.length>0&&<tfoot><tr className="tft"><td colSpan={5} style={{fontWeight:700}}>Total ({filtered.length} entries)</td><td/><td className={`num ${isInc?'pos':'neg'}`}>{fmtINR(total)}</td><td/></tr></tfoot>}
        </table>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   BUDGET
══════════════════════════════════════ */
function PageBudget({data,setData,toast}){
  const {transactions,budgetLimits,expenseCategories,profile}=data;
  const [mode,setMode]=useState('monthly');
  const months=useMemo(()=>getPeriodMonths(profile.periodStart,profile.periodEnd),[profile.periodStart,profile.periodEnd]);
  const [selM,setSelM]=useState(months[months.length-2]?.key||months[0]?.key||'');

  const getActual=cat=>transactions.filter(t=>t.type==='expense'&&t.category===cat&&(mode==='monthly'?t.month===selM:months.some(m=>m.key===t.month))).reduce((s,t)=>s+t.amount,0);
  const getBudget=cat=>mode==='monthly'?(budgetLimits[cat]||0):(budgetLimits[cat]||0)*months.length;
  const rows=expenseCategories.map(cat=>{const actual=getActual(cat),budget=getBudget(cat),variance=budget-actual,pct=budget>0?(actual/budget)*100:actual>0?999:0;return{cat,actual,budget,variance,pct};}).filter(r=>r.actual>0||r.budget>0);
  const tA=rows.reduce((s,r)=>s+r.actual,0),tB=rows.reduce((s,r)=>s+r.budget,0),tV=tB-tA;

  return(
    <div className="page">
      <div className="ph">
        <div><div className="ptitle">Budget vs Actual</div><div className="psub">Period: {periodLabel(profile.periodStart,profile.periodEnd)}</div></div>
        <div className="tgl"><button className={`tgo ${mode==='monthly'?'on':''}`} onClick={()=>setMode('monthly')}>Monthly</button><button className={`tgo ${mode==='annual'?'on':''}`} onClick={()=>setMode('annual')}>Full Period</button></div>
      </div>
      {mode==='monthly'&&<div className="mbar">{months.map(m=><div key={m.key} className={`mchip ${selM===m.key?'on':''}`} onClick={()=>setSelM(m.key)}>{m.label}</div>)}</div>}
      <div className="g3 mb3">
        <div className="card"><div className="cl">{mode==='monthly'?'Monthly':'Period'} Budget</div><div className="cv b">{fmtINR(tB)}</div><div className="cm">{mode==='annual'?`${months.length} months × monthly limit`:'Configured'}</div></div>
        <div className="card"><div className="cl">Actual Spent</div><div className="cv r">{fmtINR(tA)}</div></div>
        <div className="card"><div className="cl">Unspent / Overspent</div><div className={`cv ${tV>=0?'g':'r'}`}>{tV>=0?'+':''}{fmtINR(tV)}</div><div className="cm">{tV>=0?'Under budget ✓':'Over budget ⚠'}</div></div>
      </div>
      <div className="tw">
        <table>
          <thead><tr><th>Category</th><th className="num">Budget (₹)</th><th className="num">Actual (₹)</th><th className="num">Variance (₹)</th><th>Utilization</th><th>Status</th></tr></thead>
          <tbody>
            {rows.map(r=>(
              <tr key={r.cat}>
                <td style={{fontWeight:700,fontSize:12.5}}>{r.cat}</td>
                <td className="num">{r.budget.toLocaleString('en-IN')}</td>
                <td className="num">{r.actual.toLocaleString('en-IN')}</td>
                <td className={`num ${r.variance>=0?'pos':'neg'}`}>{r.variance>=0?'+':''}{r.variance.toLocaleString('en-IN')}</td>
                <td style={{width:150}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <div className="prog" style={{flex:1,height:6}}><div className="pf" style={{width:`${Math.min(100,r.pct)}%`,background:r.pct>100?'var(--r)':r.pct>85?'var(--o)':'var(--g)'}}/></div>
                    <span style={{fontSize:10,color:'var(--n400)',width:34,textAlign:'right'}}>{r.pct>999?'∞':r.pct.toFixed(0)}%</span>
                  </div>
                </td>
                <td>{r.pct>100?<span className="tag tr">Over</span>:r.pct>85?<span className="tag to">Near</span>:r.budget===0?<span className="tag tx">No Limit</span>:<span className="tag tg">OK</span>}</td>
              </tr>
            ))}
          </tbody>
          <tfoot><tr className="tft"><td style={{fontWeight:700}}>Total</td><td className="num bold">{tB.toLocaleString('en-IN')}</td><td className="num bold">{tA.toLocaleString('en-IN')}</td><td className={`num bold ${tV>=0?'pos':'neg'}`}>{tV>=0?'+':''}{tV.toLocaleString('en-IN')}</td><td/><td/></tr></tfoot>
        </table>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PnL
══════════════════════════════════════ */
function PagePnL({data}){
  const {transactions,profile}=data;
  const months=useMemo(()=>getPeriodMonths(profile.periodStart,profile.periodEnd),[profile.periodStart,profile.periodEnd]);
  const [selM,setSelM]=useState('all');
  const getD=key=>{const txs=transactions.filter(t=>key==='all'?months.some(m=>m.key===t.month):t.month===key);const income=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);const expense=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);return{income,expense,surplus:income-expense};};
  const summary=months.map(m=>({...m,...getD(m.key)}));
  const totals=getD('all');const cur=selM==='all'?totals:getD(selM);
  const incCats={};transactions.filter(t=>t.type==='income'&&(selM==='all'?months.some(m=>m.key===t.month):t.month===selM)).forEach(t=>{incCats[t.category]=(incCats[t.category]||0)+t.amount;});
  const expCats={};transactions.filter(t=>t.type==='expense'&&(selM==='all'?months.some(m=>m.key===t.month):t.month===selM)).forEach(t=>{expCats[t.category]=(expCats[t.category]||0)+t.amount;});
  return(
    <div className="page">
      <div className="ph"><div><div className="ptitle">P &amp; L Statement</div><div className="psub">Period: {periodLabel(profile.periodStart,profile.periodEnd)}</div></div></div>
      <div className="mbar"><div className={`mchip ${selM==='all'?'on':''}`} onClick={()=>setSelM('all')}>Full Period</div>{months.map(m=><div key={m.key} className={`mchip ${selM===m.key?'on':''}`} onClick={()=>setSelM(m.key)}>{m.label}</div>)}</div>
      <div className="g4 mb3">
        {[{l:'Total Income',v:cur.income,col:'g',icon:'inc'},{l:'Total Expense',v:cur.expense,col:'r',icon:'exp'},{l:'Net Surplus/Deficit',v:cur.surplus,col:cur.surplus>=0?'g':'r',icon:'pnl',sub:`${cur.income>0?(cur.surplus/cur.income*100).toFixed(2):0}% of income`},{l:'Savings Rate',v:null,col:cur.surplus>=0?'g':'r',icon:'budget',pct:cur.income>0?(cur.surplus/cur.income*100).toFixed(1):0}].map(k=>(
          <div className={`kpi-card ${k.col}`} key={k.l}>
            <div className="kpi-ic-wrap"><div className="kpi-ic" style={{background:k.col==='g'?'var(--gl)':'var(--rl)'}}><Ic n={k.icon} c={k.col==='g'?'var(--g)':'var(--r)'}/></div></div>
            <div className="cl">{k.l}</div>
            {k.pct!==undefined?<div className={`cv ${k.col}`} style={{fontSize:20}}>{k.pct}%</div>:<div className={`cv ${k.col}`} style={{fontSize:17}}>{fmtINR(k.v)}</div>}
            {k.sub&&<div className="cm">{k.sub}</div>}
          </div>
        ))}
      </div>
      <div className="g2 mb3">
        <div className="card">
          <div className="sh mb2"><div className="sh-t"><Ic n="inc" s={14} c="var(--g)"/>Income Breakdown</div><span className="tag tg">{fmtINR(cur.income,true)}</span></div>
          {Object.entries(incCats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>(<div key={cat} style={{marginBottom:9}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:12.5}}>{cat}</span><span style={{fontFamily:'var(--m)',fontSize:12,fontWeight:600,color:'var(--gd)'}}>{fmtINR(amt)}</span></div><div className="prog"><div className="pf" style={{width:`${cur.income>0?amt/cur.income*100:0}%`,background:'var(--g)'}}/></div></div>))}
          {!Object.keys(incCats).length&&<div style={{textAlign:'center',padding:'16px',color:'var(--n400)',fontSize:12}}>No income data.</div>}
        </div>
        <div className="card">
          <div className="sh mb2"><div className="sh-t"><Ic n="exp" s={14} c="var(--r)"/>Expense Breakdown</div><span className="tag tr">{fmtINR(cur.expense,true)}</span></div>
          {Object.entries(expCats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>(<div key={cat} style={{marginBottom:9}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:12.5}}>{cat}</span><span style={{fontFamily:'var(--m)',fontSize:12,fontWeight:600,color:'var(--r)'}}>{fmtINR(amt)}</span></div><div className="prog"><div className="pf" style={{width:`${cur.expense>0?amt/cur.expense*100:0}%`,background:'var(--r)'}}/></div></div>))}
          {!Object.keys(expCats).length&&<div style={{textAlign:'center',padding:'16px',color:'var(--n400)',fontSize:12}}>No expense data.</div>}
        </div>
      </div>
      <div className="card">
        <div className="sh mb2"><div className="sh-t"><Ic n="pnl" s={14} c="var(--g)"/>Monthly P&amp;L Breakdown</div></div>
        <div className="tw">
          <table>
            <thead><tr><th>Month</th><th className="num">Income (₹)</th><th className="num">Expense (₹)</th><th className="num">Surplus / Deficit (₹)</th><th className="num">Savings %</th><th>Status</th></tr></thead>
            <tbody>
              {summary.map(m=>(<tr key={m.key} style={{cursor:'pointer',background:selM===m.key?'var(--gl)':''}} onClick={()=>setSelM(m.key)}><td style={{fontWeight:700}}>{m.label}</td><td className="num pos">{m.income.toLocaleString('en-IN')}</td><td className="num neg">{m.expense.toLocaleString('en-IN')}</td><td className={`num ${m.surplus>=0?'pos':'neg'}`}>{m.surplus.toLocaleString('en-IN')}</td><td className="num" style={{fontSize:11.5}}>{m.income>0?(m.surplus/m.income*100).toFixed(2):'–'}%</td><td>{m.income===0&&m.expense===0?<span className="tag tx">No Data</span>:m.surplus>=0?<span className="tag tg">Surplus</span>:<span className="tag tr">Deficit</span>}</td></tr>))}
            </tbody>
            <tfoot><tr className="tft"><td style={{fontWeight:700}}>Period Total</td><td className="num pos bold">{totals.income.toLocaleString('en-IN')}</td><td className="num neg bold">{totals.expense.toLocaleString('en-IN')}</td><td className={`num bold ${totals.surplus>=0?'pos':'neg'}`}>{totals.surplus.toLocaleString('en-IN')}</td><td className="num bold">{totals.income>0?(totals.surplus/totals.income*100).toFixed(2):0}%</td><td/></tr></tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════

function PageCC({data,setData,toast}){
  const {creditCards}=data;
  const ef={bank:'',type:'',accNo:'XXXX-XXXX-XXXX-0000',limit:'',payable:'',provision:'',dueDate:''};
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState(ef);
  const tL=creditCards.reduce((s,c)=>s+c.limit,0);
  const tP=creditCards.reduce((s,c)=>s+c.payable,0);
  const tProv=creditCards.reduce((s,c)=>s+c.provision,0);
  const util=tL>0?(tP+tProv)/tL*100:0;
  const dues=creditCards.filter(c=>c.dueDate&&c.payable>0).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));

  const openAdd=()=>{setForm(ef);setModal('add');};
  const ccFileRef=useRef();
  const handleCCCSV=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      const hdr=lines[0].toLowerCase().split(',').map(h=>h.trim().replace(/"/g,''));
      const cards=lines.slice(1).map(line=>{
        const cols=line.split(',').map(c=>c.trim().replace(/"/g,''));
        const o={};hdr.forEach((h,i)=>o[h]=cols[i]||'');
        if(!o.bank||!o.type)return null;
        return{id:uid(),bank:o.bank,type:o.type||o['card type']||'',accNo:o.accno||o['acc no']||o['card number']||'XXXX-0000',limit:parseFloat(o.limit||o['credit limit'])||0,payable:parseFloat(o.payable||o.billed)||0,provision:parseFloat(o.provision||o.unbilled)||0,dueDate:o.duedate||o['due date']||null};
      }).filter(Boolean);
      setData(d=>({...d,creditCards:[...d.creditCards,...cards]}));
      toast(`Imported ${cards.length} credit cards`,'g');
    };
    r.readAsText(f);e.target.value='';

  const downloadCCTemplate=()=>{
    const b=new Blob(['bank,type,accNo,limit,payable,provision,dueDate\nHDFC Bank,Visa Infinite,XXXX-XXXX-XXXX-1234,300000,15000,5000,2026-05-15\nICICI Bank,Amazon Pay,XXXX-XXXX-XXXX-5678,200000,8000,2000,2026-05-20\n'],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='finmanager-cc-template.csv';a.click();

  const close=()=>{setModal(null);setForm(ef);};
  const save=()=>{
    if(!form.bank||!form.type||!form.limit)return;
    const e={bank:form.bank,type:form.type,accNo:form.accNo,limit:+form.limit,payable:+form.payable||0,provision:+form.provision||0,dueDate:form.dueDate||null};
    if(modal==='add'){setData(d=>({...d,creditCards:[...d.creditCards,{id:uid(),...e}]}));toast('Card added','g');}
    else{setData(d=>({...d,creditCards:d.creditCards.map(c=>c.id===modal.eid?{...c,...e}:c)}));toast('Card updated','g');}
    close();
  };
  const del=id=>{if(!window.confirm('Remove card?'))return;setData(d=>({...d,creditCards:d.creditCards.filter(c=>c.id!==id)}));toast('Removed','x');};

  const CCForm=(<>
    <div className="f2 mb2"><div className="fg"><label>Bank Name</label><input value={form.bank} onChange={e=>setForm(f=>({...f,bank:e.target.value}))} placeholder="e.g. HDFC Bank"/></div><div className="fg"><label>Card Type / Network</label><input value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))} placeholder="e.g. Visa Infinite"/></div></div>
    <div className="f2 mb2"><div className="fg"><label>Credit Limit (₹)</label><input type="number" value={form.limit} onChange={e=>setForm(f=>({...f,limit:e.target.value}))}/></div><div className="fg"><label>Payment Due Date</label><input type="date" value={form.dueDate} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))}/></div></div>
    <div className="f2"><div className="fg"><label>Billed Amount – Payable (₹)</label><input type="number" value={form.payable} onChange={e=>setForm(f=>({...f,payable:e.target.value}))}/></div><div className="fg"><label>Unbilled – Provision (₹)</label><input type="number" value={form.provision} onChange={e=>setForm(f=>({...f,provision:e.target.value}))}/></div></div>
  </>);

  return(
    <div className="page">
      <div className="ph"><div><div className="ptitle">Credit Card Manager</div><div className="psub">Billed vs Unbilled · Due Date Tracker</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-s btn-sm" onClick={downloadCCTemplate}><Ic n="dl" s={12}/>Template</button>

          <button className="btn btn-p" onClick={openAdd}><Ic n="plus" s={13} c="#fff"/>Add Card</button>

        <div className="card"><div className="cl">Billed (Payable)</div><div className="cv r">{fmtINR(tP)}</div><div className="cm">Due now</div></div>
        <div className="card"><div className="cl">Unbilled (Provision)</div><div className="cv o">{fmtINR(tProv)}</div><div className="cm">Upcoming</div></div>
        <div className="card"><div className="cl">Overall Utilization</div>
          <div style={{display:'flex',gap:12,alignItems:'center',marginTop:6}}>
            <Donut pct={util} color={util>30?'var(--r)':util>15?'var(--o)':'var(--g)'} size={70} stroke={7} label="Used"/>
            <div><div className="cv" style={{fontSize:17,color:util>30?'var(--r)':util>15?'var(--o)':'var(--gd)'}}>{util.toFixed(2)}%</div><div className="cm">of {fmtINR(tL,true)}</div></div>
          </div>
        </div>
      </div>

      {/* 🔔 Payment Due Notification Panel (within 3 days) */}
      {(()=>{
        const urgentDues=creditCards.filter(c=>{const d=daysDiff(c.dueDate);return d!==null&&d<=3&&d>=0&&c.payable>0;}).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
        if(urgentDues.length===0)return null;
        return(
          <div className="card mb3" style={{border:'2px solid var(--r)',background:'linear-gradient(135deg,#fff5f5,#fff0f0)'}}>
            <div className="sh mb2">
              <div className="sh-t" style={{color:'var(--r)'}}><Ic n="bell" s={15} c="var(--r)"/>⚡ Payment Due Within 3 Days</div>
              <span className="tag tr" style={{fontSize:11,padding:'3px 10px'}}>{urgentDues.length} urgent</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
              {urgentDues.map(cc=>{
                const d=daysDiff(cc.dueDate);

                  <div key={cc.id} style={{display:'flex',gap:12,alignItems:'center',padding:'12px 14px',background:'#fff',borderRadius:'var(--r8)',border:'1.5px solid rgba(220,38,38,.2)',boxShadow:'0 2px 8px rgba(220,38,38,.08)'}}>
                    <div style={{width:44,height:44,borderRadius:10,background:d===0?'var(--r)':'var(--o)',display:'grid',placeItems:'center',flexShrink:0}}>
                      <Ic n="bell" s={20} c="#fff"/>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13}}>{cc.bank} – {cc.type}</div>
                      <div style={{fontSize:11,color:'var(--n500)',marginTop:1}}>
                        {d===0?'⚠ DUE TODAY — Pay immediately!':d===1?'⚠ Due TOMORROW!':d===2?'⚠ Due in 2 days':d===3?'Due in 3 days':''}
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontFamily:'var(--m)',fontSize:16,fontWeight:800,color:'var(--r)'}}>{fmtINR(cc.payable)}</div>
                      <div style={{fontSize:10.5,color:'var(--n400)',fontWeight:600}}>{fmtDate(cc.dueDate)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:10,fontSize:11.5,color:'#7f1d1d',fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
              <Ic n="prov" s={12} c="#7f1d1d"/>Pay on time to avoid late fees and protect your credit score.
            </div>
          </div>
        );
      })()}

      {/* Beautiful due cards */}
      {dues.length>0&&(
        <div className="card mb3">
          <div className="sh mb3"><div className="sh-t"><Ic n="cal" s={14} c="var(--g)"/>Upcoming Payment Dues</div><span className="tag tr">{dues.length} due</span></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:10}}>
            {dues.map(cc=>{
              const d=daysDiff(cc.dueDate);
              const urgent=d!==null&&d<=2;const warn=d!==null&&d<=7;
              const bg=urgent?'linear-gradient(135deg,#7f1d1d 0%,#b91c1c 100%)':warn?'linear-gradient(135deg,#78350f 0%,#b45309 100%)':'linear-gradient(135deg,#1e3a5f 0%,#1d4ed8 100%)';
              return(
                <div key={cc.id} className="due-card" style={{background:bg}}>
                  <div className="due-urgency">
                    <div><div className="due-bank" style={{color:'rgba(255,255,255,.7)'}}>{cc.bank}</div><div className="due-card-type" style={{color:'#fff'}}>{cc.type}</div></div>
                    <div className="due-days-badge" style={{background:'rgba(0,0,0,.25)',color:'#fff',border:'1px solid rgba(255,255,255,.2)'}}>
                      {d===0?'⚠ Today':d<0?`${Math.abs(d)}d Overdue`:`${d}d left`}
                    </div>
                  </div>
                  <div className="due-amount-row">
                    <div><div style={{fontSize:9,opacity:.65,color:'#fff',textTransform:'uppercase',letterSpacing:.5,marginBottom:2}}>Amount Due</div><div className="due-amount" style={{color:'#fff'}}>{fmtINR(cc.payable)}</div></div>
                    <div className="due-date-block"><div style={{fontSize:9,opacity:.65,color:'rgba(255,255,255,.7)',textTransform:'uppercase',letterSpacing:.4}}>Due On</div><div style={{fontSize:12,fontWeight:700,color:'#fcd34d'}}>{fmtDate(cc.dueDate)}</div></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="card">
        <div className="sh mb2"><div className="sh-t"><Ic n="cc" s={14} c="var(--g)"/>All Credit Cards</div></div>
        <div className="tw">
          <table>
            <thead><tr><th>Bank</th><th>Card</th><th className="num">Limit (₹)</th><th className="num">Billed (₹)</th><th className="num">Unbilled (₹)</th><th className="num">Total Due (₹)</th><th>Due Date</th><th>Util%</th><th>Actions</th></tr></thead>
            <tbody>
              {creditCards.map(c=>{
                const u=c.limit>0?(c.payable+c.provision)/c.limit*100:0,d=daysDiff(c.dueDate);
                return(<tr key={c.id}>
                  <td style={{fontWeight:700}}>{c.bank}</td><td style={{fontSize:12.5}}>{c.type}</td>
                  <td className="num">{c.limit.toLocaleString('en-IN')}</td>
                  <td className="num neg">{c.payable>0?fmtINR(c.payable):'–'}</td>
                  <td className="num" style={{color:'var(--o)'}}>{c.provision>0?fmtINR(c.provision):'–'}</td>
