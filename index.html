const STORAGE_KEY = "vipinPFM_v1";
const FM_KEY = "ff_v5"; // FinSaveManager's localStorage key — shared sync bridge

function loadState() {
  try {
    const own = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}") || {};
    // Fallback: if FinManager has restored from Drive on a new device and PFM key is empty, rehydrate from ff_v5.pfmModule
    if (Object.keys(own).length === 0) {
      const fm = JSON.parse(localStorage.getItem(FM_KEY) || "{}");
      if (fm && fm.pfmModule) return fm.pfmModule;
    }
    return own;
  }
  catch { return {}; }
}
function saveState(partial) {
  try {
    const existing = loadState();
    const merged = { ...existing, ...partial };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
    // Mirror into FinManager's data blob so its Google Drive sync carries PFM state too
    const fmRaw = localStorage.getItem(FM_KEY);
    if (fmRaw) {
      try {
        const fm = JSON.parse(fmRaw);
        fm.pfmModule = merged;
        fm.pfmUpdatedAt = new Date().toISOString();
        localStorage.setItem(FM_KEY, JSON.stringify(fm));
      } catch {}
    }
  } catch {}
}

// Read derived financial profile from FinManager if present
function readFinManagerProfile() {
  try {
    const fm = JSON.parse(localStorage.getItem(FM_KEY) || "null");
    if (!fm || !fm.accounts) return null;
    const accounts = fm.accounts || [];
    const txns = fm.transactions || [];
    const liquidNetWorth = accounts
      .filter(a => ["bank","cash","wallet","fd"].includes(a.type))
      .reduce((s, a) => s + (Number(a.balance) || 0), 0);
    // Average monthly expense over last 3 months of data
    const months = [...new Set(txns.map(t => t.month))].sort().slice(-3);
    const expByMonth = months.map(m => txns.filter(t => t.month === m && t.type === "expense").reduce((s,t) => s + (Number(t.amount)||0), 0));
    const avgMonthlyExpense = expByMonth.length ? expByMonth.reduce((a,b)=>a+b,0) / expByMonth.length : 0;
    const budgetMonthly = fm.budgetLimits ? Object.values(fm.budgetLimits).reduce((s,v)=>s+(Number(v)||0),0) : 0;
    const name = (fm.profile && fm.profile.name) || null;
    return { liquidNetWorth, avgMonthlyExpense, budgetMonthly, name, monthsAvailable: months.length };
  } catch { return null; }
}

function fmtINR(n, opts = {}) {
  if (n === null || n === undefined || isNaN(n)) return "₹0";
  const num = Math.round(n);
  if (opts.compact) {
    if (num >= 10000000) return "₹" + (num / 10000000).toFixed(2) + " Cr";
    if (num >= 100000)   return "₹" + (num / 100000).toFixed(2) + " L";
    if (num >= 1000)     return "₹" + (num / 1000).toFixed(1) + "k";
    return "₹" + num;
  }
  return "₹" + num.toLocaleString("en-IN");
}

function fmtPct(n, digits = 1) {
  return (n ?? 0).toFixed(digits) + "%";
}

// SIP future value — monthly compounding
function sipFV(monthly, annualRatePct, years) {
  const r = (annualRatePct / 100) / 12;
  const n = years * 12;
  if (r === 0) return monthly * n;
  return monthly * (((Math.pow(1 + r, n) - 1) / r) * (1 + r));
}

// Lumpsum future value
function lumpsumFV(amount, annualRatePct, years) {
  return amount * Math.pow(1 + annualRatePct / 100, years);
}

function EmergencyFundModule({ onBack }) {
  const [monthlyExpense, setMonthlyExpense] = useState(60000);
  const [months, setMonths] = useState(6);
  const [currentSaved, setCurrentSaved] = useState(0);
  const [buildMonths, setBuildMonths] = useState(12);

  const _firstLoad = useRef(true);
  useEffect(() => { if (_firstLoad.current) return; saveState({ emergency: { monthlyExpense, months, currentSaved, buildMonths } }); },
    [monthlyExpense, months, currentSaved, buildMonths]);
  useEffect(() => {
    const s = loadState().emergency;
    if (s) { setMonthlyExpense(s.monthlyExpense ?? 60000); setMonths(s.months ?? 6); setCurrentSaved(s.currentSaved ?? 0); setBuildMonths(s.buildMonths ?? 12); } _firstLoad.current = false;
  }, []);

  const calc = useMemo(() => {
    const target = monthlyExpense * months;
    const needed = Math.max(0, target - currentSaved);
    const monthlyContribution = needed / buildMonths;
    // 3-tier split
    const tier1 = monthlyExpense;                         // 1 month
    const tier2 = monthlyExpense * Math.min(2, months - 1); // 1-2 months
    const tier3 = Math.max(0, target - tier1 - tier2);
    const progress = target > 0 ? Math.min(100, (currentSaved / target) * 100) : 0;
    return { target, needed, monthlyContribution, tier1, tier2, tier3, progress };
  }, [monthlyExpense, months, currentSaved, buildMonths]);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Part 4 · Emergency Fund</Eyebrow>

              <option value={12}>12 months (maximum security)</option>
            </select>
          </div>
          <NumberInput label="Already Saved" value={currentSaved} onChange={setCurrentSaved} placeholder="0" />
          <div className="form-group">
            <label className="form-label">Time to Build</label>
            <select className="form-select" value={buildMonths} onChange={e => setBuildMonths(Number(e.target.value))}>
              <option value={6}>6 months</option>
              <option value={12}>12 months</option>
              <option value={18}>18 months</option>
              <option value={24}>24 months</option>
            </select>
          </div>
        </div>

        <div className="result-grid">
          <StatCard label="Target Corpus" value={fmtINR(calc.target, { compact: true })} variant="brand" />
          <StatCard label="Amount to Save" value={fmtINR(calc.needed, { compact: true })} variant="accent" />
          <StatCard label="Monthly Contribution" value={fmtINR(calc.monthlyContribution, { compact: true })} sub={`Over ${buildMonths} months`} variant="green" />
          <StatCard label="Progress" value={fmtPct(calc.progress, 0)} sub={fmtINR(calc.target - calc.needed, { compact: true }) + " saved"} variant={calc.progress > 60 ? "green" : "red"} />
        </div>
      </div>

      <div className="panel">
        <h2>Where to park it — the 3-tier structure</h2>
        <p>Don't put it all in one place. Balance instant access with better returns.</p>

        <div className="grid-2" style={{gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))"}}>
          {[
            { tier: "TIER 1", title: "Instant Access", months: 1, amount: calc.tier1, detail: "Savings Account  •  UPI & ATM  •  2.5–3.5%", color: "red" },
            { tier: "TIER 2", title: "Next-Day Access", months: 2, amount: calc.tier2, detail: "Liquid Mutual Fund  •  T+1 redemption  •  6–7%", color: "accent" },
            { tier: "TIER 3", title: "Few-Days Access", months: months - 3, amount: calc.tier3, detail: "Sweep-in FD / Arbitrage Fund  •  7%+", color: "green" },
          ].map((t, i) => (
            <div key={i} style={{
              padding: 18, border: "1px solid var(--rule)", borderRadius: "var(--radius)",

      </div>
    </>
  );

/* =============================================================================

function SIPModule({ onBack }) {
  const [monthly, setMonthly] = useState(25000);
  const [years, setYears] = useState(15);
  const [expectedReturn, setExpectedReturn] = useState(13);
  const [stepUp, setStepUp] = useState(10);

  const _firstLoad = useRef(true);
  useEffect(() => { if (_firstLoad.current) return; saveState({ sip: { monthly, years, expectedReturn, stepUp } }); },
    [monthly, years, expectedReturn, stepUp]);
  useEffect(() => {
    const s = loadState().sip;
    if (s) { setMonthly(s.monthly ?? 25000); setYears(s.years ?? 15); setExpectedReturn(s.expectedReturn ?? 13); setStepUp(s.stepUp ?? 10); } _firstLoad.current = false;
  }, []);

  const { fvPlain, fvStepUp, invested, investedStepUp, yearly } = useMemo(() => {
    // Plain SIP
    const fvPlain = sipFV(monthly, expectedReturn, years);
    const invested = monthly * 12 * years;

    // Step-up SIP (annual)
    let investedStepUp = 0;
    let fvStepUp = 0;
    const r = expectedReturn / 100 / 12;
    let currentMonthly = monthly;
    for (let y = 0; y < years; y++) {
      // FV at end of year: compound previous balance + SIP for 12 months
      const yearInvested = currentMonthly * 12;
      investedStepUp += yearInvested;
      // grow existing FV to end-of-year
      fvStepUp = fvStepUp * Math.pow(1 + r, 12);
      // add SIP contributions for this year (ordinary annuity, month-end)
      fvStepUp += currentMonthly * (((Math.pow(1 + r, 12) - 1) / r));
      currentMonthly *= (1 + stepUp / 100);
    }

    // Yearly progression for chart
    const yearly = [];
    let curMonthly = monthly;
    let fv = 0, inv = 0;
    for (let y = 1; y <= years; y++) {
      inv += curMonthly * 12;
      fv = fv * Math.pow(1 + r, 12) + curMonthly * (((Math.pow(1 + r, 12) - 1) / r));
      yearly.push({ year: y, invested: inv, fv });
      curMonthly *= (1 + stepUp / 100);
    }

    return { fvPlain, fvStepUp, invested, investedStepUp, yearly };
  }, [monthly, years, expectedReturn, stepUp]);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Part 5 · SIP Calculator</Eyebrow>
        <h2>See your money grow — with step-up SIPs</h2>

          <NumberInput label="Monthly SIP Amount" value={monthly} onChange={setMonthly} placeholder="25000" />
          <Slider label={`Investment Period (${years} years)`} value={years} onChange={setYears} min={1} max={30} step={1} suffix=" yrs" />
          <Slider label={`Expected Annual Return (${expectedReturn}%)`} value={expectedReturn} onChange={setExpectedReturn} min={6} max={20} step={0.5} suffix="%" />
          <Slider label={`Annual Step-Up (${stepUp}%)`} value={stepUp} onChange={setStepUp} min={0} max={20} step={1} suffix="%" />
        </div>

        <div className="result-grid">
          <StatCard label="Total Invested (Plain SIP)" value={fmtINR(invested, { compact: true })} variant="brand" />
          <StatCard label="Future Value (Plain SIP)" value={fmtINR(fvPlain, { compact: true })} variant="green" />
          <StatCard label="Total Invested (Step-Up SIP)" value={fmtINR(investedStepUp, { compact: true })} variant="brand" />
          <StatCard label="Future Value (Step-Up SIP)" value={fmtINR(fvStepUp, { compact: true })}
            sub={fmtINR(fvStepUp - fvPlain, { compact: true }) + " extra vs plain"} variant="accent" />
        </div>

        <ChartWrap
          deps={[yearly]}
          renderChart={(canvas) => new Chart(canvas, {
            type: "line",
            data: {
              labels: yearly.map(p => `Y${p.year}`),
              datasets: [
                {
                  label: "Amount Invested",
                  data: yearly.map(p => p.invested),
                  borderColor: "#6B7280", backgroundColor: "rgba(107,114,128,0.08)",
                  fill: true, tension: 0.3,
                },
                {
                  label: "Portfolio Value (Step-Up SIP)",
                  data: yearly.map(p => p.fv),
                  borderColor: "#0B5394", backgroundColor: "rgba(11,83,148,0.1)",
                  fill: true, tension: 0.3, borderWidth: 2.5,

                  grid: { color: "#F1F5F9" }
                },

const GOAL_TEMPLATES = [
  { key: "retirement", icon: "🏖️", name: "Retirement",       years: 25, inflation: 6, ret: 12, color: "#0B5394", tint: "#E7F0F9" },
  { key: "education",  icon: "🎓", name: "Child's Education", years: 15, inflation: 8, ret: 12, color: "#7C3AED", tint: "#EDE9FE" },
  { key: "home",       icon: "🏠", name: "Home / Down-payment", years: 7, inflation: 7, ret: 11, color: "#059669", tint: "#D1FAE5" },
  { key: "car",        icon: "🚗", name: "Car",                years: 3, inflation: 6, ret: 8,  color: "#D97706", tint: "#FEF3C7" },
  { key: "vacation",   icon: "✈️", name: "Vacation",           years: 2, inflation: 6, ret: 7,  color: "#14B8A6", tint: "#CCFBF1" },
  { key: "wedding",    icon: "💍", name: "Wedding",            years: 5, inflation: 7, ret: 10, color: "#DC2626", tint: "#FEE2E2" },
  { key: "baby",       icon: "👶", name: "New Baby",           years: 2, inflation: 7, ret: 8,  color: "#EC4899", tint: "#FCE7F3" },
  { key: "custom",     icon: "🎯", name: "Custom Goal",        years: 5, inflation: 6, ret: 11, color: "#0B5394", tint: "#E7F0F9" },
];

function getTemplate(key) {
  return GOAL_TEMPLATES.find(t => t.key === key) || GOAL_TEMPLATES[GOAL_TEMPLATES.length - 1];
}

function computeGoal(g) {
  const now = new Date();
  const tgt = new Date(g.targetDate);
  const monthsLeft = Math.max(1, (tgt.getFullYear() - now.getFullYear()) * 12 + (tgt.getMonth() - now.getMonth()));
  const yearsLeft = monthsLeft / 12;
  const futureTarget = g.target * Math.pow(1 + (g.inflation || 0) / 100, yearsLeft);
  const savedFV = lumpsumFV(g.saved || 0, g.ret, yearsLeft);
  const contribFV = sipFV(g.monthly || 0, g.ret, yearsLeft);
  const projected = savedFV + contribFV;
  const progressPct = Math.min(100, ((g.saved || 0) / futureTarget) * 100);
  const onTrackPct = Math.min(999, (projected / futureTarget) * 100);
  // Required monthly SIP to close the gap on top of current savings
  const shortfall = Math.max(0, futureTarget - savedFV);
  const r = g.ret / 100 / 12;
  const n = monthsLeft;
  const requiredMonthly = shortfall > 0 ? shortfall / (((Math.pow(1 + r, n) - 1) / r) * (1 + r)) : 0;
  let status = "behind";
  if (onTrackPct >= 100) status = "ahead";
  else if (onTrackPct >= 95) status = "on-track";
  return { yearsLeft, monthsLeft, futureTarget, projected, progressPct, onTrackPct, requiredMonthly, status };
}

function uid() { return "g_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7); }

function defaultTargetDate(years) {
  const d = new Date();
  d.setFullYear(d.getFullYear() + (years || 5));
  return d.toISOString().slice(0, 7); // YYYY-MM
}

function fmtTargetDate(ym) {
  if (!ym) return "—";
  const [y, m] = ym.split("-").map(Number);
  return new Date(y, (m || 1) - 1, 1).toLocaleDateString("en-IN", { month: "short", year: "numeric" });
}

function GoalPlannerModule({ onBack }) {
  const [goalAmount, setGoalAmount] = useState(5000000);
  const [years, setYears] = useState(10);
  const [currentSavings, setCurrentSavings] = useState(0);
  const [inflation, setInflation] = useState(6);
  const [returnRate, setReturnRate] = useState(12);

  const _firstLoad = useRef(true);
  useEffect(() => { if (_firstLoad.current) return; saveState({ goal: { goalAmount, years, currentSavings, inflation, returnRate } }); },
    [goalAmount, years, currentSavings, inflation, returnRate]);
  useEffect(() => {
    const s = loadState().goal;
    if (s) { setGoalAmount(s.goalAmount ?? 5000000); setYears(s.years ?? 10); setCurrentSavings(s.currentSavings ?? 0); setInflation(s.inflation ?? 6); setReturnRate(s.returnRate ?? 12); } _firstLoad.current = false;
  }, []);

  const calc = useMemo(() => {
    // Inflate target to future value
    const futureGoal = goalAmount * Math.pow(1 + inflation / 100, years);
    // Grow current savings
    const savingsFV = lumpsumFV(currentSavings, returnRate, years);
    // Shortfall to SIP
    const shortfall = Math.max(0, futureGoal - savingsFV);
    // Required monthly SIP to bridge shortfall
    const r = returnRate / 100 / 12;
    const n = years * 12;
    const monthlySIP = shortfall > 0 ? shortfall / (((Math.pow(1 + r, n) - 1) / r) * (1 + r)) : 0;
    // Recommended horizon-based allocation
    let recommendedAllocation = "";
    if (years <= 3)      recommendedAllocation = "Liquid Funds, Arbitrage Funds, FDs — no equity";
    else if (years <= 7) recommendedAllocation = "Balanced Advantage / Aggressive Hybrid Funds, Corporate bonds (30-50% equity)";
    else                 recommendedAllocation = "Equity Mutual Funds, Index Funds, some small-cap exposure, Gold";

    return { futureGoal, savingsFV, shortfall, monthlySIP, recommendedAllocation };
  }, [goalAmount, years, currentSavings, inflation, returnRate]);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Goal Planner</Eyebrow>
        <h2>Plan for anything — retirement, home, education</h2>
        <p>Use the SMART method: Specific, Measurable, Achievable, Relevant, Time-bound. Not "save for retirement" — instead "accumulate ₹5 Cr by age 60." The clearer the goal, the easier the plan.</p>

        <div className="form-row">
          <NumberInput label="Goal Amount (in today's value)" value={goalAmount} onChange={setGoalAmount} placeholder="5000000" hint="What it costs today" />
          <Slider label={`Years to Goal (${years})`} value={years} onChange={setYears} min={1} max={35} step={1} suffix=" yrs" />
          <NumberInput label="Already Saved for This Goal" value={currentSavings} onChange={setCurrentSavings} placeholder="0" />
          <Slider label={`Inflation Rate (${inflation}%)`} value={inflation} onChange={setInflation} min={3} max={10} step={0.5} suffix="%" />
          <Slider label={`Expected Return (${returnRate}%)`} value={returnRate} onChange={setReturnRate} min={6} max={18} step={0.5} suffix="%" />
        </div>

        <div className="result-grid">
          <StatCard label="Future Goal Cost" value={fmtINR(calc.futureGoal, { compact: true })} sub={`After ${inflation}% inflation`} variant="red" />
          <StatCard label="Current Savings Will Grow To" value={fmtINR(calc.savingsFV, { compact: true })} variant="green" />
          <StatCard label="Shortfall to Bridge" value={fmtINR(calc.shortfall, { compact: true })} variant="accent" />
          <StatCard label="Required Monthly SIP" value={fmtINR(calc.monthlySIP, { compact: true })} variant="brand" />
        </div>

        <Callout title="Right investment for your horizon" variant="brand">
          For a {years}-year goal: <strong>{calc.recommendedAllocation}</strong>
        </Callout>
      </div>
    </>
  );
}

function GoldModule({ onBack }) {
  const [amount, setAmount] = useState(500000);
  const [years, setYears] = useState(8);
  const [goldReturn, setGoldReturn] = useState(9);

  const _firstLoad = useRef(true);
  useEffect(() => { if (_firstLoad.current) return; saveState({ gold: { amount, years, goldReturn } }); },
    [amount, years, goldReturn]);
  useEffect(() => {
    const s = loadState().gold;
    if (s) { setAmount(s.amount ?? 500000); setYears(s.years ?? 8); setGoldReturn(s.goldReturn ?? 9); } _firstLoad.current = false;
  }, []);

  const calc = useMemo(() => {
    const sgbMain = lumpsumFV(amount, goldReturn, years);
    const sgbInterest = amount * 0.025 * years; // 2.5% simple interest on issue price
    const sgbTotal = sgbMain + sgbInterest;
    // ETF erosion by expense ratio ~0.35%
    const etfReturn = goldReturn - 0.35;
    const etfValue = lumpsumFV(amount, etfReturn, years);
    const etfTax = (etfValue - amount) * 0.125;
    const etfNet = etfValue - etfTax;
    // Digital gold: 3% GST loss upfront
    const digitalInitial = amount * 0.97;
    const digitalValue = lumpsumFV(digitalInitial, goldReturn, years);
    const digitalTax = (digitalValue - digitalInitial) * 0.125;
    const digitalNet = digitalValue - digitalTax;
    return { sgbTotal, sgbInterest, etfValue, etfNet, digitalNet };
  }, [amount, years, goldReturn]);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Part 5 · Gold</Eyebrow>
        <h2>SGB vs Gold ETF vs Digital Gold</h2>

          <NumberInput label="Investment Amount" value={amount} onChange={setAmount} placeholder="500000" />

          <Slider label={`Expected Gold Return (${goldReturn}%)`} value={goldReturn} onChange={setGoldReturn} min={5} max={15} step={0.5} suffix="%" />
        </div>

        <div className="result-grid">
          <StatCard label="SGB — Total Value"
            value={fmtINR(calc.sgbTotal, { compact: true })}
            sub={`Incl. ₹${fmtINR(calc.sgbInterest, {compact:true}).replace("₹","")} interest; tax-free at maturity`}
            variant="green" />
          <StatCard label="Gold ETF — Net Value"
            value={fmtINR(calc.etfNet, { compact: true })}
            sub="After 0.35% expense + 12.5% LTCG"
            variant="brand" />
          <StatCard label="Digital Gold — Net Value"
            value={fmtINR(calc.digitalNet, { compact: true })}
            sub="After 3% GST entry + 12.5% LTCG"
            variant="accent" />
          <StatCard label="SGB vs ETF Advantage"
            value={fmtINR(calc.sgbTotal - calc.etfNet, { compact: true })}
            sub="Extra over ETF in same period"
            variant="green" />
        </div>

        <div className="tbl-wrap mt-2">
          <table className="tbl">
            <thead>
              <tr><th></th><th>Sovereign Gold Bonds</th><th>Gold ETFs</th><th>Digital Gold (apps)</th></tr>
            </thead>
            <tbody>
              <tr><td><strong>Extra Interest</strong></td><td className="highlight">2.5% per year ✓</td><td>None</td><td>None</td></tr>
              <tr><td><strong>Tax on Gains</strong></td><td className="highlight">Zero at maturity (8 yrs)</td><td>12.5% LTCG after 1 yr</td><td>12.5% LTCG after 2 yrs</td></tr>
              <tr><td><strong>Expense Ratio</strong></td><td className="highlight">Zero</td><td>0.10–0.60%/yr</td><td>Hidden spreads + 3% GST</td></tr>

/* =============================================================================
   MODULE 8: TAX CALCULATOR
   ============================================================================= */

function TaxModule({ onBack }) {
  const [equityST, setEquityST] = useState(0);
  const [equityLT, setEquityLT] = useState(200000);
  const [debt, setDebt] = useState(0);
  const [crypto, setCrypto] = useState(0);
  const [slab, setSlab] = useState(30);

  const _firstLoad = useRef(true);
  useEffect(() => { if (_firstLoad.current) return; saveState({ tax: { equityST, equityLT, debt, crypto, slab } }); },
    [equityST, equityLT, debt, crypto, slab]);
  useEffect(() => {
    const s = loadState().tax;
    if (s) { setEquityST(s.equityST ?? 0); setEquityLT(s.equityLT ?? 200000); setDebt(s.debt ?? 0); setCrypto(s.crypto ?? 0); setSlab(s.slab ?? 30); } _firstLoad.current = false;
  }, []);

  const taxes = useMemo(() => {
    const tEquityST = equityST * 0.20;
    const equityLTTaxable = Math.max(0, equityLT - 125000);
    const tEquityLT = equityLTTaxable * 0.125;
    const tDebt = debt * (slab / 100);
    const tCrypto = crypto * 0.30 + crypto * 0.30 * 0.04; // 30% + 4% cess
    const total = tEquityST + tEquityLT + tDebt + tCrypto;
    const totalGains = equityST + equityLT + debt + crypto;
    const effective = totalGains > 0 ? (total / totalGains) * 100 : 0;
    return { tEquityST, tEquityLT, tDebt, tCrypto, total, effective, equityLTTaxable };
  }, [equityST, equityLT, debt, crypto, slab]);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Part 6 · Tax Calculator</Eyebrow>
        <h2>After-tax returns are what matter</h2>
        <p>Rules effective FY 2026-27. Big change from July 2024: indexation benefit on debt funds is gone.</p>

        <div className="form-row">
          <NumberInput label="Equity Gains — Short-Term (< 12 months)" value={equityST} onChange={setEquityST} placeholder="0" />
          <NumberInput label="Equity Gains — Long-Term (≥ 12 months)" value={equityLT} onChange={setEquityLT} placeholder="200000" hint="First ₹1.25 L per year is tax-free" />
          <NumberInput label="Debt Fund Gains / FD Interest" value={debt} onChange={setDebt} placeholder="0" />
          <NumberInput label="Crypto Profits" value={crypto} onChange={setCrypto} placeholder="0" hint="30% flat regardless of holding period" />
          <div className="form-group">
            <label className="form-label">Your Income Tax Slab</label>
            <select className="form-select" value={slab} onChange={e => setSlab(Number(e.target.value))}>
              <option value={5}>5% slab</option>
              <option value={10}>10% slab</option>
              <option value={15}>15% slab</option>
              <option value={20}>20% slab</option>
              <option value={30}>30% slab</option>
            </select>
          </div>
        </div>

        <div className="result-grid">
          <StatCard label="Equity ST Tax (20%)" value={fmtINR(taxes.tEquityST, {compact: true})} variant="red" />
          <StatCard label="Equity LT Tax (12.5%)" value={fmtINR(taxes.tEquityLT, {compact: true})} sub={`On ${fmtINR(taxes.equityLTTaxable, {compact: true})} after ₹1.25L exemption`} variant="accent" />
          <StatCard label="Debt / FD Tax" value={fmtINR(taxes.tDebt, {compact: true})} sub={`${slab}% slab rate`} variant="red" />
          <StatCard label="Crypto Tax (30% + cess)" value={fmtINR(taxes.tCrypto, {compact: true})} variant="red" />
          <StatCard label="Total Tax Liability" value={fmtINR(taxes.total, {compact: true})} variant="red" />
          <StatCard label="Effective Tax Rate" value={fmtPct(taxes.effective)} variant="accent" />
        </div>
      </div>

      <div className="panel">
        <h2>Tax rates at a glance — FY 2026-27</h2>
        <div className="tbl-wrap">
          <table className="tbl">
            <thead>
              <tr><th>Asset</th><th>Short-Term</th><th>Long-Term</th></tr>
            </thead>
            <tbody>
              {TAX_RATES.map((t, i) => (
                <tr key={i}>
                  <td><strong>{t.asset}</strong></td>
                  <td>{t.shortTerm}</td>
                  <td className={t.special ? "highlight" : ""}>
                    {t.bad ? <span className="pill pill-red">{t.longTerm}</span>
                     : t.good ? <span className="pill pill-green">{t.longTerm}</span>
                     : t.longTerm}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <Callout title="The Arbitrage Fund tax hack" variant="green">
          Arbitrage funds are SEBI-classified as equity, so gains get the 12.5% LTCG rate instead of your slab rate. If you're in the 30% tax bracket and parking cash 1+ years, arbitrage funds beat FDs post-tax at similar pre-tax yields.
        </Callout>
      </div>
    </>
  );
}

/* =============================================================================
   MODULE 9: PORTFOLIO ALLOCATION
   ============================================================================= */

function PortfolioModule({ onBack }) {
  const [profile, setProfile] = useState("growth");
  const [age, setAge] = useState(35);
  const [monthlyInvestable, setMonthlyInvestable] = useState(40000);

  // Current holdings (in rupees)
  const [equityHeld, setEquityHeld] = useState(0);
  const [debtHeld, setDebtHeld]     = useState(0);
  const [goldHeld, setGoldHeld]     = useState(0);
  const [cashHeld, setCashHeld]     = useState(0);

  const _firstLoad = useRef(true);
  useEffect(() => { if (_firstLoad.current) return; saveState({ portfolio: { profile, age, monthlyInvestable, equityHeld, debtHeld, goldHeld, cashHeld } }); },
    [profile, age, monthlyInvestable, equityHeld, debtHeld, goldHeld, cashHeld]);
  useEffect(() => {
    const s = loadState().portfolio;
    if (s) {
      setProfile(s.profile ?? "growth");
      setAge(s.age ?? 35);
      setMonthlyInvestable(s.monthlyInvestable ?? 40000);
      setEquityHeld(s.equityHeld ?? 0);
      setDebtHeld(s.debtHeld ?? 0);
      setGoldHeld(s.goldHeld ?? 0);
      setCashHeld(s.cashHeld ?? 0);
    } _firstLoad.current = false;
  }, []);

  const allocation = RISK_PROFILES[profile];

  // Suggested profile from age ("100 - age = equity %")
  const suggestedEquity = Math.max(30, Math.min(90, 100 - age));
  const ageSuggestion = suggestedEquity >= 80 ? "aggressive" : suggestedEquity >= 65 ? "growth" : suggestedEquity >= 45 ? "moderate" : "conservative";

  // Pull cash/debt from FinManager if present
  const fm = readFinManagerProfile();
  const pullFromFM = () => {
    if (!fm) return;
    if (fm.liquidNetWorth > 0) setCashHeld(Math.round(fm.liquidNetWorth));
  };

  const amounts = {
    equity: monthlyInvestable * allocation.equity / 100,
    debt:   monthlyInvestable * allocation.debt / 100,
    gold:   monthlyInvestable * allocation.gold / 100,
    cash:   monthlyInvestable * allocation.cash / 100,
  };

  const totalHeld = equityHeld + debtHeld + goldHeld + cashHeld;
  const currentPct = totalHeld > 0 ? {
    equity: equityHeld / totalHeld * 100,
    debt:   debtHeld   / totalHeld * 100,
    gold:   goldHeld   / totalHeld * 100,
    cash:   cashHeld   / totalHeld * 100,
  } : { equity:0, debt:0, gold:0, cash:0 };

  // Rebalance actions (signed rupees: positive = add, negative = trim)
  const rebalance = totalHeld > 0 ? {
    equity: Math.round(totalHeld * allocation.equity / 100 - equityHeld),
    debt:   Math.round(totalHeld * allocation.debt   / 100 - debtHeld),
    gold:   Math.round(totalHeld * allocation.gold   / 100 - goldHeld),
    cash:   Math.round(totalHeld * allocation.cash   / 100 - cashHeld),
  } : { equity:0, debt:0, gold:0, cash:0 };

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Part 7 · Portfolio Allocation</Eyebrow>
        <h2>Match your risk profile to an allocation</h2>

        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Your Risk Profile</label>
            <select className="form-select" value={profile} onChange={e => setProfile(e.target.value)}>
              <option value="conservative">Conservative — stability first</option>
              <option value="moderate">Moderate — balanced</option>
              <option value="growth">Growth — most people</option>
              <option value="aggressive">Aggressive — long runway, high risk</option>
            </select>
          </div>
          <NumberInput label="Your Age" value={age} onChange={setAge} prefix="" placeholder="35" min={18} max={80} />
          <NumberInput label="Monthly Investable Amount" value={monthlyInvestable} onChange={setMonthlyInvestable} placeholder="40000" />
        </div>

        <div className="grid-2">
          <ChartWrap
            deps={[profile, monthlyInvestable]}
            renderChart={(canvas) => new Chart(canvas, {
              type: "doughnut",
              data: {
                labels: [
                  `Equity (${allocation.equity}%)`,
                  `Debt (${allocation.debt}%)`,
                  `Gold (${allocation.gold}%)`,
                  `Cash (${allocation.cash}%)`,
                ],
                datasets: [{
                  data: [allocation.equity, allocation.debt, allocation.gold, allocation.cash],
                  backgroundColor: ["#0B5394", "#6B7280", "#D97706", "#14B8A6"],
                  borderWidth: 2,
                  borderColor: "#FFFFFF"
                }]
              },
              options: {
                responsive: true, maintainAspectRatio: false,
                cutout: "60%",
                plugins: {
                  legend: { position: "bottom", labels: { font: { family: "Calibri", size: 11 }, color: "#0F1B2D", padding: 12 } },
                  tooltip: { callbacks: { label: (ctx) => ctx.label + " — " + fmtINR(monthlyInvestable * ctx.parsed / 100, {compact: true}) + "/mo" } }
                }
              }
            })}
          />

          <div>
            <h3>Your monthly split — {allocation.label} profile</h3>
            <div style={{display: "grid", gap: 8, marginTop: 10}}>
              {[
                { label: "Equity", amt: amounts.equity, pct: allocation.equity, sub: "Nifty 50 Index + Flexi Cap + Mid/Small", color: "brand" },
                { label: "Debt",   amt: amounts.debt,   pct: allocation.debt,   sub: "PPF, EPF, short-term debt funds",         color: "red" },
                { label: "Gold",   amt: amounts.gold,   pct: allocation.gold,   sub: "Gold ETF or existing SGBs",                color: "accent" },
                { label: "Cash",   amt: amounts.cash,   pct: allocation.cash,   sub: "Liquid funds",                              color: "green" },
              ].map((b, i) => (
                <div key={i} style={{
                  display: "grid", gridTemplateColumns: "1fr auto", gap: 10,
                  padding: "12px 14px", background: "var(--bg-alt)",
                  borderRadius: 8, border: "1px solid var(--rule)",
                  borderLeft: `4px solid var(--${b.color})`
                }}>
                  <div>
                    <div style={{fontWeight: 600}}>{b.label} <span className="muted" style={{fontWeight: 400}}>— {b.pct}%</span></div>
                    <div className="muted" style={{fontSize: "0.8rem"}}>{b.sub}</div>
                  </div>
                  <div style={{fontWeight: 700, color: "var(--brand)", whiteSpace: "nowrap"}}>
                    {fmtINR(b.amt, {compact: true})}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="panel">
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12, flexWrap:"wrap"}}>
          <div>
            <h2>Your current holdings vs target</h2>
            <p>Enter what you actually hold across asset classes. We'll compare against your target allocation and tell you exactly how much to shift to rebalance.</p>
          </div>
          {fm && (
            <button className="btn btn-ghost btn-sm" onClick={pullFromFM} title="Pre-fill Cash from FinManager liquid net worth">
              💼 Pull Cash from FinManager
            </button>
          )}
        </div>

        <div className="form-row">
          <NumberInput label="Equity (MFs, Stocks, ELSS)" value={equityHeld} onChange={setEquityHeld} placeholder="0" hint="Flexi cap, index, mid/small cap, international" />
          <NumberInput label="Debt (PPF, EPF, Bonds, FDs)" value={debtHeld} onChange={setDebtHeld} placeholder="0" hint="PPF, EPF, debt funds, fixed deposits" />
          <NumberInput label="Gold (SGB, Gold ETF, Digital Gold)" value={goldHeld} onChange={setGoldHeld} placeholder="0" />
          <NumberInput label="Cash (Savings, Liquid Funds)" value={cashHeld} onChange={setCashHeld} placeholder="0" hint={fm ? `FinManager liquid: ${fmtINR(fm.liquidNetWorth, {compact:true})}` : "Bank + wallets + liquid MF"} />
        </div>

        {totalHeld > 0 ? (
          <>
            <div className="result-grid" style={{marginTop: 16}}>
              <StatCard label="Total Portfolio" value={fmtINR(totalHeld, {compact:true})} variant="brand" />
              <StatCard label="Current Equity %" value={currentPct.equity.toFixed(0) + "%"} sub={`Target: ${allocation.equity}%`} variant={Math.abs(currentPct.equity - allocation.equity) <= 5 ? "green" : "red"} />
              <StatCard label="Current Debt %"   value={currentPct.debt.toFixed(0) + "%"}   sub={`Target: ${allocation.debt}%`}   variant={Math.abs(currentPct.debt - allocation.debt) <= 5 ? "green" : "red"} />
              <StatCard label="Current Gold %"   value={currentPct.gold.toFixed(0) + "%"}   sub={`Target: ${allocation.gold}%`}   variant={Math.abs(currentPct.gold - allocation.gold) <= 5 ? "green" : "red"} />
              <StatCard label="Current Cash %"   value={currentPct.cash.toFixed(0) + "%"}   sub={`Target: ${allocation.cash}%`}   variant={Math.abs(currentPct.cash - allocation.cash) <= 5 ? "green" : "red"} />
            </div>

            <h3 style={{marginTop: 24}}>Rebalance actions</h3>
            <div style={{display:"grid", gap:8, marginTop:10}}>
              {[
                { label: "Equity", amt: rebalance.equity, color: "brand" },
                { label: "Debt",   amt: rebalance.debt,   color: "red" },
                { label: "Gold",   amt: rebalance.gold,   color: "accent" },
                { label: "Cash",   amt: rebalance.cash,   color: "green" },
              ].map((r, i) => {
                const aligned = Math.abs(r.amt) < totalHeld * 0.02; // within 2% of target
                return (
                  <div key={i} style={{
                    display:"grid", gridTemplateColumns:"140px 1fr auto", gap:12, alignItems:"center",
                    padding:"10px 14px", background:"var(--bg-alt)",
                    borderRadius:8, border:"1px solid var(--rule)",
                    borderLeft: `4px solid var(--${r.color})`
                  }}>
                    <div style={{fontWeight:600}}>{r.label}</div>
                    <div className="muted" style={{fontSize:"0.85rem"}}>
                      {aligned
                        ? "✓ On target — no action needed"
                        : r.amt > 0
                          ? `Add ${fmtINR(r.amt, {compact:true})} to this bucket`
                          : `Trim ${fmtINR(-r.amt, {compact:true})} from this bucket`}
                    </div>
                    <div style={{fontWeight:700, color: aligned ? "var(--green)" : r.amt > 0 ? "var(--brand)" : "var(--red)", whiteSpace:"nowrap"}}>
                      {aligned ? "✓" : (r.amt > 0 ? "+" : "") + fmtINR(r.amt, {compact:true})}
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        ) : (
          <Callout title="Enter your current holdings above" variant="brand">
            Once you fill in what you hold across Equity, Debt, Gold, and Cash, we'll show you the gap against your target allocation and the exact rupee amount to shift.
          </Callout>
        )}
      </div>

      <div className="panel">
        <h2>Age-based guidance &amp; discipline</h2>
        <div className="grid-2">
          <div>
            <Callout title={`"100 − age" rule → ${suggestedEquity}% equity`} variant="accent">
              A classic starting heuristic for a {age}-year-old: about <strong>{suggestedEquity}% in equity</strong>, with the balance across debt, gold, and cash. Matches the <strong>{ageSuggestion}</strong> profile above.
              {profile !== ageSuggestion && <> You've picked <strong>{allocation.label}</strong> — that's fine if it matches your risk appetite, just be intentional.</>}
            </Callout>
            <Callout title="Increase SIPs 10% yearly" variant="green">
              Every salary hike: raise your SIP first, then lifestyle. Every bonus: split into three — emergency top-up, lump-sum investment, and a small indulgence.
            </Callout>
          </div>
          <div>
            <Callout title="Rebalance once a year" variant="brand">
              If gold has grown from 10% to 15% of your portfolio, sell the extra 5% and buy whatever is lagging (usually equity). This forces "sell high, buy low" automatically.
            </Callout>
            <Callout title="Emergency fund first" variant="red">
              None of this allocation matters if you don't have 6 months of expenses in cash-equivalents. Finish the Emergency Fund module before chasing equity returns.
            </Callout>
          </div>
        </div>
      </div>
    </>
  );
}

function ActionPlanModule({ onBack }) {
  const [checks, setChecks] = useState(loadState().checks || {});
  const toggle = (k) => {
    const updated = { ...checks, [k]: !checks[k] };
    setChecks(updated);
    saveState({ checks: updated });
  };

  const sections = [
    {
      title: "Month 1 — Protection", variant: "red", items: [
        { k: "m1_1", t: "Buy family health cover: ₹10-30L base + ₹50L super top-up" },
        { k: "m1_2", t: "Buy term insurance: 15× annual income, till age 65 or 70" },
        { k: "m1_3", t: "Buy personal accident cover: 5× annual income" },
        { k: "m1_4", t: "Share all policy details in a single doc with spouse/family" },
      ]
    },
    {
      title: "Months 2–3 — Emergency Fund", variant: "accent", items: [
        { k: "m23_1", t: "Calculate your essential monthly expenses" },
        { k: "m23_2", t: "Keep 1 month of expenses in savings account" },
        { k: "m23_3", t: "Park 2 months in a Liquid Mutual Fund" },
        { k: "m23_4", t: "Target 3 more months in sweep-in FD / arbitrage fund" },
      ]
    },
    {
      title: "Month 4+ — Investing", variant: "green", items: [
        { k: "m4_1", t: "Open a direct MF account (Groww, Kuvera, or Zerodha Coin)" },
        { k: "m4_2", t: "Start monthly SIPs across 3–4 fund categories" },
        { k: "m4_3", t: "Set up annual SIP step-up (10% increase every year)" },
        { k: "m4_4", t: "Automate — investments come out on salary day, not as leftover" },
      ]
    },
    {
      title: "Every Year", variant: "brand", items: [
        { k: "y_1", t: "Review insurance — cover still adequate? Premiums paid?" },
        { k: "y_2", t: "Review portfolio allocation — rebalance if needed" },
        { k: "y_3", t: "Update nominees on all accounts" },
        { k: "y_4", t: "File ITR; track capital gains carefully" },
      ]
    },
  ];

  const totalItems = sections.reduce((a, s) => a + s.items.length, 0);
  const doneItems = sections.reduce((a, s) => a + s.items.filter(i => checks[i.k]).length, 0);
  const progress = Math.round((doneItems / totalItems) * 100);

  return (
    <>
      <BackLink onClick={onBack} />

      <div className="panel">
        <Eyebrow>Action Plan</Eyebrow>
        <h2>Your 4-month roadmap</h2>
        <p>Most people take 3–6 months to complete this. What matters is that you finish it. Check items off as you go — progress saves automatically.</p>

        <div style={{
          padding: "16px 20px", background: "var(--brand-lite)",
          borderRadius: "var(--radius)", marginTop: 12
        }}>
          <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8}}>
            <strong style={{color: "var(--brand)"}}>Overall Progress</strong>
            <strong style={{color: "var(--brand)"}}>{doneItems} / {totalItems} done ({progress}%)</strong>
          </div>
          <div style={{height: 8, borderRadius: 4, background: "rgba(11,83,148,0.12)", overflow: "hidden"}}>
            <div style={{
              height: "100%", width: `${progress}%`,
              background: "linear-gradient(90deg, var(--brand) 0%, var(--accent) 100%)",
              transition: "width 400ms ease"
            }}></div>
          </div>
        </div>
      </div>

      {sections.map((s, si) => (
        <div key={si} className="panel">
          <h3 style={{
            color: `var(--${s.variant})`,
            display: "flex", alignItems: "center", gap: 10
          }}>
            <span style={{
              display: "inline-block", width: 8, height: 24,
              background: `var(--${s.variant})`, borderRadius: 4
            }}></span>
            {s.title}
          </h3>
          <div style={{display: "grid", gap: 10, marginTop: 14}}>
            {s.items.map((it, i) => (
              <label key={i} style={{
                display: "flex", alignItems: "flex-start", gap: 12,
                padding: "12px 16px", border: "1px solid var(--rule)",
                borderRadius: 8, background: checks[it.k] ? "var(--green-lt)" : "var(--bg)",
                cursor: "pointer", transition: "all 180ms"
              }}>
                <input
                  type="checkbox"
                  checked={!!checks[it.k]}
                  onChange={() => toggle(it.k)}
                  style={{marginTop: 3, width: 18, height: 18, accentColor: "var(--green)"}}
                />
                <span style={{
                  fontSize: "0.92rem",
                  color: checks[it.k] ? "var(--green)" : "var(--ink)",
                  textDecoration: checks[it.k] ? "line-through" : "none"
                }}>{it.t}</span>
              </label>
            ))}
          </div>
        </div>
      ))}

      <Callout title="A final thought" variant="accent">
        Personal finance is 80% behaviour and 20% knowledge. What you do consistently over 20 years matters far more than picking the 'perfect' fund. <strong>Start imperfectly — start today.</strong>
      </Callout>
    </>
  );
}

          <a className="btn btn-accent" href={CALENDAR_URL} target="_blank" rel="noopener">📅 Book via Google Calendar</a>
        </div>

        <p className="muted" style={{fontSize: "0.78rem", marginTop: 14, marginBottom: 0}}>
          Educational consultation only. Not SEBI-registered investment advice.
        </p>
      </div>
    </div>
  );
}

/* =============================================================================
   DISCLAIMER MODAL
   ============================================================================= */

function DisclaimerModal({ onClose }) {
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h2>Important Disclaimers</h2>

        <div style={{marginTop: 12}}>
          <h4>SEBI Disclaimer</h4>
          <p>This tool is for educational purposes only and should not be construed as investment advice. Mutual fund investments are subject to market risks. Please read all scheme-related documents carefully before investing. Past performance does not guarantee future results.</p>

          <h4>Not Personalised Advice</h4>
          <p>The projections and recommendations here are based on assumptions about returns, inflation, and market conditions. Actual results may vary significantly. For personalised guidance, consult a SEBI-registered Investment Advisor, a licensed insurance agent, or a Chartered Accountant.</p>

          <h4>Data as of April 2026</h4>
          <p>Insurance plans, mutual fund returns, tax rates, and other figures are current as of April 2026 from IRDAI, SEBI, Ditto Insurance, PolicyX, and S&amp;P SPIVA public disclosures. Always verify current details from the insurer or AMC website before acting.</p>
        </div>

        <div className="actions">
          <button className="btn btn-primary" onClick={onClose}>I Understand</button>
        </div>
      </div>
    </div>
  );
}

/* =============================================================================
   DASHBOARD (HOME)

function Dashboard({ onOpen }) {
  const modules = [
    { id: "goals",      icon: "🎯", title: "My Goals",              desc: "Track multiple goals — retirement, home, education — with progress & required SIPs.", variant: "accent" },
    { id: "health",     icon: "🏥", title: "Health Insurance",     desc: "Figure out the right cover + see the best plans for April 2026.", variant: "red" },
    { id: "term",       icon: "🛡️", title: "Term Life Insurance",  desc: "Calculate how much you need and see the top-rated term plans.", variant: "brand" },
    { id: "accident",   icon: "🚑", title: "Personal Accident",    desc: "The overlooked policy — ₹25L cover for ₹1-3k/year.", variant: "brand" },
    { id: "emergency",  icon: "💰", title: "Emergency Fund",        desc: "3-tier structure across savings, liquid funds, and FDs.", variant: "green" },
    { id: "sip",        icon: "📈", title: "SIP Calculator",        desc: "See compounding with step-up SIPs + April 2026 fund picks.", variant: "brand" },
    { id: "goal",       icon: "🧮", title: "Goal Calculator",       desc: "Single-goal calculator for detailed planning.", variant: "accent" },
    { id: "gold",       icon: "🪙", title: "Gold Comparator",       desc: "SGB vs Gold ETF vs Digital Gold — crunch the numbers.", variant: "accent" },
    { id: "tax",        icon: "🧾", title: "Tax Calculator",        desc: "Capital gains tax estimator across all asset classes (FY 26-27).", variant: "purple" },
    { id: "portfolio",  icon: "📊", title: "Portfolio Allocation",  desc: "Match risk profile to allocation; see monthly split.", variant: "brand" },
    { id: "action",     icon: "✅", title: "4-Month Action Plan",   desc: "The full roadmap — track your progress.", variant: "green" },
  ];

  return (
    <>
      <div className="hero">
        <div className="hero-eyebrow">Personal Finance · Made Simple</div>
        <h1>Protect. Save. Then <span className="highlight">Invest</span>.</h1>
        <p>A complete planning workspace for Indian households — insurance, emergency fund, SIPs, gold, tax. Every calculation, benchmark, and recommendation is current as of April 2026.</p>

        <div className="hero-stats">
          <div className="hero-stat">
            <div className="hero-stat-value">11</div>
            <div className="hero-stat-label">Modules covered</div>
          </div>
          <div className="hero-stat">
            <div className="hero-stat-value">April 2026</div>
            <div className="hero-stat-label">Data freshness</div>
          </div>
          <div className="hero-stat">
            <div className="hero-stat-value">100% local</div>
            <div className="hero-stat-label">Data stays in your browser</div>
          </div>
          <div className="hero-stat">
            <div className="hero-stat-value">Free</div>
            <div className="hero-stat-label">No sign-up, no tracking</div>
          </div>
        </div>
      </div>

      <div className="section-head">
        <div>
          <h2>Choose a module to begin</h2>
          <p>Work through in order — or jump to whatever you're solving today.</p>
        </div>
      </div>

      <div className="module-grid">
        {modules.map(m => (
          <div key={m.id} className={`module-card is-${m.variant}`} onClick={() => onOpen(m.id)}>

            <h3>{m.title}</h3>
            <p>{m.desc}</p>

        ))}

    </>

/* =============================================================================
   APP ROOT
   ============================================================================= */

function PlannerRouter() {
  const [view, setView] = useState("dashboard");
  const [showContact, setShowContact] = useState(false);
  const [showDisclaimer, setShowDisclaimer] = useState(false);

  const openModule = (id) => { setView(id); window.scrollTo(0, 0); };
  const goHome = () => { setView("dashboard"); window.scrollTo(0, 0); };

  const viewMap = {
    dashboard: <Dashboard onOpen={openModule} />,
    health:    <HealthModule onBack={goHome} />,
    term:      <TermModule onBack={goHome} />,
    accident:  <AccidentModule onBack={goHome} />,
    emergency: <EmergencyFundModule onBack={goHome} />,
    sip:       <SIPModule onBack={goHome} />,
    goals:     <GoalsModule onBack={goHome} />,
    goal:      <GoalPlannerModule onBack={goHome} />,
    gold:      <GoldModule onBack={goHome} />,
    tax:       <TaxModule onBack={goHome} />,
    portfolio: <PortfolioModule onBack={goHome} />,
    action:    <ActionPlanModule onBack={goHome} />,
  };

  return (
    <>
      

      <div className="app-shell">
        {viewMap[view]}
      </div>

      

      {showContact    && <ContactModal onClose={() => setShowContact(false)} />}
      {showDisclaimer && <DisclaimerModal onClose={() => setShowDisclaimer(false)} />}
    </>
  );
}

window.PlannerRouter = PlannerRouter;

})();
